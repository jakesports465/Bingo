// ══ THEME ══
const T={bg:"#111117",s1:"#191A23",s2:"#21222E",s3:"#2A2C3A",bdr:"#2E3044",
  acc:"#F97316",blue:"#3B82F6",grn:"#10B981",yel:"#EAB308",red:"#EF4444",
  txt:"#EAEBF0",sub:"#8B8FA3",dim:"#4B4F63",rad:10};

// ══ DATA ══
const PHASES=[
  {id:1,n:"BASECAMP",s:"Cardio·Endurance",st:"2026-04-05",en:"2026-05-25",c:T.acc},
  {id:2,n:"CUT",s:"Fat Loss·Strength",st:"2026-05-26",en:"2026-08-21",c:T.blue},
  {id:3,n:"BUILD",s:"Hypertrophy",st:"2026-08-22",en:"2026-11-14",c:T.yel},
  {id:4,n:"SUSTAIN",s:"Maintain",st:"2026-11-15",en:"2027-04-04",c:T.grn}];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MUSCLES=["Quads","Glutes","Hamstrings","Calves","Chest","Back","Shoulders","Biceps","Triceps","Core","Cardio","Grip"];
const dS=d=>d.toISOString().split("T")[0],dP=s=>new Date(s+"T12:00:00"),dB=(a,b)=>Math.ceil((new Date(b)-new Date(a))/864e5);
const gP=ds=>{const d=dP(ds);
  // Year 1 exact dates
  for(const p of PHASES)if(d>=new Date(p.st)&&d<=new Date(p.en+"T23:59:59"))return p;
  if(d<new Date(PHASES[0].st))return PHASES[0];
  // Year 2+: cycle by calendar month/day
  const m=d.getMonth(),dy=d.getDate();
  if((m===3&&dy>=5)||(m===4&&dy<=25))return PHASES[0]; // Apr 5 - May 25: BASECAMP
  if((m===4&&dy>=26)||m===5||m===6||(m===7&&dy<=21))return PHASES[1]; // May 26 - Aug 21: CUT
  if((m===7&&dy>=22)||m===8||m===9||(m===10&&dy<=14))return PHASES[2]; // Aug 22 - Nov 14: BUILD
  return PHASES[3]; // Nov 15 - Apr 4: SUSTAIN
};
const tYear=ds=>{const d=dP(ds),s=new Date("2026-04-05");return Math.max(1,Math.floor((d-s)/(365.25*864e5))+1)};
const wS=(ds,r)=>Math.max(0,Math.floor((dP(ds)-new Date(r))/6048e5));
const BB_W=[45,65,75,85,95,115,125,135,145,155,165,175,185,195,205,215,225,235,245,255,275,285,305,325];
const bbS=t=>{let b=45;for(const w of BB_W)if(w<=t)b=w;return b};
const bbP=(s,wk,c=325,r=10)=>bbS(Math.min(c,s+Math.floor(wk/2)*r));
const sn=w=>Math.round(w/2.5)*2.5,dbP=(b,wk,c=52.5)=>sn(Math.min(c,b+Math.floor(wk/2)*2.5));

// ══ EXERCISE GUIDE — tap ℹ on any exercise ══
const EX_GUIDE={
"Barbell Back Squat":{how:"Bar on upper traps (not neck). Feet shoulder-width, toes slightly out. Brace core hard — big breath, hold it. Push hips back and bend knees simultaneously. Descend until hip crease is below knee (below parallel). Drive up through whole foot. Exhale at top.",tips:"Look at a spot on the floor 6ft ahead — not up. Keep chest proud. Knees track over toes. If heels rise, elevate them on small plates until ankle mobility improves.",avoid:"Don't round lower back. Don't let knees cave inward. Don't half-rep — depth matters."},
"Barbell Back Squat (3-1-1)":{how:"Same as back squat but with tempo control: 3 seconds lowering, 1 second pause at the bottom, 1 second up. This dramatically increases time under tension for hypertrophy.",tips:"Count '1-Mississippi, 2-Mississippi, 3-Mississippi' on the way down. The pause at the bottom eliminates the stretch reflex — you have to generate force from a dead stop.",avoid:"Don't speed up the eccentric. The tempo IS the exercise. Use lighter weight than normal squats."},
"BB Front Squat":{how:"Bar rests on front deltoids with elbows high (fingertips under bar, elbows pointing forward). Feet shoulder-width. Descend straight down keeping torso very upright. Drive up.",tips:"If wrist flexibility is an issue, use cross-arm grip (arms crossed, hands on top of bar). Front squats force a more upright torso than back squats — great for quad emphasis.",avoid:"Don't let elbows drop — the bar will roll forward. Don't lean forward excessively."},
"Barbell Bench Press":{how:"Lie on bench, eyes under bar. Grip bar slightly wider than shoulders. Unrack. Lower bar to mid-chest (nipple line) with controlled speed. Touch chest lightly — don't bounce. Press up and slightly back toward rack. Lock out.",tips:"Squeeze shoulder blades together HARD before unracking — this creates a stable shelf. Arch your upper back slightly (not lower back). Feet flat on floor, driving into ground.",avoid:"Don't flare elbows 90° — keep them at ~45°. Don't bounce off chest. Don't lift hips off bench."},
"BB Bench Press":{how:"Same as Barbell Bench Press. Bar to mid-chest, controlled descent, press up. Shoulder blades pinched together for stability throughout.",tips:"Squeeze shoulder blades, slight upper back arch, feet flat and driving. Elbows at 45°.",avoid:"Don't bounce, don't flare elbows wide, don't lift hips."},
"Barbell OHP":{how:"Bar starts at upper chest/front shoulders. Grip just outside shoulders. Brace core. Press bar straight up, moving head back slightly to let bar pass face, then forward once bar clears. Lock out overhead with bar over mid-foot.",tips:"Squeeze glutes hard to protect lower back. Think about pushing yourself away from the bar. At 8ft ceiling, you may need to press seated — sit upright on bench set to 90°.",avoid:"Don't lean back excessively — that turns it into an incline press. Don't use leg drive (strict press)."},
"BB OHP":{how:"Same as Barbell OHP. Bar at upper chest, strict press overhead, lock out with bar over mid-foot.",tips:"Squeeze glutes, brace core. Seated if ceiling is too low for standing.",avoid:"Don't lean back. No leg drive."},
"Barbell RDL":{how:"Hold bar at hip height with overhand grip. Slight knee bend (10-15°) — keep this angle fixed throughout. Push hips BACK while lowering bar along thighs/shins. You should feel a deep stretch in hamstrings. Once bar reaches mid-shin or you feel max stretch, drive hips forward to stand.",tips:"The bar stays in contact with your legs the entire time — it slides along your thighs. Think 'close the car door with your butt' on the hinge. Use wrist straps when grip fails before hamstrings.",avoid:"Don't round your back — ever. Don't bend knees more as you descend. Don't look up (neutral neck)."},
"BB RDL":{how:"Same as Barbell RDL. Hinge at hips, slight fixed knee bend, bar slides along legs. Feel the hamstring stretch, then drive hips forward.",tips:"Bar stays on legs. Use straps for heavy sets. Slow 3s eccentric builds more muscle.",avoid:"Never round back. Fixed knee angle throughout."},
"Barbell Row":{how:"Hinge at hips to ~45° torso angle. Grip bar just outside knees (overhand). Pull bar to lower ribcage/belly button. Squeeze shoulder blades together at top. Lower with control.",tips:"Think about driving elbows behind you, not pulling with hands. Keep torso angle fixed — don't stand up during the pull. Use straps on heavy sets.",avoid:"Don't jerk the weight up with momentum. Don't stand upright during the row."},
"BB Hip Thrust":{how:"Sit on ground with upper back against bench edge. Roll barbell over hips (use squat pad). Feet flat, knees bent ~90°. Drive hips up by squeezing glutes until torso is parallel to ground. Pause 1-2s at top. Lower with control.",tips:"Chin stays tucked — look at the wall in front of you, not the ceiling. Drive through heels. Full glute squeeze at top. The squat pad is essential for comfort with heavy weight.",avoid:"Don't hyperextend lower back at top. Don't push through toes. Don't rush reps."},
"Bulgarian Split Squat":{how:"Stand 2 feet in front of bench. Place top of rear foot on bench behind you. Hold DBs at sides. Lower straight down until rear knee nearly touches floor. Front shin stays mostly vertical. Drive up through front heel.",tips:"Most of your weight should be on the front foot. If you feel it in your quads, lean torso slightly forward to shift to glutes. Start with lighter weight — balance is the hard part at first.",avoid:"Don't let front knee shoot way past toes. Don't lean back. Keep torso upright or slightly forward."},
"Pull-Up":{how:"Hang from bar with overhand grip slightly wider than shoulders. From dead hang (arms fully extended), pull until chin clears bar. Lower with control all the way back to dead hang.",tips:"Initiate by pulling shoulder blades down and back — don't start by bending arms. Think about driving elbows into your back pockets. If you can't do full pull-ups yet, use a resistance band looped over the bar and under your knees for assistance.",avoid:"Don't kip or swing. Don't do half-reps (full dead hang to chin over bar). Don't flare elbows."},
"Pull-Up (rack)":{how:"Same as Pull-Up using the rack's pull-up bar. Dead hang to chin over bar, controlled descent.",tips:"Band assistance if needed. Bent knees at 8ft ceiling. Full ROM every rep.",avoid:"No kipping. No half-reps."},
"Cable Face Pull":{how:"Set cable at face height with rope attachment. Step back to create tension. Pull rope toward face, separating hands and rotating externally so thumbs point behind you at the end. Squeeze rear delts and hold 1s.",tips:"This is a rear delt and rotator cuff exercise — use light weight and focus on the squeeze. Elbows should end up high and wide. Essential for shoulder health, especially with heavy pressing.",avoid:"Don't use heavy weight. Don't turn it into a row (elbows should be high, not low)."},
"Cable Lat Pulldown":{how:"Sit at cable with wide grip bar overhead. Pull bar to upper chest, driving elbows down and back. Squeeze lats at bottom. Return with control — let lats fully stretch at top.",tips:"Lean back very slightly (5-10°). Think about pulling elbows into your back pockets. Don't pull the bar behind your neck.",avoid:"Don't lean way back. Don't yank the weight. Full stretch at top."},
"Cable Pull-Through":{how:"Set cable at lowest position with rope between legs. Face away from machine. Hinge at hips with slight knee bend, letting rope pull you back. Drive hips forward by squeezing glutes to stand up. Rope ends at hip crease.",tips:"This is a hip hinge movement — same pattern as RDL but with cable tension. Great for learning the hinge pattern and glute activation.",avoid:"Don't squat the movement — it's a hinge (push hips back, not knees forward). Don't round back."},
"Cable Row":{how:"Sit or stand at cable. Pull handle to lower ribcage, squeezing shoulder blades together. Return with control. Full stretch at the front, full squeeze at the back.",tips:"Keep chest proud and torso stable. Don't rock back and forth. Think about squeezing a pencil between your shoulder blades.",avoid:"Don't use momentum. Don't round shoulders forward on the stretch."},
"Cable Curl":{how:"Stand at low cable with straight bar or rope. Curl weight up by bending elbows only. Squeeze biceps at top. Lower with control — 2s negative.",tips:"Keep elbows pinned to your sides — they don't move. Only your forearms move. Cable provides constant tension unlike dumbbells.",avoid:"Don't swing or lean back. Don't let elbows drift forward."},
"Cable Pushdown":{how:"Stand at high cable with rope attachment. Start with elbows at 90° pinned to sides. Push rope down by extending elbows until arms are straight. Spread rope ends apart at bottom for extra triceps squeeze. Return to 90°.",tips:"Keep elbows glued to your sides throughout. Only your forearms move. Lean very slightly forward from hips.",avoid:"Don't let elbows drift forward or flare out. Don't use body weight to push down."},
"Cable Curl + Pushdown":{how:"Superset: cable curl immediately followed by cable pushdown. Same form as individual exercises. No rest between the two movements.",tips:"Great for arm pump with minimal time. Alternate which you do first each session.",avoid:"Don't sacrifice form for speed."},
"Cable Kickback (ankle strap)":{how:"Attach ankle strap to low cable. Face machine, hold frame for balance. Drive working leg straight back, squeezing glute at top. Lower with control. Keep standing leg slightly bent.",tips:"Keep torso relatively upright — don't lean way forward. The movement is all in the hip joint. Squeeze and hold 1s at the back.",avoid:"Don't swing the leg. Don't arch lower back. Control the movement."},
"Cable Hip Abduction (ankle strap)":{how:"Attach ankle strap to low cable. Stand sideways to machine, strap on outside ankle. Drive working leg out to the side against cable resistance. Control the return.",tips:"Keep hips level — don't lean away from the cable. This targets the gluteus medius which stabilizes your hips during walking and squatting.",avoid:"Don't swing. Don't let the weight stack slam. Slow and controlled."},
"Incline DB Press":{how:"Set bench to 30° incline. Sit with DBs on thighs, kick them up as you lie back. Press DBs up from upper chest, arms at ~45° angle. Touch DBs lightly at top. Lower with control until DBs are at chest level.",tips:"30° targets upper chest. Don't go higher than 45° or it becomes a shoulder press. Keep feet flat and shoulder blades squeezed together like flat bench.",avoid:"Don't clank DBs together at top — touch lightly. Don't let elbows flare 90°."},
"Incline Curl":{how:"Set bench to 45°. Sit back with arms hanging straight down holding DBs. Curl up while keeping upper arms vertical. Squeeze at top. Lower with control — the stretch at the bottom is key.",tips:"The incline puts your biceps in a pre-stretched position, which builds the long head. Let arms hang fully at the bottom — feel that deep stretch.",avoid:"Don't swing or use momentum. Don't let elbows drift forward."},
"Lateral Raise":{how:"Stand holding DBs at sides. Raise arms out to sides until parallel with ground (T-shape). Slight bend in elbows throughout. Lower with control.",tips:"Lead with elbows, not hands. Think about pouring water out of a pitcher at the top. Use lighter weight than you think — this is an isolation movement.",avoid:"Don't shrug your traps up. Don't swing the weights. Don't go above shoulder height."},
"Dips (rack)":{how:"Grip rack dip handles. Start at top with arms locked out. Lower by bending elbows until upper arms are parallel to ground (~90° bend). Push back up to lockout.",tips:"Lean forward slightly to target chest more. Stay upright to target triceps more. If bodyweight is too easy, hang a plate from your dip belt.",avoid:"Don't go too deep (shoulder injury risk). Don't swing or kip. Control the descent."},
"Farmer Carry":{how:"Pick up heavy DBs (one in each hand). Stand tall — shoulders back, chest up, core braced. Walk in a straight line with controlled steps. Grip as hard as possible.",tips:"This builds grip strength, core stability, traps, and mental toughness. Walk the length of your floor space and back. Use chalk or straps only when grip completely fails.",avoid:"Don't lean to one side. Don't take tiny steps. Don't let shoulders round forward."},
"Walking Lunge":{how:"Hold DBs at sides. Step forward into a long stride. Lower until rear knee nearly touches ground. Drive through front heel to step forward into next rep on opposite leg. Alternate legs.",tips:"Long stride targets glutes. Short stride targets quads. Keep torso upright throughout. Each step is one rep per leg.",avoid:"Don't let front knee cave inward. Don't lean forward excessively."},
"Goblet Squat":{how:"Hold single DB vertically at chest (cup the top end like a goblet). Feet shoulder-width, toes out slightly. Squat down between your legs — elbows should track inside your knees. Stand back up.",tips:"The front-loaded weight forces an upright torso. Great for learning squat pattern and for high-rep hypertrophy work. Push knees out over toes.",avoid:"Don't lean forward. Don't let knees cave."},
"Sumo Squat":{how:"Wide stance (1.5× shoulder width), toes pointed out 45°. Hold single DB hanging between legs. Squat down until DB nearly touches floor. Drive up through heels. Squeeze glutes at top.",tips:"Wider stance hits inner thighs and glutes more than regular squat. Keep chest up and back straight throughout.",avoid:"Don't lean forward. Don't let knees cave inward."},
"Leg Curl (cable)":{how:"Attach ankle strap to low cable. Lie face down on bench with ankle strap on working leg hanging off the end. Curl heel toward butt by bending knee. Squeeze hamstring at top. Lower with control.",tips:"This isolates the hamstring — something RDLs and squats don't do well. Slow negatives build more muscle.",avoid:"Don't lift hips off bench. Don't rush the movement."},
"SL Calf Raise":{how:"Stand on one foot on edge of a step or plate. DB in same-side hand. Lower heel below the step level (full stretch). Rise up onto toes as high as possible (full contraction). Hold top 1s.",tips:"Full range of motion is everything on calves — deep stretch at bottom, full squeeze at top. Calves respond to slow reps and high volume.",avoid:"Don't bounce. Don't do half-reps. Don't rush."},
"Calf Raise":{how:"Same as SL Calf Raise but can be done single or double leg. Full stretch at bottom, full squeeze at top.",tips:"Hold the top position for 1-2 seconds. Calves are stubborn — they need volume and intensity to grow.",avoid:"Don't bounce. Full ROM."},
"Calf Raise (slow neg)":{how:"Same as calf raise but with a 3-second negative (lowering) phase on each rep. Rise up fast, lower for 3 slow seconds.",tips:"The slow eccentric creates more muscle damage (growth stimulus). Will be sore the first few times.",avoid:"Don't cheat the negative. Count 3 full seconds down every rep."},
"Ab Roller":{how:"Kneel on mat (use squat pad under knees for comfort). Grip roller handles. Start with roller under shoulders. Roll forward by extending at the hips and shoulders — arms and torso extend together. Go as far as you can control. Pull back by squeezing abs.",tips:"Start with partial range of motion and increase as you get stronger. Squeeze abs the entire time — think about pulling your belly button to your spine. This is one of the most effective core exercises that exists.",avoid:"Don't let lower back sag/arch. Don't go further than you can control. Don't use momentum."},
"Hanging Knee Raise":{how:"Hang from rack pull-up bar. Bring knees up toward chest by curling pelvis upward. Lower with control. Don't swing.",tips:"The key is CURLING your pelvis — not just lifting knees. Think about trying to show someone your belt buckle while hanging. If you swing, reset to dead hang before next rep.",avoid:"Don't swing or kip. Don't just lift knees without tilting pelvis (that's hip flexors, not abs)."},
"Weighted Plank":{how:"Set up in forearm plank position — elbows under shoulders, body in straight line. Have someone place a plate on your upper back, or position plate before getting into position. Hold.",tips:"Squeeze glutes, quads, and abs simultaneously. Don't just survive — actively brace everything. Breathe normally through the hold.",avoid:"Don't let hips sag. Don't pike hips up. Don't hold breath."},
"Backpack Walk":{how:"Fill a backpack with weight (plates, books, etc.) and wear it. Walk at a steady pace — upright posture, natural stride. If stairs are available, use them.",tips:"This is loaded walking — great for cardiovascular endurance, posture, and leg endurance. Simulates walking a golf course with a bag. Keep chest up.",avoid:"Don't lean forward. Don't shuffle — natural stride."},
"Push-Up (bench)":{how:"Feet elevated on bench, hands on floor. Body in straight line. Lower chest to floor by bending elbows. Push back up. The elevation makes it harder than regular push-ups.",tips:"Hands slightly wider than shoulders. Elbows at 45°. The decline angle targets upper chest more. If too hard, start with feet on floor.",avoid:"Don't sag hips. Don't flare elbows 90°."},
"Landmine Rotation":{how:"Place one end of barbell in landmine. Hold the other end at chest height with both hands. Feet shoulder-width. Rotate torso to swing bar in an arc from one hip to the opposite shoulder. Pivot back foot. Return to center and repeat other side.",tips:"This directly mimics the golf swing rotation pattern — rotational power from hips through core to upper body. Start with just the 45lb bar. Drive the rotation from your hips, not your arms.",avoid:"Don't keep feet planted (pivot the back foot). Don't use arms — drive from hips. Don't round back."},
"Landmine Press (SL)":{how:"Stand in staggered stance holding end of barbell at shoulder height with one hand. Press the bar up and forward at an angle until arm is extended. Lower with control. Switch sides.",tips:"The angled press path is more shoulder-friendly than vertical pressing. Great for golf — builds push-through power at impact. Stagger stance for core stability.",avoid:"Don't lean back. Don't lock elbow violently at top."},
"Landmine Squat to Press":{how:"Hold end of barbell at chest in both hands. Squat down. As you stand up, press the bar up and forward. Lower bar back to chest as you descend into next squat.",tips:"This is a full-body power movement — ground force through legs transfers to upper body press. Same energy transfer as generating clubhead speed in golf.",avoid:"Don't press and squat as separate movements — they should flow together."},
"Landmine Meadows Row":{how:"Stand perpendicular to barbell with the loaded end to your side. Hinge at hips. Grip the end of the bar with your outside hand (overhand). Row the bar up to your hip. Squeeze lat. Lower with control.",tips:"Named after bodybuilder John Meadows. The perpendicular stance creates a unique lat contraction you can't get from normal rows. Great for back thickness.",avoid:"Don't stand too close to the bar. Don't rotate torso — keep it square."},
"Landmine Anti-Rot Hold":{how:"Hold end of barbell extended at arms length in front of chest. Arms straight. Feet shoulder-width. Hold position — the offset weight tries to rotate you. Resist it. Hold 20 seconds each side.",tips:"This builds anti-rotation core stability — the ability to resist forces trying to twist you. Critical for golf swing consistency and preventing early release/casting.",avoid:"Don't let the bar pull you sideways. Stay perfectly square. Breathe normally."},
"Landmine RDL to Row":{how:"Stand at end of barbell. Hinge at hips holding bar end with one hand. When torso is parallel to ground, row the bar to your hip. Lower bar back down, then stand up by driving hips forward. That's one rep.",tips:"Combines posterior chain (hamstrings/glutes) with back work. Builds the hinge-pull pattern used in the golf downswing.",avoid:"Don't round back during hinge. Don't rush — each phase should be controlled."},
};

// Sessions: ~260/yr · Miles: ~1,500/yr · Calories: ~100K/yr · Volume: ~750K/yr · Hours: ~250/yr
const ACH_CATS=["GRIND","IRON","CARDIO","BODY","STREAK","LIFE","🦖 JURASSIC","⭐ STAR WARS","🎮 HALO","🎬 CULTURE","🏟️ SPORTS","👑 LEGEND"];
const MILES=[
  // ══ GRIND — SESSION COUNT + CONSISTENCY ══ (20)
  {id:"g1",n:"First Blood",d:"Complete first workout",c:"GRIND",i:"⚡",req:s=>s.total>=1},
  {id:"g2",n:"Getting Started",d:"5 sessions",c:"GRIND",i:"🔥",req:s=>s.total>=5},
  {id:"g3",n:"Double Digits",d:"10 sessions",c:"GRIND",i:"🔥",req:s=>s.total>=10},
  {id:"g4",n:"Quarter Century",d:"25 sessions (~1 month)",c:"GRIND",i:"💪",req:s=>s.total>=25},

// ══ WORKOUT ENGINE ══
function E(n,s,r,w,rest,note,muscle,subs){return{n,s:String(s),r,w:String(w),rest:rest||60,note:note||"",muscle:muscle||"",subs:subs||""}}
// Plate breakdown for display
function plateSplit(lbs){const v=parseInt(lbs);if(isNaN(v)||v<45)return"";if(v===45)return"empty bar";
  const ps=(v-45)/2;let r=ps,out=[];[45,35,25,15,10,10].forEach(p=>{if(r>=p){out.push(p);r-=p}});
  return out.length?out.map(p=>p+"lb").join("+")+" ea":""}
// Food macro targets
function macroTargets(wt,phase){
  const bmr=Math.round(88.362+(13.397*wt/2.205)+(4.799*178)-(5.677*30));
  const tdee=Math.round(bmr*1.55);
  const targets={1:{cal:tdee,pro:Math.round(wt*.9),note:"Maintenance — fuel endurance"},
    2:{cal:tdee-300,pro:Math.round(wt*1),note:"Deficit — prioritize protein"},
    3:{cal:tdee+100,pro:Math.round(wt*1),note:"Slight surplus — fuel muscle growth"},
    4:{cal:tdee,pro:Math.round(wt*.9),note:"Maintenance — sustain"}};
  const t=targets[phase]||targets[4];t.carb=Math.round((t.cal*.4)/4);t.fat=Math.round((t.cal*.3)/9);return t}

// ══ CALCS ══
const calc1RM=(w,r)=>r<=1?w:Math.round(w*(36/(37-r)));
const calcBMR=wt=>Math.round(88.362+(13.397*wt/2.205)+(4.799*178)-(5.677*30));
function calcReadiness(d,now){let s=100;
  for(let i=1;i<=3;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){s-=8;if((d.sessions[k].rating||0)>=4)s-=5;if((d.sessions[k].rating||0)>=5)s-=5}}
  let stk=0;for(let i=1;i<=7;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);if(d.sessions?.[dS(dt)]?.done)stk++}
  if(stk>=3&&stk<=5)s+=5;if(stk>=6)s-=10;
  // Sleep factor
  const lastSleep=d.sleep?.[dS(now)];
  if(lastSleep){if(lastSleep.hrs>=7&&lastSleep.q>=4)s+=10;else if(lastSleep.hrs>=6&&lastSleep.q>=3)s+=0;
    else if(lastSleep.hrs<6)s-=15;else if(lastSleep.q<=2)s-=10}
  return Math.max(20,Math.min(100,s))}
function getMR(d,now){const r={};MUSCLES.forEach(m=>r[m]={h:999,s:"fresh"});
  for(let i=0;i<4;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){const wo=getWorkout(k);(wo.muscles||[]).forEach(m=>{const h=i*24;
      if(r[m]&&h<r[m].h){r[m].h=h;r[m].s=h<24?"fatigued":h<48?"recovering":"fresh"}})}}return r}

// ══ SVG CHARTS ══
function SvgLine({data,dk,color,height=80}){
  if(!data||data.length<2)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Need more data</div>;
  const vals=data.map(d=>d[dk]||0),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const w=300,h=height,len=Math.max(vals.length,2);
  const pts=vals.map((v,i)=>[i/(len-1)*w,h-6-((v-mn)/rng)*(h-12)]);
  return <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
    <polygon points={`0,${h} ${pts.map(p=>p.join(",")).join(" ")} ${w},${h}`} fill={color} opacity="0.12"/>
    <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
    {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="2.5" fill={color}/>)}
  </svg>;
}
function SvgBar({data,dk,color,height=80}){
  if(!data||data.length<1)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Log sessions first</div>;
  const vals=data.map(d=>d[dk]||0),mx=Math.max(...vals)||1,w=300;
  const bw=Math.min(18,w/data.length-3);
  return <svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height}}>
    {vals.map((v,i)=>{const bh=Math.max(2,(v/mx)*(height-8));const x=i/data.length*w+(w/data.length-bw)/2;
      return <rect key={i} x={x} y={height-bh} width={bw} height={bh} rx="3" fill={color} opacity="0.65"/>})}
  </svg>;
}

        </Card>}
        {(data.measurements||[]).length>0&&<Card><Lbl>History</Lbl>
          {[...(data.measurements||[])].reverse().slice(0,8).map((m,i)=>
            <div key={i} style={{padding:"4px 0",borderBottom:`1px solid ${T.s3}`,fontSize:10}}>
              <div style={{color:T.sub,marginBottom:2}}>{dP(m.d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {m.waist>0&&<span>Waist:{m.waist}"</span>}{m.chest>0&&<span>Chest:{m.chest}"</span>}
                {m.arms>0&&<span>Arms:{m.arms}"</span>}{m.neck>0&&<span>Neck:{m.neck}"</span>}
                {m.thighs>0&&<span>Thighs:{m.thighs}"</span>}{m.bf>0&&<span>BF:{m.bf}%</span>}
                {m.muscle>0&&<span>Muscle:{m.muscle}</span>}
              </div></div>)}</Card>}
      </>}

      {/* FOOD TRACKER */}
      {profileTab==="food"&&<>
        <Card key={`food-${foodKey}`}><Lbl>🍽️ Log Food</Lbl>
          <input defaultValue="" onInput={e=>{foodRef.current.name=e.target.value}} placeholder="Item name (optional)"
            style={{width:"100%",padding:8,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,color:T.txt,fontSize:12,outline:"none",marginBottom:6}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:8}}>
            {[["cal","Calories*"],["pro","Protein (g)"],["carb","Carbs (g)"],["fat","Fat (g)"]].map(([k,l])=>
              <div key={k}><div style={{fontSize:7,color:T.dim,marginBottom:2}}>{l}</div>
                <input defaultValue="" onInput={e=>{foodRef.current[k]=e.target.value}} placeholder="0" type="number" inputMode="decimal"
                  style={{width:"100%",padding:6,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:6,color:k==="cal"?T.acc:T.txt,fontSize:12,fontWeight:600,textAlign:"center",outline:"none"}}
                  onKeyDown={e=>e.key==="Enter"&&addFood()}/></div>)}</div>
          <Btn onClick={addFood} style={{fontSize:11}}>ADD FOOD</Btn>
        </Card>

        {/* Daily Totals + Targets */}
        <Card>
          {(()=>{const tgt=macroTargets(lastW,gP(todayStr).id);return<>
          <Lbl>Today vs Target</Lbl>
          <div style={{fontSize:9,color:T.dim,marginBottom:8}}>{tgt.note} · TDEE-based</div>
          {[["Calories",todayFoodTotals.cal,tgt.cal,T.acc,""],["Protein",todayFoodTotals.pro,tgt.pro,T.blue,"g"],
            ["Carbs",todayFoodTotals.carb,tgt.carb,T.yel,"g"],["Fat",todayFoodTotals.fat,tgt.fat,T.red,"g"]
          ].map(([l,cur,goal,c,u])=><div key={l} style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
              <span style={{color:T.sub}}>{l}</span>
              <span><span style={{fontWeight:700,color:cur>goal*1.1?T.red:cur>=goal*.8?T.grn:T.txt}}>{cur}</span>
                <span style={{color:T.dim}}>/{goal}{u}</span></span></div>
            <div style={{height:4,background:T.s3,borderRadius:2,marginTop:2,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:2,background:cur>goal*1.1?T.red:c,width:`${Math.min(100,cur/goal*100)}%`,transition:"width .3s"}}/></div>
          </div>)}
          </>})()}
          {/* Macro bar */}
          {todayFoodTotals.cal>0&&<div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",marginTop:8}}>
            {todayFoodTotals.pro>0&&<div style={{flex:todayFoodTotals.pro*4,background:T.blue}}/>}
            {todayFoodTotals.carb>0&&<div style={{flex:todayFoodTotals.carb*4,background:T.yel}}/>}
            {todayFoodTotals.fat>0&&<div style={{flex:todayFoodTotals.fat*9,background:T.red}}/>}
          </div>}
          {todayFoodTotals.cal>0&&<div style={{display:"flex",justifyContent:"center",gap:8,marginTop:4}}>
            {[["Pro",T.blue,Math.round(todayFoodTotals.pro*4/todayFoodTotals.cal*100)],
              ["Carb",T.yel,Math.round(todayFoodTotals.carb*4/todayFoodTotals.cal*100)],
              ["Fat",T.red,Math.round(todayFoodTotals.fat*9/todayFoodTotals.cal*100)]
            ].map(([l,c,p])=><div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
              <div style={{width:6,height:6,borderRadius:3,background:c}}/><span style={{fontSize:8,color:T.dim}}>{l} {p||0}%</span></div>)}
          </div>}
        </Card>

        {/* Food List */}
        {todayFood.length>0&&<Card><Lbl>Items</Lbl>
          {todayFood.map((f,i)=>
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${T.s3}`}}>
              <div>
                <div style={{fontSize:11,fontWeight:600}}>{f.n}</div>
                <div style={{fontSize:9,color:T.dim}}>{f.pro}p · {f.carb}c · {f.fat}f</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Num style={{fontSize:14,color:T.acc}}>{f.cal}</Num>
                <button onClick={()=>removeFood(i)} style={{background:T.s3,border:"none",borderRadius:10,width:20,height:20,cursor:"pointer",
                  color:T.red,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div></div>)}
        </Card>}

        {/* Recent Days */}
        <Card><Lbl>Recent Days</Lbl>
          {Object.entries(data.food||{}).sort(([a],[b])=>b.localeCompare(a)).slice(0,7).map(([day,items])=>{
            const t=items.reduce((a,f)=>({c:a.c+f.cal,p:a.p+f.pro}),{c:0,p:0});
            return <div key={day} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${T.s3}`}}>
              <span style={{fontSize:10,color:T.sub}}>{dP(day).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
              <div style={{display:"flex",gap:8}}>
                <span style={{fontSize:10,fontWeight:600,color:T.acc}}>{t.c} cal</span>
                <span style={{fontSize:10,color:T.blue}}>{t.p}g pro</span>
              </div></div>})}
        </Card>
        {/* Weekly Average */}
        {Object.keys(data.food||{}).length>=3&&<Card><Lbl>📊 7-Day Average</Lbl>
          {(()=>{const days=Object.entries(data.food||{}).sort(([a],[b])=>b.localeCompare(a)).slice(0,7);
            const n=days.length;if(n===0)return null;
            const avg=days.reduce((a,[,items])=>{const t=items.reduce((x,f)=>({c:x.c+f.cal,p:x.p+f.pro,cb:x.cb+f.carb,ft:x.ft+f.fat}),{c:0,p:0,cb:0,ft:0});
              return{c:a.c+t.c,p:a.p+t.p,cb:a.cb+t.cb,ft:a.ft+t.ft}},{c:0,p:0,cb:0,ft:0});
            const tgt=macroTargets(lastW,gP(todayStr).id);
            return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,textAlign:"center"}}>
              {[["Cal",Math.round(avg.c/n),tgt.cal,T.acc],["Pro",Math.round(avg.p/n),tgt.pro,T.blue],
                ["Carb",Math.round(avg.cb/n),tgt.carb,T.yel],["Fat",Math.round(avg.ft/n),tgt.fat,T.red]
              ].map(([l,v,g,c])=><div key={l}>
                <Num style={{fontSize:18,color:v>g*1.1?T.red:v>=g*.8?T.grn:c}}>{v}</Num>
                <div style={{fontSize:7,color:T.dim}}>{l} avg</div>
                <div style={{fontSize:7,color:T.dim}}>/{g}</div>
              </div>)}
            </div>})()}
        </Card>}
      </>}

      {/* SLEEP */}
      {profileTab==="sleep"&&<>
        <Card><Lbl>😴 Log Sleep</Lbl>
          <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:T.dim,marginBottom:2}}>Hours</div>
              <input value={sleepInput.hrs} onChange={e=>setSleepInput(p=>({...p,hrs:e.target.value}))} placeholder="7.5" type="number" step="0.5"
                style={{width:"100%",padding:8,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,color:T.acc,fontFamily:"'Bebas Neue'",fontSize:22,textAlign:"center",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:9,color:T.dim,marginBottom:2}}>Quality</div>
              <div style={{display:"flex",gap:3}}>
                {[1,2,3,4,5].map(v=><button key={v} onClick={()=>setSleepInput(p=>({...p,q:v}))}
                  style={{width:26,height:26,borderRadius:13,border:`1px solid ${sleepInput.q>=v?T.yel:T.bdr}`,
                    background:sleepInput.q>=v?T.yel+"22":"transparent",color:sleepInput.q>=v?T.yel:T.dim,
                    fontSize:10,fontWeight:600,cursor:"pointer"}}>{"★"}</button>)}
              </div>
            </div>
          </div>
          <Btn onClick={logSleep} style={{fontSize:11}}>LOG SLEEP</Btn>
          <div style={{fontSize:9,color:T.dim,marginTop:6,textAlign:"center"}}>7+ hrs & 4+ stars = readiness boost. Under 6 hrs = readiness penalty.</div>
        </Card>

        {/* Sleep History */}
        <Card><Lbl>History</Lbl>
          {Object.keys(data.sleep||{}).length===0?<div style={{color:T.dim,fontSize:11,textAlign:"center",padding:10}}>No sleep data yet</div>:
          Object.entries(data.sleep).sort(([a],[b])=>b.localeCompare(a)).slice(0,14).map(([day,s])=>
            <div key={day} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${T.s3}`}}>
              <span style={{fontSize:10,color:T.sub}}>{dP(day).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:600,color:s.hrs>=7?T.grn:s.hrs>=6?T.yel:T.red}}>{s.hrs}h</span>
                <span style={{fontSize:10,color:T.yel}}>{"★".repeat(s.q)}</span>
              </div></div>)}
        </Card>

        {/* Sleep chart — hours bars + quality dots */}
        {Object.keys(data.sleep||{}).length>=3&&<Card><Lbl>Sleep Trend</Lbl>
          {(()=>{const entries=Object.entries(data.sleep).sort(([a],[b])=>a.localeCompare(b)).slice(-14);
            const maxH=Math.max(...entries.map(([,s])=>s.hrs),9);
            return <div style={{display:"flex",alignItems:"flex-end",gap:2,height:90}}>
              {entries.map(([d,s],i)=>{const hPct=s.hrs/maxH*100;const qColor=[T.red,T.red,T.yel,T.yel,T.grn,T.grn][s.q]||T.dim;
                return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end"}}>
                  <div style={{width:5,height:5,borderRadius:5,background:qColor,marginBottom:2}} title={`Q:${s.q}`}/>
                  <div style={{width:"80%",height:`${hPct}%`,background:s.hrs>=7?T.grn+"66":s.hrs>=6?T.yel+"66":T.red+"66",borderRadius:"3px 3px 0 0",minHeight:4}}/>
                  <div style={{fontSize:6,color:T.dim,marginTop:2}}>{s.hrs}</div>
                </div>})}
            </div>})()}
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:6}}>
            {[["Bar = hours",T.grn],["Dot = quality",T.yel]].map(([l,c])=>
              <div key={l} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,borderRadius:3,background:c}}/><span style={{fontSize:7,color:T.dim}}>{l}</span></div>)}
          </div>
        </Card>}
      </>}

      {/* GEAR */}
      {profileTab==="gear"&&<Card><Lbl>🏋️ Equipment</Lbl>
        {[["Power Rack + Cable Pulley (D1002)","1200 lb capacity. Squats, bench, pull-ups, lat pulldown, cable rows, face pulls, pushdowns, cable curls, cable kickbacks, cable woodchops"],
          ["Fitvids Olympic Barbell (7ft, 45 lb)","700 lb capacity. Back squat, bench, OHP, rows, RDL, hip thrust"],
          ["Fitvids Bumper Plates (280 lbs)","2×45, 2×35, 2×25, 2×15, 4×10 · Max bar load: 325 lbs · 24 loadable weights"],
          ["Moveta Adjustable DBs (5-52.5 lb)","15-in-1 dial adjust. Presses, rows, curls, carries, lunges, lateral raises"],
          ["NicePeople Adjustable Bench","660 lb capacity · 8 positions. Flat, incline 15-75°, decline. Foldable."],
          ["YPOO Magnetic Stationary Bike","Bluetooth app · 330 lb capacity. Intervals, tempo, Z2 rides, HIIT"],
          ["Jamestry Resistance Bands (5-125 lb)","5 levels. Pull-up assist, band pull-aparts, banded walks, mobility, warm-ups"],
          ["Landmine Attachment","Rack-mounted. Rotations, presses, Meadows rows, anti-rotation holds, squat-to-press"],
          ["Eocnrhe Weight Plate Tree","300 lb capacity. Organizes all plates + barbell storage post"],
          ["Vinsguir Ab Roller Wheel","Ab rollouts — one of the best core exercises. Kneeling and standing progressions"],
          ["DMoose Ankle Straps","Cable kickbacks, cable leg extensions, cable hip abductions, cable hamstring curls"],
          ["Bodyprox Knee Wraps (2-pack)","Joint support for heavy squats, leg press, lunges. Wrap tighter as weight increases"],
          ["Beast Rage Lifting Wrist Straps","Grip support for heavy RDLs, rows, farmer carries, shrugs. Use when grip fails before target muscle"],
          ["Power Guidance Squat Pad","Bar pad for hip thrusts, front squats, lunges. Protects neck/hips on heavy barbell work"],
          ["Etekcity Smart Scale","Bluetooth · Body weight, BMI, body fat %, muscle mass. Syncs to phone app"],
          ["ProsourceFit Floor Mats (24 sq ft)","½ inch EVA foam · 6 tiles. Impact protection under rack + floor work area"]
        ].map(([n,d],i)=><div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${T.s3}`}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:3,background:T.grn}}/><span style={{fontSize:11,fontWeight:600}}>{n}</span></div>
          <div style={{fontSize:9,color:T.dim,marginLeft:10,marginTop:1}}>{d}</div></div>)}</Card>}

      {/* BACKUP / RESTORE */}
      {profileTab==="backup"&&<>
        <Card><Lbl>💾 Backup Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Download a full JSON backup of all your data — sessions, sets, PRs, weight, measurements, food, sleep, everything.</div>
          <Btn onClick={backupData}>DOWNLOAD JSON BACKUP</Btn>
          <button onClick={()=>{let t=`HENDERSON.SYS EXPORT — ${new Date().toLocaleString()}\n\n`;
            t+=`WEIGHT (${data.weight.length} entries):\n`;data.weight.forEach(e=>t+=`${e.d}: ${e.w}\n`);
            t+=`\nSESSIONS (${Object.keys(data.sessions||{}).filter(k=>data.sessions[k]?.done).length} completed):\n`;
            Object.entries(data.sessions||{}).sort().forEach(([d,s])=>{if(s.done){t+=`${d}: ${getWorkout(d).label}${s.rating?` (${s.rating}/5)`:""}${s.notes?` — ${s.notes}`:""}\n`;
              if(s.sets)Object.entries(s.sets).forEach(([ex,sets])=>t+=`  ${ex}: ${sets.filter(Boolean).map(([w,r])=>`${w}×${r}`).join(", ")}\n`)}});
            t+=`\nPRs:\n`;Object.entries(data.prs||{}).sort(([,a],[,b])=>b.e1rm-a.e1rm).forEach(([n,p])=>t+=`${n}: ${p.w}×${p.r} (1RM: ${p.e1rm}) on ${p.d}\n`);
            navigator.clipboard.writeText(t).then(()=>alert("Copied to clipboard!")).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copied!")})}}
            style={{width:"100%",padding:10,marginTop:6,border:`1px dashed ${T.bdr}`,borderRadius:8,background:"transparent",cursor:"pointer",color:T.sub,fontSize:11,fontWeight:600}}>
            📋 COPY AS TEXT TO CLIPBOARD</button>
        </Card>
        <Card><Lbl>📂 Restore Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Upload a previously downloaded backup file to restore all data. This will overwrite current data.</div>
          <label style={{display:"block",width:"100%",padding:13,borderRadius:8,background:T.s2,border:`1px dashed ${T.bdr}`,
            textAlign:"center",cursor:"pointer",fontSize:12,fontWeight:600,color:T.sub}}>
            TAP TO SELECT BACKUP FILE
            <input type="file" accept=".json" onChange={restoreData} style={{display:"none"}}/>
          </label>
        </Card>
        <Card><Lbl style={{color:T.red}}>⚠️ Reset All Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Permanently delete all tracked data. This cannot be undone. Download a backup first.</div>
          <Btn onClick={resetData} style={{background:T.red}}>RESET EVERYTHING</Btn>
        </Card>
        <Card><Lbl>📦 Storage Usage</Lbl>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,color:T.sub}}>localStorage used</div>
            <div style={{fontSize:13,fontWeight:700,color:parseFloat(lsUsage)>4?T.red:parseFloat(lsUsage)>2?T.yel:T.grn}}>{lsUsage} MB / ~5 MB</div>
          </div>
          <div style={{height:6,background:T.s3,borderRadius:3,marginTop:6,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,background:parseFloat(lsUsage)>4?T.red:parseFloat(lsUsage)>2?T.yel:T.grn,
              width:`${Math.min(100,parseFloat(lsUsage)/5*100)}%`}}/></div>
          {parseFloat(lsUsage)>3&&<div style={{fontSize:9,color:T.yel,marginTop:4}}>⚠ Storage getting full. Download a backup and consider clearing old food data.</div>}
        </Card>
      </>}
    </>}

    </div>

    {/* NAV */}
    <div style={{position:"fixed",bottom:10,left:14,right:14,background:T.s1,borderRadius:20,padding:"6px 0",
      display:"flex",justifyContent:"space-around",boxShadow:"0 -4px 30px rgba(0,0,0,.5)",border:`1px solid ${T.s3}`,zIndex:20}}>
      {[{id:"home",i:"🏠"},{id:"train",i:"💪"},{id:"calendar",i:"📅"},{id:"stats",i:"📊"},{id:"profile",i:"👤"}].map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",
          alignItems:"center",gap:1,color:tab===t.id?T.acc:T.dim,padding:"6px 14px",fontSize:18}}>
          <span>{t.i}</span><span style={{fontSize:8,fontWeight:tab===t.id?700:500}}>{t.id}</span>
          {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:T.acc}}/>}
        </button>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
