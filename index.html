<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>

<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* ===== BIGGER FOR 32" @ 10ft ===== */
    --h2: 34px;
    --h3: 18px;
    --big: 42px;
    --base: 22px;
    --small: 16px;

    /* ticker size */
    --ticker: 26px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 92px 1fr 74px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 760px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 12px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 16px;
    display:flex; align-items:center; gap:8px;
  }
  .dot{
    width:10px;height:10px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.warn{background:var(--warn); box-shadow:0 0 14px rgba(255,211,122,.55)}
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.88;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.72)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:16px; right:16px; bottom:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .heroTitle{
    font-size: 40px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
  }
  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: var(--small);
    align-items:center;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 8px 12px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    font-size: 13px;
    font-weight: 950;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text);
    white-space:nowrap;
  }
  .tag.good{border-color: rgba(37,224,183,.35); background: rgba(37,224,183,.10); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.35); background: rgba(255,211,122,.10); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.35); background: rgba(255,107,134,.10); color:#ffd4dd}

  .stack{display:flex; flex-direction:column; gap:12px; min-height:0;}
  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height: 0;
  }
  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .miniTop .k{
    color: var(--muted);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .9px;
    font-weight: 950;
  }
  .miniTop .s{
    font-size: 14px;
    font-weight: 950;
    letter-spacing: .7px;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: var(--text);
    white-space:nowrap;
  }
  .bigLine{
    font-size: 40px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .smallLine{
    color: var(--muted);
    font-size: var(--base);
    line-height: 1.3;
  }
  .list{
    display:flex; flex-direction:column; gap:10px;
    font-variant-numeric: tabular-nums;
    overflow:hidden;
  }
  .li{
    display:flex; justify-content:space-between; gap:12px;
    font-size: 18px;
    font-weight: 900;
  }
  .li span:last-child{color:var(--muted); font-weight:950}
  .li span:first-child{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 72%}

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
    font-size: 18px;
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }
  .track{
    display:flex;
    gap:48px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll 30s linear infinite;
    font-weight: 950;
    font-size: var(--ticker);
  }
  .track span b{color:var(--muted)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }
  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title">Ambient Command Center</div>
      <div class="subtitle">space • earth • aurora • aircraft • iss • spacex • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="hd">
        <div class="h">NASA — Astronomy Picture of the Day</div>
        <div class="tag" id="apodTag">loading</div>
      </div>
      <div class="bd">
        <div class="hero">
          <img id="apodImg" alt="" src="" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Earth + Space</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
          <div class="mini" id="mod3"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  // Grandville-ish. Used for aircraft + local aurora "nearest cell"
  home: { lat: 42.9098, lon: -85.7631, name: "Grandville" },

  aircraftRadiusNm: 120,

  refreshMs: {
    apod:     60 * 60 * 1000,
    aurora:   5  * 60 * 1000,
    aircraft: 30 * 1000,
    iss:      12 * 1000,
    spacex:   5  * 60 * 1000,
    geocode:  60 * 1000
  },

  tickerBase: [
    "Ambient mode • live feeds only • no news",
    "APOD • Aurora • Aircraft • ISS • SpaceX"
  ]
};

/* ===== utils ===== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function haversineMi(lat1, lon1, lat2, lon2){
  const toRad = (x)=> x * Math.PI/180;
  const R = 3958.8;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function countdown(toDate){
  if(!toDate) return "—";
  const ms = toDate - new Date();
  if(ms <= 0) return "now";
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h ${m}m`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function moduleHTML(title, status, big, small, listLines){
  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${status}</div>
    </div>
    <div class="bigLine">${big}</div>
    <div class="smallLine">${small}</div>
    ${listLines && listLines.length ? `
      <div class="list">
        ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
      </div>
    ` : ``}
  `;
}

/* ===== aircraft helpers ===== */
const TYPE_MAP = {
  // Boeing
  B738: "Boeing 737-800",
  B737: "Boeing 737",
  B739: "Boeing 737-900",
  B752: "Boeing 757-200",
  B763: "Boeing 767-300",
  B77W: "Boeing 777-300ER",
  B788: "Boeing 787-8",
  B789: "Boeing 787-9",
  // Airbus
  A319: "Airbus A319",
  A320: "Airbus A320",
  A321: "Airbus A321",
  A20N: "Airbus A320neo",
  A21N: "Airbus A321neo",
  A332: "Airbus A330-200",
  A333: "Airbus A330-300",
  A359: "Airbus A350-900",
  // Airbus A220 (CSeries)
  BCS1: "Airbus A220-100",
  BCS3: "Airbus A220-300",
  // Embraer / regional
  E170: "Embraer E170",
  E175: "Embraer E175",
  E75L: "Embraer E175 (winglets)",
  E190: "Embraer E190",
  E195: "Embraer E195",
  CRJ9: "CRJ-900",
  CRJ7: "CRJ-700",
  // GA common
  P28R: "Piper Arrow",
  C172: "Cessna 172",
  SR22: "Cirrus SR22"
};

function friendlyType(code){
  if(!code) return "Unknown type";
  const c = String(code).toUpperCase().trim();
  return TYPE_MAP[c] || c;
}

// Very simple airline guess from callsign prefix (not perfect, but cool + fast)
const AIRLINE_PREFIX = {
  DAL: "Delta",
  UAL: "United",
  AAL: "American",
  SWA: "Southwest",
  JBU: "JetBlue",
  NKS: "Spirit",
  FFT: "Frontier",
  ASA: "Alaska",
  SKW: "SkyWest",
  RPA: "Republic",
  ENY: "Envoy",
  JIA: "PSA",
  AWI: "Air Wisconsin",
  UPS: "UPS",
  FDX: "FedEx"
};
function airlineFromCallsign(cs){
  if(!cs) return "Other";
  const m = String(cs).toUpperCase().replace(/[^A-Z0-9]/g,"").match(/^([A-Z]{3})/);
  if(!m) return "Other";
  return AIRLINE_PREFIX[m[1]] || "Other";
}

/* ===== Aurora helpers ===== */
function normLon(lon){
  let x = Number(lon);
  if(!Number.isFinite(x)) return null;
  if(x > 180) x = x - 360;
  return x;
}
function lastRow(arr){
  if(!Array.isArray(arr)) return null;
  for(let i=arr.length-1;i>=0;i--){
    const row = arr[i];
    if(Array.isArray(row)) return row;
  }
  return null;
}

/* ===== data state ===== */
let aurora = null;        // { kp, localProb, globalMax, ts, bz, speed, kpForecastMax }
let aircraft = null;      // { count, closest, list, topAirlines, highestAltFt }
let iss = null;           // { lat, lon, over, ts }
let spacex = null;        // { name, date, details, statusTag, displayTime }
let apod = null;

/* ===== NASA APOD ===== */
async function refreshApod(){
  try{
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
    apod = d;
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    if(d.media_type === "image" && d.url){
      $("apodImg").src = d.url;
    } else {
      $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
          <defs><linearGradient id='g' x1='0' x2='1'>
            <stop stop-color='#0b1020' offset='0'/><stop stop-color='#081018' offset='1'/>
          </linearGradient></defs>
          <rect width='100%' height='100%' fill='url(#g)'/>
          <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD is a video today</text>
          <text x='70' y='235' fill='#a7b0c2' font-size='34' font-family='Arial'>Showing placeholder background</text>
        </svg>
      `);
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const expl = (d.explanation || "").slice(0, 140).trim() + ((d.explanation||"").length > 140 ? "…" : "");
    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span style="margin-left:auto; color: var(--muted); font-weight:950;">${esc(expl)}</span>
    `;

    setUpdated();
  } catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
  }
}

/* ===== Aurora (OVATION + Kp + Solar Wind + Kp Forecast) ===== */
async function refreshAurora(){
  try{
    const ovationUrl = "https://services.swpc.noaa.gov/json/ovation_aurora_latest.json";
    const kpUrl      = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";
    const magUrl     = "https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json";
    const plasmaUrl  = "https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json";
    const kpFcUrl    = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json";

    const [ov, kp, mag, plasma, kpFc] = await Promise.all([
      getJson(ovationUrl),
      getJson(kpUrl),
      getJson(magUrl),
      getJson(plasmaUrl),
      getJson(kpFcUrl)
    ]);

    // current Kp
    let kpVal = null;
    if(Array.isArray(kp)){
      for(let i=kp.length-1; i>=0; i--){
        const row = kp[i];
        if(Array.isArray(row) && row.length >= 2){
          const cand = Number(row[1]);
          if(Number.isFinite(cand)){ kpVal = cand; break; }
        }
      }
    }

    // OVATION local + max
    const {lat, lon} = CONFIG.home;
    let bestDist = Infinity;
    let bestVal = null;
    let maxVal = 0;
    let obsTime = null;

    if(Array.isArray(ov)){
      for(const entry of ov){
        if(entry && typeof entry === "object" && entry.Observation_Time){
          obsTime = new Date(entry.Observation_Time);
          continue;
        }
        if(Array.isArray(entry) && entry.length >= 3){
          const eLon = normLon(entry[0]);
          const eLat = Number(entry[1]);
          const eVal = Number(entry[2]);
          if(Number.isFinite(eVal)) maxVal = Math.max(maxVal, eVal);
          if(Number.isFinite(eLat) && Number.isFinite(eLon) && Number.isFinite(eVal)){
            const d = (eLat-lat)*(eLat-lat) + (eLon-lon)*(eLon-lon);
            if(d < bestDist){ bestDist = d; bestVal = eVal; }
          }
        }
      }
    }

    // Solar wind: Bz + speed
    let bz = null;
    {
      const r = lastRow(mag);
      // ["time_tag","bx_gsm","by_gsm","bz_gsm","bt"]
      if(r && r.length >= 4){
        const cand = Number(r[3]);
        if(Number.isFinite(cand)) bz = cand;
      }
    }

    let speed = null;
    {
      const r = lastRow(plasma);
      // ["time_tag","density","speed","temperature"]
      if(r && r.length >= 3){
        const cand = Number(r[2]);
        if(Number.isFinite(cand)) speed = cand;
      }
    }

    // Kp forecast max
    let kpForecastMax = null;
    if(Array.isArray(kpFc)){
      let m = null;
      for(const row of kpFc){
        if(Array.isArray(row) && row.length >= 2){
          const v = Number(row[1]);
          if(Number.isFinite(v)) m = (m==null) ? v : Math.max(m, v);
        }
      }
      kpForecastMax = m;
    }

    aurora = {
      kp: kpVal,
      localProb: bestVal != null ? Math.round(bestVal) : null,
      globalMax: maxVal ? Math.round(maxVal) : null,
      ts: obsTime,
      bz,
      speed,
      kpForecastMax
    };
  } catch(e){
    aurora = null;
  }
}

/* ===== Aircraft overhead (airplanes.live) + airline mix + highest altitude ===== */
async function refreshAircraft(){
  try{
    const {lat, lon} = CONFIG.home;
    const r = CONFIG.aircraftRadiusNm;
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`;
    const d = await getJson(url);

    const list = Array.isArray(d) ? d : (Array.isArray(d?.ac) ? d.ac : (Array.isArray(d?.aircraft) ? d.aircraft : []));
    const cleaned = list
      .map(a => {
        const alat = Number(a.lat ?? a.latitude);
        const alon = Number(a.lon ?? a.longitude);
        const dist = (Number.isFinite(alat) && Number.isFinite(alon)) ? haversineMi(lat, lon, alat, alon) : null;

        const callsign = (a.flight ?? a.callsign ?? a.cs ?? "").toString().trim() || "UNKNOWN";
        const typeCode = (a.t ?? a.type ?? a.icao_type ?? a.icaoType ?? "").toString().trim();
        const alt = a.alt_baro ?? a.altitude ?? a.alt ?? null; // often feet
        const gs  = a.gs ?? a.speed ?? null;

        const airline = airlineFromCallsign(callsign);

        return {callsign, typeCode, alt, gs, dist, airline};
      })
      .sort((x,y) => (x.dist ?? 1e9) - (y.dist ?? 1e9));

    const closest = cleaned[0] || null;

    // highest altitude (treat as feet; if unknown, ignore)
    let highestAltFt = null;
    for(const x of cleaned){
      const a = Number(x.alt);
      if(Number.isFinite(a)){
        highestAltFt = (highestAltFt==null) ? a : Math.max(highestAltFt, a);
      }
    }

    // top airlines
    const counts = {};
    for(const x of cleaned){
      const k = x.airline || "Other";
      counts[k] = (counts[k] || 0) + 1;
    }
    const topAirlines = Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([name,cnt]) => ({name, cnt}));

    // list entries: TYPE (CODE) on left, callsign + distance on right
    const topList = cleaned.slice(0,5).map(x => ({
      left: `${friendlyType(x.typeCode)} (${(x.typeCode||"").toUpperCase() || "—"})`,
      right: `${x.callsign} • ${x.dist != null ? x.dist.toFixed(1) + "mi" : "—"}`
    }));

    aircraft = {
      count: cleaned.length,
      closest,
      list: topList,
      topAirlines,
      highestAltFt
    };
  } catch(e){
    aircraft = null;
  }
}

/* ===== ISS position (HTTPS) + "Over:" reverse geocode ===== */
async function refreshISS(){
  try{
    const d = await getJson("https://api.wheretheiss.at/v1/satellites/25544");
    iss = {
      lat: Number(d.latitude),
      lon: Number(d.longitude),
      ts: new Date(),
      over: iss?.over ?? "Locating…"
    };
  } catch(e){
    iss = null;
  }
}

// Reverse geocode with BigDataCloud (CORS-friendly)
async function refreshISSOver(){
  if(!iss || !Number.isFinite(iss.lat) || !Number.isFinite(iss.lon)) return;
  try{
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${iss.lat}&longitude=${iss.lon}&localityLanguage=en`;
    const g = await getJson(url);

    const locality = g.locality || g.city || "";
    const region   = g.principalSubdivision || "";
    const country  = g.countryName || "";

    // Ocean detection (best-effort)
    const ocean = g.localityInfo?.informative?.find(x => (x.description||"").toLowerCase().includes("ocean"))?.name;

    let over = "";
    if(ocean) over = ocean;
    else if(locality && country) over = `${locality}${region && region !== locality ? ", " + region : ""}, ${country}`;
    else if(region && country) over = `${region}, ${country}`;
    else if(country) over = country;
    else over = "Open ocean / remote";

    iss.over = over;
  } catch(e){
    iss.over = "Unknown";
  }
}

/* ===== SpaceX next launch (handle stale/past date) ===== */
async function refreshSpaceX(){
  try{
    const d = await getJson("https://api.spacexdata.com/v5/launches/next");
    const date = d.date_utc ? new Date(d.date_utc) : null;

    let statusTag = "NEXT";
    let displayTime = "";
    if(date){
      const ms = date - new Date();
      if(ms < -60*60*1000){
        statusTag = "TBD";
        displayTime = "Awaiting updated time";
      } else {
        displayTime = `T-minus ${countdown(date)}`;
      }
    } else {
      statusTag = "TBD";
      displayTime = "Time TBD";
    }

    spacex = {
      name: d.name || "Next launch",
      date,
      details: d.details || "",
      statusTag,
      displayTime
    };
  } catch(e){
    spacex = null;
  }
}

/* ===== Render modules + ticker ===== */
let phase = 0;

function buildTicker(){
  const live = [];

  if(apod?.title){
    live.push(`APOD • <b>${esc(apod.title)}</b>`);
  }

  if(aurora){
    const kp = (aurora.kp != null) ? `Kp <b>${esc(aurora.kp.toFixed ? aurora.kp.toFixed(1) : aurora.kp)}</b>` : `Kp <b>—</b>`;
    const local = (aurora.localProb != null) ? `local <b>${esc(aurora.localProb)}%</b>` : `local <b>—</b>`;
    const extras = [
      aurora.speed != null ? `SW <b>${esc(Math.round(aurora.speed))}</b> km/s` : null,
      aurora.bz != null ? `Bz <b>${esc(aurora.bz.toFixed(1))}</b> nT` : null
    ].filter(Boolean).join(" • ");
    live.push(`Aurora • ${kp} • ${local}${extras ? " • " + extras : ""}`);
  } else {
    live.push(`Aurora • <b>loading</b>`);
  }

  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const kind = c ? friendlyType(c.typeCode) : "—";
    const cTxt = c ? `${esc(kind)} • ${esc(c.callsign)} • ${c.dist != null ? c.dist.toFixed(1)+"mi" : "—"}` : "—";
    live.push(`Aircraft • <b>${esc(n)}</b> in range • closest <b>${cTxt}</b>`);
    if(aircraft.highestAltFt != null){
      live.push(`Sky scan • highest altitude <b>${esc(Math.round(aircraft.highestAltFt).toLocaleString())}</b> ft`);
    }
  } else {
    live.push(`Aircraft • <b>loading</b>`);
  }

  if(iss){
    live.push(`ISS • <b>${esc(iss.over || "Locating…")}</b>`);
  } else {
    live.push(`ISS • <b>loading</b>`);
  }

  if(spacex){
    live.push(`SpaceX • <b>${esc(spacex.name)}</b> • <b>${esc(spacex.displayTime || "—")}</b>`);
  } else {
    live.push(`SpaceX • <b>loading</b>`);
  }

  const lines = [...CONFIG.tickerBase, ...live].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

function renderRight(){
  const blocks = [];

  // ISS
  if(iss){
    const big = iss.over ? `Over: ${iss.over}` : "Locating…";
    const small = `Updated ${fmtTime(iss.ts)} • lat ${Number.isFinite(iss.lat) ? iss.lat.toFixed(2) : "—"} • lon ${Number.isFinite(iss.lon) ? iss.lon.toFixed(2) : "—"}`;
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag good">LIVE</span>`, esc(big), esc(small), [])
    });
  } else {
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag warn">LIVE</span>`, "—", "Waiting on data…", [])
    });
  }

  // SpaceX
  if(spacex){
    const tagClass = spacex.statusTag === "TBD" ? "warn" : "good";
    const big = esc(spacex.name || "Next launch");
    const small = esc(spacex.displayTime || "—");
    const det = (spacex.details||"").slice(0, 90).trim();
    blocks.push({
      html: moduleHTML("SpaceX", `<span class="tag ${tagClass}">${esc(spacex.statusTag)}</span>`, big, det ? `${small} • ${esc(det)}…` : small, [])
    });
  } else {
    blocks.push({
      html: moduleHTML("SpaceX", `<span class="tag warn">NEXT</span>`, "—", "Waiting on data…", [])
    });
  }

  // Aurora (richer)
  if(aurora){
    const kpTag = aurora.kp != null ? `KP ${aurora.kp.toFixed ? aurora.kp.toFixed(1) : aurora.kp}` : "KP —";
    const local = aurora.localProb != null ? `${aurora.localProb}%` : "—";
    const stamp = aurora.ts ? `Updated ${fmtTime(aurora.ts)}` : "Updated recently";
    const extras = [
      aurora.globalMax != null ? `global max ${aurora.globalMax}%` : null,
      aurora.speed != null ? `SW ${Math.round(aurora.speed)} km/s` : null,
      aurora.bz != null ? `Bz ${aurora.bz.toFixed(1)} nT` : null,
      aurora.kpForecastMax != null ? `Kp fcst max ${aurora.kpForecastMax.toFixed(1)}` : null
    ].filter(Boolean).join(" • ");
    blocks.push({
      html: moduleHTML("Aurora Forecast", `<span class="tag good">${esc(kpTag)}</span>`, esc(local), esc(`${stamp}${extras ? " • " + extras : ""}`), [])
    });
  } else {
    blocks.push({
      html: moduleHTML("Aurora Forecast", `<span class="tag warn">NOAA</span>`, "—", "Waiting on data…", [])
    });
  }

  // Aircraft (type-first + airline mix + highest altitude)
  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const closestType = c ? friendlyType(c.typeCode) : "—";
    const closestDist = c?.dist != null ? `${c.dist.toFixed(1)}mi` : "—";
    const closestCs = c?.callsign || "—";

    const highest = aircraft.highestAltFt != null
      ? `${Math.round(aircraft.highestAltFt).toLocaleString()} ft`
      : "—";

    const topMix = (aircraft.topAirlines || []).map(x => `${x.name} ${x.cnt}`).join(" • ");
    const small = `Closest: ${closestType} • ${closestCs} • ${closestDist} • Highest: ${highest}${topMix ? " • Top: " + topMix : ""}`;

    blocks.push({
      html: moduleHTML(
        "Aircraft Overhead",
        `<span class="tag good">RANGE ${esc(CONFIG.aircraftRadiusNm)} nm</span>`,
        esc(`${n} aircraft`),
        esc(small),
        aircraft.list || []
      )
    });
  } else {
    blocks.push({
      html: moduleHTML(
        "Aircraft Overhead",
        `<span class="tag warn">RANGE ${esc(CONFIG.aircraftRadiusNm)} nm</span>`,
        "—",
        "Waiting on data…",
        []
      )
    });
  }

  // rotate 3 at a time
  const pick = (arr, start) => [arr[start%arr.length], arr[(start+1)%arr.length], arr[(start+2)%arr.length]];
  const chosen = pick(blocks, phase);

  $("mod1").className = "mini fade"; $("mod1").innerHTML = chosen[0].html;
  $("mod2").className = "mini fade"; $("mod2").innerHTML = chosen[1].html;
  $("mod3").className = "mini fade"; $("mod3").innerHTML = chosen[2].html;

  $("rightHd").textContent = ["Earth + Space", "Live Systems", "Sky + Orbit"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
  buildTicker();
  setUpdated();
}

/* ===== Start loops ===== */
refreshApod();
refreshAurora();
refreshAircraft();
refreshISS();
refreshSpaceX();
renderRight();

setInterval(refreshISSOver, CONFIG.refreshMs.geocode);

setInterval(refreshApod,     CONFIG.refreshMs.apod);
setInterval(refreshAurora,   CONFIG.refreshMs.aurora);
setInterval(refreshAircraft, CONFIG.refreshMs.aircraft);
setInterval(refreshISS,      CONFIG.refreshMs.iss);
setInterval(refreshSpaceX,   CONFIG.refreshMs.spacex);

setInterval(renderRight, 22 * 1000);
setTimeout(refreshISSOver, 2500);
</script>
