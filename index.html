<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>
<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    --h1: 54px;
    --h2: 28px;
    --h3: 16px;
    --big: 36px;
    --base: 18px;
    --small: 14px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 88px 1fr 60px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 760px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 12px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 14px;
    display:flex; align-items:center; gap:8px;
  }
  .dot{
    width:9px;height:9px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.warn{background:var(--warn); box-shadow:0 0 14px rgba(255,211,122,.55)}
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.88;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.72)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:16px; right:16px; bottom:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .heroTitle{
    font-size: 34px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
  }
  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: 14px;
    align-items:center;
  }
  .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 7px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    font-size: 12px;
    font-weight: 950;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text);
  }
  .tag.good{border-color: rgba(37,224,183,.35); background: rgba(37,224,183,.10); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.35); background: rgba(255,211,122,.10); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.35); background: rgba(255,107,134,.10); color:#ffd4dd}

  .stack{display:flex; flex-direction:column; gap:12px; min-height:0;}
  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height: 0;
  }
  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .miniTop .k{
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .9px;
    font-weight: 950;
  }
  .miniTop .s{
    font-size: 12px;
    font-weight: 950;
    letter-spacing: .7px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: var(--text);
    white-space:nowrap;
  }
  .bigLine{
    font-size: 30px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .smallLine{
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }
  .list{
    display:flex; flex-direction:column; gap:8px;
    font-variant-numeric: tabular-nums;
    overflow:hidden;
  }
  .li{
    display:flex; justify-content:space-between; gap:10px;
    font-size: 15px;
    font-weight: 900;
  }
  .li span:last-child{color:var(--muted); font-weight:950}
  .li span:first-child{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 65%}

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }
  .track{
    display:flex;
    gap:40px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll 26s linear infinite;
    font-weight: 900;
    font-size: 18px;
  }
  .track span b{color:var(--muted)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }
  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title" id="hdrTitle">Ambient Command Center</div>
      <div class="subtitle" id="hdrSub">space • earth • weather • aurora • aircraft • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <!-- LEFT: NASA APOD Hero -->
    <section class="card">
      <div class="hd"><div class="h">NASA — Astronomy Picture of the Day</div><div class="tag" id="apodTag">loading</div></div>
      <div class="bd">
        <div class="hero">
          <img id="apodImg" alt="" src="" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT: modules -->
    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
          <div class="mini" id="mod3"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  // Grandville-ish. Change whenever.
  weather: { lat: 42.9098, lon: -85.7631, name: "Grandville" },

  // aircraft radius (nautical miles). 80–150 is a nice range.
  aircraftRadiusNm: 120,

  refreshMs: {
    apod:    60 * 60 * 1000,     // hourly
    weather: 10 * 60 * 1000,     // 10 min
    aurora:  5 * 60 * 1000,      // 5 min
    aircraft: 30 * 1000,         // 30 sec
    iss:     10 * 1000,          // 10 sec
    spacex:  5 * 60 * 1000       // 5 min
  },

  // base ticker: keep it tight, then we add live facts dynamically
  tickerBase: [
    "Ambient mode • live feeds only • no news",
    "Aurora • Aircraft • ISS • SpaceX • Weather • APOD"
  ]
};

/* ===== utils ===== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function haversineMi(lat1, lon1, lat2, lon2){
  const toRad = (x)=> x * Math.PI/180;
  const R = 3958.8;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function countdown(toDate){
  if(!toDate) return "—";
  const ms = toDate - new Date();
  if(ms <= 0) return "now";
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h ${m}m`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function moduleHTML(title, status, big, small, listLines){
  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${esc(status)}</div>
    </div>
    <div class="bigLine">${esc(big)}</div>
    <div class="smallLine">${esc(small)}</div>
    ${listLines && listLines.length ? `
      <div class="list">
        ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
      </div>
    ` : ``}
  `;
}

/* ===== Data state ===== */
let apod = null;
let wx = null;
let aurora = null;       // { kp: number|null, localProb: number|null, globalMax: number|null, ts: Date|null }
let aircraft = null;     // { count: number, closest: {...}, list: [...] }
let iss = null;          // { lat, lon, alt_mi, vel_mph, ts }
let spacex = null;       // { name, date, details }

/* ===== NASA APOD (DEMO_KEY) ===== */
async function refreshApod(){
  try{
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
    apod = d;
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    if(d.media_type === "image" && d.url){
      $("apodImg").src = d.url;
    } else {
      $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
          <defs><linearGradient id='g' x1='0' x2='1'>
            <stop stop-color='#0b1020' offset='0'/><stop stop-color='#081018' offset='1'/>
          </linearGradient></defs>
          <rect width='100%' height='100%' fill='url(#g)'/>
          <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD is a video today</text>
          <text x='70' y='235' fill='#a7b0c2' font-size='34' font-family='Arial'>Showing placeholder background</text>
        </svg>
      `);
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const expl = (d.explanation || "").slice(0, 150).trim() + ((d.explanation||"").length > 150 ? "…" : "");
    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span style="margin-left:auto; color: var(--muted); font-weight:900;">${esc(expl)}</span>
    `;

    setUpdated();
  } catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
  }
}

/* ===== Weather (Open-Meteo, Fahrenheit) ===== */
async function refreshWeather(){
  try{
    const {lat, lon} = CONFIG.weather;
    const url =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,wind_speed_10m` +
      `&hourly=temperature_2m` +
      `&forecast_days=1&timezone=auto` +
      `&temperature_unit=fahrenheit&windspeed_unit=mph`;
    const d = await getJson(url);

    const t = d.current?.temperature_2m;
    const w = d.current?.wind_speed_10m;
    const unitT = d.current_units?.temperature_2m || "°F";
    const unitW = d.current_units?.wind_speed_10m || "mph";
    const hrs = d.hourly?.temperature_2m?.slice(0, 6) || [];
    wx = { t, w, unitT, unitW, trend: hrs };
  } catch(e){
    wx = null;
  }
}

/* ===== Aurora (NOAA SWPC OVATION + Kp) =====
   OVATION grid: [lon, lat, intensity%]. We nearest-match to your location. :contentReference[oaicite:3]{index=3} */
async function refreshAurora(){
  try{
    const ovationUrl = "https://services.swpc.noaa.gov/json/ovation_aurora_latest.json";
    const kpUrl      = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";

    const [ov, kp] = await Promise.all([getJson(ovationUrl), getJson(kpUrl)]);

    // KP json is typically an array of rows; we take last numeric Kp we can find.
    let kpVal = null;
    if(Array.isArray(kp)){
      for(let i=kp.length-1; i>=0; i--){
        const row = kp[i];
        // row sometimes like [time_tag, kp, ...]
        const cand = Array.isArray(row) ? row.find(x => typeof x === "number") : null;
        if(typeof cand === "number"){ kpVal = cand; break; }
      }
    }

    const {lat, lon} = CONFIG.weather;
    let best = {dist: 1e9, val: null};
    let maxVal = 0;
    let ts = null;

    if(Array.isArray(ov)){
      // ov[0] has metadata sometimes; safe parse:
      for(const entry of ov){
        if(Array.isArray(entry) && entry.length >= 3){
          const eLon = Number(entry[0]);
          const eLat = Number(entry[1]);
          const eVal = Number(entry[2]);
          if(Number.isFinite(eVal)) maxVal = Math.max(maxVal, eVal);
          if(Number.isFinite(eLat) && Number.isFinite(eLon) && Number.isFinite(eVal)){
            const d = (eLat-lat)*(eLat-lat) + (eLon-lon)*(eLon-lon);
            if(d < best.dist){ best = {dist:d, val:eVal}; }
          }
        } else if(entry && typeof entry === "object" && entry.Observation_Time){
          ts = new Date(entry.Observation_Time);
        }
      }
    }

    aurora = {
      kp: kpVal,
      localProb: best.val != null ? Math.round(best.val) : null,
      globalMax: maxVal ? Math.round(maxVal) : null,
      ts: ts
    };
  } catch(e){
    aurora = null;
  }
}

/* ===== Aircraft overhead (airplanes.live) =====
   Use HTTPS endpoint /v2/point/lat/lon/radius. :contentReference[oaicite:4]{index=4} */
async function refreshAircraft(){
  try{
    const {lat, lon} = CONFIG.weather;
    const r = CONFIG.aircraftRadiusNm;
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`;
    const d = await getJson(url);

    // The API returns a list of aircraft objects (varies), commonly in d.ac or directly array.
    const list = Array.isArray(d) ? d : (Array.isArray(d?.ac) ? d.ac : (Array.isArray(d?.aircraft) ? d.aircraft : []));
    const cleaned = list
      .map(a => {
        const alat = Number(a.lat ?? a.latitude);
        const alon = Number(a.lon ?? a.longitude);
        const dist = (Number.isFinite(alat) && Number.isFinite(alon)) ? haversineMi(lat, lon, alat, alon) : null;

        // Common-ish fields:
        const callsign = (a.flight ?? a.callsign ?? a.cs ?? "").toString().trim() || "UNKNOWN";
        const type = (a.t ?? a.type ?? a.icao_type ?? "").toString().trim();
        const reg = (a.r ?? a.reg ?? a.registration ?? "").toString().trim();
        const alt = a.alt_baro ?? a.altitude ?? a.alt ?? null;
        const gs  = a.gs ?? a.speed ?? null;

        return {callsign, type, reg, alt, gs, dist};
      })
      .sort((x,y) => (x.dist ?? 1e9) - (y.dist ?? 1e9));

    const closest = cleaned[0] || null;
    const topList = cleaned.slice(0,5).map(x => ({
      left: `${x.callsign}${x.type ? " • " + x.type : ""}`,
      right: `${x.dist != null ? x.dist.toFixed(1) + "mi" : "—"}`
    }));

    aircraft = {
      count: cleaned.length,
      closest,
      list: topList
    };
  } catch(e){
    aircraft = null;
  }
}

/* ===== ISS (FIXED: HTTPS wheretheiss.at) ===== :contentReference[oaicite:5]{index=5} */
async function refreshISS(){
  try{
    const d = await getJson("https://api.wheretheiss.at/v1/satellites/25544");
    // d gives latitude, longitude, altitude (km), velocity (km/h)
    const lat = Number(d.latitude);
    const lon = Number(d.longitude);
    const altKm = Number(d.altitude);
    const velKmh = Number(d.velocity);

    const kmToMi = 0.621371;
    iss = {
      lat, lon,
      alt_mi: Number.isFinite(altKm) ? (altKm * kmToMi) : null,
      vel_mph: Number.isFinite(velKmh) ? (velKmh * kmToMi) : null,
      ts: new Date()
    };
  } catch(e){
    iss = null;
  }
}

/* ===== SpaceX next launch ===== */
async function refreshSpaceX(){
  try{
    const d = await getJson("https://api.spacexdata.com/v5/launches/next");
    spacex = {
      name: d.name || "Next launch",
      date: d.date_utc ? new Date(d.date_utc) : null,
      details: d.details || ""
    };
  } catch(e){
    spacex = null;
  }
}

/* ===== Render right modules + ticker ===== */
let phase = 0;

function buildTicker(){
  const live = [];

  // Weather
  if(wx?.t != null){
    live.push(`${esc(CONFIG.weather.name)} <b>${esc(Math.round(wx.t))}${esc(wx.unitT)}</b> • wind <b>${esc(Math.round(wx.w||0))}${esc(wx.unitW)}</b>`);
  } else {
    live.push(`${esc(CONFIG.weather.name)} weather <b>loading</b>`);
  }

  // Aurora
  if(aurora){
    const kp = (aurora.kp != null) ? `Kp <b>${esc(aurora.kp)}</b>` : `Kp <b>—</b>`;
    const local = (aurora.localProb != null) ? `local <b>${esc(aurora.localProb)}%</b>` : `local <b>—</b>`;
    const max = (aurora.globalMax != null) ? `global max <b>${esc(aurora.globalMax)}%</b>` : ``;
    live.push(`Aurora • ${kp} • ${local}${max ? " • " + max : ""}`);
  } else {
    live.push(`Aurora • <b>loading</b>`);
  }

  // Aircraft
  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const cTxt = c ? `${esc(c.callsign)} • ${c.dist != null ? c.dist.toFixed(1)+"mi" : "—"}` : "—";
    live.push(`Aircraft overhead • <b>${esc(n)}</b> in range • closest <b>${cTxt}</b>`);
  } else {
    live.push(`Aircraft overhead • <b>loading</b>`);
  }

  // ISS
  if(iss){
    live.push(`ISS • <b>${iss.alt_mi ? iss.alt_mi.toFixed(0) : "—"} mi</b> altitude • <b>${iss.vel_mph ? iss.vel_mph.toFixed(0) : "—"} mph</b>`);
  } else {
    live.push(`ISS • <b>loading</b>`);
  }

  // SpaceX
  if(spacex?.date){
    live.push(`SpaceX • <b>${esc(spacex.name)}</b> • T-minus <b>${esc(countdown(spacex.date))}</b>`);
  } else if(spacex?.name){
    live.push(`SpaceX • <b>${esc(spacex.name)}</b> • <b>time TBD</b>`);
  } else {
    live.push(`SpaceX • <b>loading</b>`);
  }

  const lines = [...CONFIG.tickerBase, ...live].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

function renderRight(){
  const blocks = [];

  // WEATHER block
  if(wx){
    const t = `${Math.round(wx.t)}${wx.unitT}`;
    const wind = `${Math.round(wx.w||0)}${wx.unitW}`;
    const trend = (wx.trend||[]).slice(0,6).map((v,i)=>({left:`+${i}h`, right:`${Math.round(v)}${wx.unitT}`}));
    blocks.push({ html: moduleHTML("Weather", CONFIG.weather.name, t, `Wind ${wind} • next hours`, trend) });
  } else {
    blocks.push({ html: moduleHTML("Weather", CONFIG.weather.name, "—", "Waiting on data…", []) });
  }

  // AURORA block
  if(aurora){
    const kp = aurora.kp != null ? `Kp ${aurora.kp}` : "Kp —";
    const local = aurora.localProb != null ? `${aurora.localProb}%` : "—";
    const max = aurora.globalMax != null ? `global max ${aurora.globalMax}%` : "global max —";
    const stamp = aurora.ts ? `Updated ${fmtTime(aurora.ts)}` : "Updated recently";
    blocks.push({ html: moduleHTML("Aurora Forecast", kp, local, `${stamp} • ${max}`, []) });
  } else {
    blocks.push({ html: moduleHTML("Aurora Forecast", "NOAA", "—", "Waiting on data…", []) });
  }

  // AIRCRAFT block
  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const big = `${n} aircraft`;
    const small = c ? `Closest: ${c.callsign}${c.type ? " • "+c.type : ""} • ${c.dist != null ? c.dist.toFixed(1)+"mi" : "—"}` : "Closest: —";
    blocks.push({ html: moduleHTML("Aircraft Overhead", `${CONFIG.aircraftRadiusNm} nm radius`, big, small, aircraft.list || []) });
  } else {
    blocks.push({ html: moduleHTML("Aircraft Overhead", `${CONFIG.aircraftRadiusNm} nm radius`, "—", "Waiting on data…", []) });
  }

  // ISS block
  if(iss){
    const big = `${iss.alt_mi ? iss.alt_mi.toFixed(0) : "—"} mi`;
    const small = `Speed ${iss.vel_mph ? iss.vel_mph.toFixed(0) : "—"} mph • ${fmtTime(iss.ts)}`;
    const list = [
      {left:"Lat", right: Number.isFinite(iss.lat) ? iss.lat.toFixed(2) : "—"},
      {left:"Lon", right: Number.isFinite(iss.lon) ? iss.lon.toFixed(2) : "—"}
    ];
    blocks.push({ html: moduleHTML("ISS Position", "LIVE", big, small, list) });
  } else {
    blocks.push({ html: moduleHTML("ISS Position", "LIVE", "—", "Waiting on data…", []) });
  }

  // SpaceX block
  if(spacex){
    const big = spacex.name || "Next launch";
    const small = spacex.date ? `T-minus ${countdown(spacex.date)}` : "Time TBD";
    const det = (spacex.details||"").slice(0, 90).trim();
    blocks.push({ html: moduleHTML("SpaceX", "NEXT", big, det ? `${small} • ${det}…` : small, []) });
  } else {
    blocks.push({ html: moduleHTML("SpaceX", "NEXT", "—", "Waiting on data…", []) });
  }

  // Pick 3 modules each rotation for variety
  const pick = (arr, start) => [arr[start%arr.length], arr[(start+1)%arr.length], arr[(start+2)%arr.length]];
  const chosen = pick(blocks, phase);

  $("mod1").className = "mini fade"; $("mod1").innerHTML = chosen[0].html;
  $("mod2").className = "mini fade"; $("mod2").innerHTML = chosen[1].html;
  $("mod3").className = "mini fade"; $("mod3").innerHTML = chosen[2].html;

  $("rightHd").textContent = ["Live Modules", "Live Systems", "Earth + Space"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
  buildTicker();
  setUpdated();
}

/* ===== Start loops ===== */
refreshApod(); refreshWeather(); refreshAurora(); refreshAircraft(); refreshISS(); refreshSpaceX();
renderRight();

setInterval(refreshApod,      CONFIG.refreshMs.apod);
setInterval(refreshWeather,   CONFIG.refreshMs.weather);
setInterval(refreshAurora,    CONFIG.refreshMs.aurora);
setInterval(refreshAircraft,  CONFIG.refreshMs.aircraft);
setInterval(refreshISS,       CONFIG.refreshMs.iss);
setInterval(refreshSpaceX,    CONFIG.refreshMs.spacex);

setInterval(renderRight, 22 * 1000);
</script>
</body>
