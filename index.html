// ══ CALCS ══
const calc1RM=(w,r)=>r<=1?w:Math.round(w*(36/(37-r)));
const calcBMR=wt=>Math.round(88.362+(13.397*wt/2.205)+(4.799*178)-(5.677*30));
function calcReadiness(d,now){let s=100;
  for(let i=1;i<=3;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){s-=8;if((d.sessions[k].rating||0)>=4)s-=5;if((d.sessions[k].rating||0)>=5)s-=5}}
  let stk=0;for(let i=1;i<=7;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);if(d.sessions?.[dS(dt)]?.done)stk++}
  if(stk>=3&&stk<=5)s+=5;if(stk>=6)s-=10;return Math.max(20,Math.min(100,s))}
function getMR(d,now){const r={};MUSCLES.forEach(m=>r[m]={h:999,s:"fresh"});
  for(let i=0;i<4;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){const wo=getWorkout(k);(wo.muscles||[]).forEach(m=>{const h=i*24;
      if(r[m]&&h<r[m].h){r[m].h=h;r[m].s=h<24?"fatigued":h<48?"recovering":"fresh"}})}}return r}

// ══ SVG CHARTS ══
function SvgLine({data,dk,color,height=80}){
  if(!data||data.length<2)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Need more data</div>;
  const vals=data.map(d=>d[dk]||0),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const w=300,h=height;
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w,h-6-((v-mn)/rng)*(h-12)]);
  return <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
    <polygon points={`0,${h} ${pts.map(p=>p.join(",")).join(" ")} ${w},${h}`} fill={color} opacity="0.12"/>
    <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
    {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="2.5" fill={color}/>)}
  </svg>;
}
function SvgBar({data,dk,color,height=80}){
  if(!data||data.length<1)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Log sessions first</div>;
  const vals=data.map(d=>d[dk]||0),mx=Math.max(...vals)||1,w=300;
  const bw=Math.min(18,w/data.length-3);
  return <svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height}}>
    {vals.map((v,i)=>{const bh=Math.max(2,(v/mx)*(height-8));const x=i/data.length*w+(w/data.length-bw)/2;
      return <rect key={i} x={x} y={height-bh} width={bw} height={bh} rx="3" fill={color} opacity="0.65"/>})}
  </svg>;
}

            </div>})}
          </div>})}
      </Card>
    </>}

    {/* ═══ TRAIN ═══ */}
    {tab==="train"&&(()=>{const w=workout,done=session?.done,dateObj=dP(selDate);return <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

      {restTimer>0&&<Card style={{background:T.s2,textAlign:"center",border:`1px solid ${T.acc}33`}}>

      {w.type!=="rest"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>

        {showWarmup&&<div style={{marginTop:6}}>{(WARMUPS[w.warmup||"full"]||WARMUPS.full).map((ex,i)=>

      <Card style={{padding:0,overflow:"hidden",border:`1px solid ${done?T.grn+"33":TC[w.type]+"22"}`}}>

          <Pill color={TC[w.type]+"22"} text={TC[w.type]}>{w.type.toUpperCase()}</Pill>
          <div style={{fontSize:17,fontWeight:700,marginTop:4}}>{w.label}</div>
          <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>

        </div>
        {w.ex.map((e,i)=>{
          if(e.s==="—"&&e.r==="—"&&e.n.startsWith("—"))return <div key={i} style={{padding:"6px 14px",background:T.s2,fontSize:10,color:T.yel,fontWeight:600,textAlign:"center"}}>{e.n.replace(/—/g,"").trim()}</div>;
          const ns=parseInt(e.s)||0,logged=session?.sets?.[e.n]||[],prev=prevWO?.sets?.[e.n]||[];
          const isAct=activeSet===e.n,pW=parseFloat(e.w)||0,pR=parseInt(e.r)||0;

          return <div key={i} style={{borderTop:`1px solid ${T.s3}`}}>

                    <span style={{fontSize:12,fontWeight:600,color:done?"#555":T.txt}}>{e.n}</span></div>
                  {e.note&&<div style={{fontSize:9,color:T.dim,marginTop:1}}>{e.note}</div>}
                  {prev.length>0&&<div style={{fontSize:9,color:T.dim,marginTop:1}}>Last: {prev.filter(Boolean).map(([w,r])=>`${w}×${r}`).join(", ")}</div>}
                </div>
                <div style={{textAlign:"right"}}><div style={{fontFamily:"'Bebas Neue'",fontSize:14,color:TC[w.type]}}>{e.s}×{e.r}</div>
                  {e.w!=="—"&&<div style={{fontSize:9,color:T.dim}}>{e.w} lb</div>}</div></div>
              {logged.length>0&&!isAct&&<div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>

            </div>
            {isAct&&ns>0&&<div style={{padding:"0 14px 8px",background:T.s2}}>
              {Array.from({length:ns}).map((_,si)=>{const lg=logged[si];const ik=`${e.n}-${si}`;

                  <span style={{fontSize:9,color:T.dim,width:24}}>S{si+1}</span>
                  {lg?<><Pill color={T.grn+"22"} text={T.grn}>{lg[0]}×{lg[1]} ✓</Pill>
                    {data.prs?.[e.n]?.d===selDate&&data.prs[e.n].w===lg[0]&&<Pill color={T.yel+"22"} text={T.yel}>PR!</Pill>}</>
                  :<><input placeholder={`${pW||""}`} value={setInputs[ik+"w"]||""} onChange={ev=>setSetInputs(p=>({...p,[ik+"w"]:ev.target.value}))}
                      type="number" style={{width:48,padding:"5px",background:T.s1,border:`1px solid ${T.bdr}`,borderRadius:6,color:T.acc,fontSize:12,fontWeight:600,textAlign:"center",outline:"none"}}/>
                    <span style={{color:T.dim,fontSize:10}}>×</span>
                    <input placeholder={`${pR||""}`} value={setInputs[ik+"r"]||""} onChange={ev=>setSetInputs(p=>({...p,[ik+"r"]:ev.target.value}))}

                    <button onClick={()=>{logSet(e.n,si,setInputs[ik+"w"]||pW,setInputs[ik+"r"]||pR);setSetInputs(p=>{const n={...p};delete n[ik+"w"];delete n[ik+"r"];return n})}}
                      style={{padding:"5px 8px",borderRadius:6,background:T.acc,border:"none",cursor:"pointer",color:"#000",fontSize:9,fontWeight:700}}>LOG</button></>}
                </div>})}
              <div style={{fontSize:8,color:T.dim,marginTop:2}}>Rest: {e.rest}s</div>
            </div>}
          </div>})}
        {w.type!=="rest"&&<div style={{padding:12,borderTop:`1px solid ${T.s3}`,background:T.s2}}>
          <Btn onClick={toggleDone} style={{background:done?T.grn:T.acc,marginBottom:6}}>{done?"✓ COMPLETED":"MARK COMPLETE"}</Btn>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
            <span style={{fontSize:9,color:T.dim,marginRight:4}}>Difficulty:</span>
            {[1,2,3,4,5].map(v=><button key={v} onClick={()=>rateDay(v)} style={{width:24,height:24,borderRadius:12,
              border:`1px solid ${(session?.rating||0)>=v?T.acc:T.bdr}`,background:(session?.rating||0)>=v?T.acc+"22":"transparent",
              color:(session?.rating||0)>=v?T.acc:T.dim,fontSize:10,fontWeight:600,cursor:"pointer"}}>{v}</button>)}</div>
        </div>}
      </Card>

      <Card><Lbl>📝 Notes</Lbl>
        <textarea value={notes||session?.notes||""} onChange={e=>setNotes(e.target.value)} placeholder="How'd it go..."
          rows={2} style={{width:"100%",padding:8,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,color:T.txt,fontSize:11,resize:"none",outline:"none"}}/>
        {notes&&notes!==(session?.notes||"")&&<button onClick={saveNotes} style={{marginTop:4,padding:"4px 12px",borderRadius:6,background:T.acc+"22",border:"none",cursor:"pointer",color:T.acc,fontSize:10}}>Save</button>}
      </Card>
    </>})()}

    {tab==="calendar"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={()=>{if(calM===0){setCalM(11);setCalY(calY-1)}else setCalM(calM-1)}} style={{background:T.s2,border:"none",borderRadius:20,width:34,height:34,cursor:"pointer",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>‹</button>
        <span style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:3}}>{new Date(calY,calM).toLocaleDateString("en-US",{month:"long",year:"numeric"}).toUpperCase()}</span>
        <button onClick={()=>{if(calM===11){setCalM(0);setCalY(calY+1)}else setCalM(calM+1)}} style={{background:T.s2,border:"none",borderRadius:20,width:34,height:34,cursor:"pointer",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
        {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:T.dim,fontWeight:600}}>{d[0]}</div>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:12}}>
        {(()=>{const f=new Date(calY,calM,1),sd=f.getDay(),dim=new Date(calY,calM+1,0).getDate();
          const cells=[];for(let i=0;i<sd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(new Date(calY,calM,d));
          return cells.map((cell,i)=>{if(!cell)return <div key={i}/>;const ds=dS(cell),wo=getWorkout(ds),dn=data.sessions?.[ds]?.done,it=ds===todayStr;
            return <button key={i} onClick={()=>{setSelDate(ds);setTab("train")}} style={{padding:4,background:dn?TC[wo.type]+"22":T.s1,
              border:it?`2px solid ${T.acc}`:`1px solid ${T.s3}`,borderRadius:8,cursor:"pointer",textAlign:"center",minHeight:40}}>
              <span style={{fontSize:11,fontWeight:it?700:400,color:it?T.acc:dn?T.txt:T.sub}}>{cell.getDate()}</span>
              {dn&&<div style={{width:5,height:5,borderRadius:3,background:TC[wo.type],margin:"2px auto 0"}}/>}
            </button>})})()}</div>

      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
        {[["Strength",T.acc],["Bike",T.blue],["Circuit",T.yel],["Rest",T.dim]].map(([l,c])=>
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:4,background:c}}/><span style={{fontSize:9,color:T.sub}}>{l}</span></div>)}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {active&&<div style={{width:6,height:6,borderRadius:3,background:p.c}}/>}
                <span style={{fontSize:13,fontWeight:700,color:active?p.c:T.sub}}>{p.n}</span></div>
              <span style={{fontSize:9,color:T.dim}}>{dP(p.st).toLocaleDateString("en-US",{month:"short",day:"numeric"})} — {dP(p.en).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
            </div>
            <div style={{fontSize:10,color:T.dim,marginTop:2}}>{p.s}</div>
            <div style={{height:4,background:T.s3,borderRadius:2,marginTop:4,overflow:"hidden"}}>
              <div style={{height:"100%",background:p.c,borderRadius:2,width:`${prog}%`,transition:"width .5s"}}/></div>
          </div>})}
      </Card>
      {/* Key Dates */}
      <Card><Lbl>🗓️ Key Dates</Lbl>
        {[["May 25","Memorial Day Weekend","⛰"],["Jul 4","July 4th","★"],["Aug 21","185 lb Target","🎯"],["Dec 25","Christmas","🎄"],["Apr 5, 2027","1 Year Complete","👑"]].map(([d,l,ic],i)=>{
          const days=Math.max(0,dB(todayStr,d.includes("2027")?"2027-04-05":d==="May 25"?"2026-05-25":d==="Jul 4"?"2026-07-04":d==="Aug 21"?"2026-08-21":"2026-12-25"));
          const past=days===0;
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${T.s3}`}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>{ic}</span><span style={{fontSize:11,color:past?T.dim:T.txt}}>{l}</span></div>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:13,color:past?T.grn:days<=14?T.red:T.txt}}>{past?"PASSED":`${days}d`}</span>
          </div>})}
      </Card>
    </>}

      <div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap"}}>
        {["overview","prs","calendar","tools"].map(t=><button key={t} onClick={()=>setStatsTab(t)}
          style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
            background:statsTab===t?T.acc+"22":T.s2,color:statsTab===t?T.acc:T.sub}}>{t.toUpperCase()}</button>)}
      </div>
      {statsTab==="overview"&&<>
        <Card><Lbl>📈 Weight Trend</Lbl><SvgLine data={weightChart} dk="w" color={T.acc} height={100}/>
          {data.weight.length>=4&&(()=>{const r=data.weight.slice(-4);const rate=((r[0].w-r[r.length-1].w)/Math.max(1,dB(r[0].d,r[r.length-1].d))*7);
            const daysLeft=rate>0?Math.round((lastW-185)/rate*7):999;
            return <div style={{marginTop:8,padding:8,background:T.s2,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontSize:9,color:T.dim}}>Rate</div><div style={{fontSize:12,fontWeight:600,color:rate>0?T.grn:T.red}}>{rate.toFixed(1)} lbs/wk</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:T.dim}}>ETA 185</div><div style={{fontSize:12,fontWeight:600,color:T.acc}}>{lastW<=185?"DONE!":daysLeft<365?`${daysLeft} days`:"—"}</div></div>
            </div>})()}
        </Card>
        <Card><Lbl>🔥 Weekly Calories</Lbl><SvgBar data={weeklyChart} dk="cal" color={T.blue} height={80}/></Card>
        {/* 365-Day Heatmap */}
        <Card><Lbl>📅 365-Day Map</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:1}}>
            {(()=>{const start=new Date("2026-04-05"),cells=[];
              for(let i=0;i<365;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=dS(d),wo=getWorkout(ds);
                cells.push(<div key={i} style={{width:4.5,height:4.5,borderRadius:0.5,
                  background:data.sessions?.[ds]?.done?(TC[wo.type]||T.grn):wo.type==="rest"?"#15151A":"#1A1A23",
                  opacity:data.sessions?.[ds]?.done?1:.3}} title={ds}/>)}return cells})()}
          </div>
          <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"center"}}>
            {[["STR",T.acc],["BIKE",T.blue],["CIR",T.yel]].map(([l,c])=>
              <div key={l} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,background:c,borderRadius:1}}/><span style={{fontSize:7,color:T.dim}}>{l}</span></div>)}
          </div>
        </Card>
        {/* Workout Feed */}
        <Card><Lbl>📋 Recent Sessions</Lbl>
          {(()=>{const recent=Object.entries(data.sessions||{}).filter(([,s])=>s?.done).sort(([a],[b])=>b.localeCompare(a)).slice(0,8);
            return recent.length===0?<div style={{color:T.dim,fontSize:11,textAlign:"center",padding:12}}>No sessions yet</div>:
              recent.map(([ds,sess])=>{const wo=getWorkout(ds);const setCount=sess.sets?Object.values(sess.sets).reduce((a,s)=>a+s.filter(Boolean).length,0):0;
                return <div key={ds} onClick={()=>{setSelDate(ds);navTo("train")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"6px 0",borderBottom:`1px solid ${T.s3}`,cursor:"pointer"}}>
                  <div><div style={{fontSize:11,fontWeight:600,color:TC[wo.type]||T.txt}}>{wo.label}</div>
                    <div style={{fontSize:9,color:T.dim}}>{dP(ds).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div></div>
                  <div style={{textAlign:"right"}}>
                    {setCount>0&&<div style={{fontSize:9,color:T.sub}}>{setCount} sets</div>}
                    {sess.rating&&<div style={{fontSize:9,color:T.yel}}>{"★".repeat(sess.rating)}</div>}
                  </div></div>})})()}
        </Card>
        <Card><Lbl>📊 Career</Lbl>
          {[["Sessions",stats.total],["Calories",`${(stats.cal/1000).toFixed(1)}K`],["Miles",stats.mi],["Streak",`${stats.streak}d`],
            ["Max Streak",`${stats.maxStreak}d`],["TDEE",`${tdee}/day`],["Lost",`${stats.wLost.toFixed(1)} lbs`],["PRs",stats.prCount],
            ["Volume",`${(stats.totalVol/1000).toFixed(0)}K lbs`],["Hours",stats.totalHrs]
          ].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${T.s3}`}}>
            <span style={{fontSize:11,color:T.sub}}>{l}</span><span style={{fontSize:11,fontWeight:600}}>{v}</span></div>)}</Card>
      </>}
      {statsTab==="prs"&&<Card><Lbl>🏆 Personal Records</Lbl>
        {Object.keys(data.prs||{}).length===0?<div style={{padding:16,textAlign:"center",color:T.dim,fontSize:11}}>Log sets to track PRs</div>:
        Object.entries(data.prs).sort(([,a],[,b])=>b.e1rm-a.e1rm).map(([n,pr],i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.s3}`}}>
            <div><div style={{fontSize:11,fontWeight:600}}>{n}</div>
              <div style={{fontSize:9,color:T.dim}}>{dP(pr.d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontFamily:"'Bebas Neue'",fontSize:16,color:T.yel}}>{pr.w}×{pr.r}</div>
              <div style={{fontSize:8,color:T.dim}}>1RM: {pr.e1rm}</div></div></div>)}</Card>}
      {statsTab==="calendar"&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <button onClick={()=>{if(calM===0){setCalM(11);setCalY(calY-1)}else setCalM(calM-1)}} style={{background:T.s2,border:"none",borderRadius:20,width:30,height:30,cursor:"pointer",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>‹</button>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:3}}>{new Date(calY,calM).toLocaleDateString("en-US",{month:"long",year:"numeric"}).toUpperCase()}</span>
          <button onClick={()=>{if(calM===11){setCalM(0);setCalY(calY+1)}else setCalM(calM+1)}} style={{background:T.s2,border:"none",borderRadius:20,width:30,height:30,cursor:"pointer",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:T.dim,fontWeight:600}}>{d[0]}</div>)}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {(()=>{const f=new Date(calY,calM,1),sd=f.getDay(),dim=new Date(calY,calM+1,0).getDate();
            const cells=[];for(let i=0;i<sd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(new Date(calY,calM,d));
            return cells.map((cell,i)=>{if(!cell)return <div key={i}/>;const ds=dS(cell),wo=getWorkout(ds),dn=data.sessions?.[ds]?.done,it=ds===todayStr;
              return <button key={i} onClick={()=>{setSelDate(ds);setTab("train")}} style={{padding:3,background:dn?TC[wo.type]+"22":T.s1,
                border:it?`2px solid ${T.acc}`:`1px solid ${T.s3}`,borderRadius:8,cursor:"pointer",textAlign:"center",minHeight:34}}>
                <span style={{fontSize:10,fontWeight:it?700:400,color:it?T.acc:dn?T.txt:T.sub}}>{cell.getDate()}</span>
                {dn&&<div style={{width:4,height:4,borderRadius:2,background:TC[wo.type],margin:"1px auto 0"}}/>}
              </button>})})()}</div>
      </>}
      {statsTab==="tools"&&<>
        {/* Plate Calculator */}
        <Card><Lbl>🔩 Plate Calculator</Lbl>
          <div style={{fontSize:11,color:T.dim,marginBottom:8}}>Enter target barbell weight. Shows plates per side.</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={plateCalcInput} onChange={e=>setPlateCalcInput(e.target.value)} placeholder="135" type="number"
              style={{flex:1,padding:10,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,color:T.acc,fontFamily:"'Bebas Neue'",fontSize:22,textAlign:"center",outline:"none"}}/>
            <div style={{fontSize:10,color:T.dim,display:"flex",alignItems:"center"}}>lbs</div>
          </div>
          {(()=>{const target=parseFloat(plateCalcInput)||0;if(target<45)return <div style={{color:T.dim,fontSize:11,textAlign:"center"}}>Min: 45 lbs (empty bar)</div>;
            const nearest=bbS(target);const perSide=(nearest-45)/2;let rem=perSide;const plates=[];
            [45,35,25,10].forEach(p=>{const count=Math.floor(rem/p);if(count>0){plates.push(`${count}×${p}`);rem-=count*p}});
            return <div style={{background:T.s2,borderRadius:8,padding:12,textAlign:"center"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:28,color:T.acc}}>{nearest} lbs</div>
              {nearest!==target&&<div style={{fontSize:9,color:T.yel,marginTop:2}}>Snapped from {target} to nearest loadable</div>}
              <div style={{fontSize:13,color:T.txt,marginTop:8,fontWeight:600}}>{plates.length>0?`Each side: ${plates.join(" + ")}`:"Empty bar"}</div>
              <div style={{fontSize:10,color:T.dim,marginTop:4}}>Bar (45) + {perSide}×2 = {nearest}</div>
              <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:10}}>
                {[45,35,25,10].map(p=>{const needed=plates.some(pl=>pl.includes(`×${p}`));
                  return <div key={p} style={{width:36,height:36,borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:700,background:needed?T.acc+"33":T.s3,color:needed?T.acc:T.dim,
                    border:`2px solid ${needed?T.acc:T.s3}`}}>{p}</div>})}
              </div>
            </div>})()}
        </Card>
        {/* 1RM Calculator */}
        <Card><Lbl>📐 Estimated 1RM</Lbl>
          <div style={{fontSize:11,color:T.dim,marginBottom:6}}>Your top estimated 1RMs from logged sets (Brzycki formula):</div>
          {Object.keys(data.prs||{}).length===0?<div style={{color:T.dim,fontSize:11,textAlign:"center",padding:8}}>Log sets to see 1RM estimates</div>:
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {Object.entries(data.prs).sort(([,a],[,b])=>b.e1rm-a.e1rm).slice(0,8).map(([n,pr])=>
              <div key={n} style={{background:T.s2,borderRadius:8,padding:8,textAlign:"center"}}>
                <div style={{fontSize:10,color:T.sub,fontWeight:600}}>{n.replace("Barbell ","BB ")}</div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:T.yel}}>{pr.e1rm}</div>
                <div style={{fontSize:8,color:T.dim}}>from {pr.w}×{pr.r}</div></div>)}
          </div>}
        </Card>
        {/* Available Plate Combos */}
        <Card><Lbl>📋 All Loadable Weights</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {BB_W.map(w=><span key={w} style={{fontSize:11,padding:"4px 8px",borderRadius:6,background:T.s2,color:T.txt,fontWeight:500}}>{w}</span>)}
          </div>
          <div style={{fontSize:9,color:T.dim,marginTop:6}}>Bar: 45 · Plates: 2×45, 2×35, 2×25, 2×10 · Max: 275</div>
        </Card>
      </>}
    </>}

    {/* ═══ PROFILE ═══ */}
    {tab==="profile"&&<>
      <div style={{display:"flex",gap:3,marginBottom:10}}>
        {["weight","body","gear"].map(t=><button key={t} onClick={()=>setProfileTab(t)}
          style={{padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
            background:profileTab===t?T.acc+"22":T.s2,color:profileTab===t?T.acc:T.sub}}>{t.toUpperCase()}</button>)}</div>
      {profileTab==="weight"&&<>
        <Card><Lbl>⚖️ Log Weigh-In</Lbl><div style={{display:"flex",gap:6}}>
          <input value={wInput} onChange={e=>setWInput(e.target.value)} placeholder="210.0" type="number" step="0.1"
            style={{flex:1,padding:10,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,color:T.acc,
              fontFamily:"'Bebas Neue'",fontSize:22,textAlign:"center",outline:"none"}}
            onKeyDown={e=>e.key==="Enter"&&logWeight()}/>
          <Btn onClick={logWeight} style={{width:"auto",padding:"10px 18px"}}>LOG</Btn></div></Card>
        <Card><Lbl>History</Lbl>
          <SvgLine data={weightChart} dk="w" color={T.acc} height={100}/>
          {[...data.weight].reverse().slice(0,10).map((e,i)=>{const prev=[...data.weight].reverse()[i+1];const diff=prev?e.w-prev.w:0;
            return <div key={e.d} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.s3}`}}>
              <span style={{fontSize:10,color:T.sub}}>{dP(e.d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {diff!==0&&<span style={{fontSize:9,color:diff<0?T.grn:T.red,fontWeight:600}}>{diff>0?"+":""}{diff.toFixed(1)}</span>}
                <span style={{fontFamily:"'Bebas Neue'",fontSize:15}}>{e.w}</span></div></div>})}</Card>
      </>}
      {profileTab==="body"&&<>
        <Card><Lbl>📏 Measurements</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
            {[["waist","Waist"],["chest","Chest"],["arms","Arms"]].map(([k,l])=>
              <div key={k}><div style={{fontSize:9,color:T.dim,marginBottom:2}}>{l} (in)</div>
                <input value={measInput[k]} onChange={e=>setMeasInput(p=>({...p,[k]:e.target.value}))} placeholder="—" type="number" step="0.25"
                  style={{width:"100%",padding:7,background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:6,color:T.txt,fontSize:13,fontWeight:600,textAlign:"center",outline:"none"}}/></div>)}</div>
          <Btn onClick={logMeas} style={{fontSize:11}}>LOG</Btn></Card>
        {(data.measurements||[]).length>0&&<Card><Lbl>History</Lbl>
          {[...(data.measurements||[])].reverse().slice(0,8).map((m,i)=>
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${T.s3}`,fontSize:10}}>
              <span style={{color:T.sub}}>{dP(m.d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
              <div style={{display:"flex",gap:6}}>{m.waist>0&&<span>W:{m.waist}"</span>}{m.chest>0&&<span>C:{m.chest}"</span>}{m.arms>0&&<span>A:{m.arms}"</span>}</div></div>)}</Card>}
      </>}
      {profileTab==="gear"&&<Card><Lbl>🏋️ Equipment</Lbl>
        {[["Power Rack + Cable Pulley","Squats, pull-ups, lat pulldown, rows, face pulls, pushdowns"],
          ["Olympic Barbell (45 lb)","Back squat, bench, OHP, rows, RDL, hip thrust"],
          ["Plates: 2×45, 2×35, 2×25, 2×10","230 lbs total · Max load: 275 lbs"],
          ["Adjustable DBs (5-52.5 lb)","Accessories, isolation, carries"],
          ["Adjustable Bench (8-pos)","Incline, flat, decline, support"],
          ["Magnetic Stationary Bike","Intervals, tempo, long rides"],
          ["Resistance Bands (5-125 lb)","Assistance, mobility, resistance"],
          ["Landmine Attachment","Rotational golf work, presses, rows"],
          ["Smart Scale (Etekcity)","Body weight + composition"],
          ["Floor Mats (24 sq ft)","Impact protection"]
        ].map(([n,d],i)=><div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${T.s3}`}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:3,background:T.grn}}/><span style={{fontSize:11,fontWeight:600}}>{n}</span></div>
          <div style={{fontSize:9,color:T.dim,marginLeft:10,marginTop:1}}>{d}</div></div>)}</Card>}
    </>}

    </div>

    {/* NAV */}
    <div style={{position:"fixed",bottom:10,left:14,right:14,background:T.s1,borderRadius:20,padding:"6px 0",
      display:"flex",justifyContent:"space-around",boxShadow:"0 -4px 30px rgba(0,0,0,.5)",border:`1px solid ${T.s3}`,zIndex:20}}>
      {[{id:"home",i:"🏠"},{id:"train",i:"💪"},{id:"calendar",i:"📅"},{id:"stats",i:"📊"},{id:"profile",i:"👤"}].map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",
          alignItems:"center",gap:1,color:tab===t.id?T.acc:T.dim,padding:"6px 14px",fontSize:18}}>
          <span>{t.i}</span><span style={{fontSize:8,fontWeight:tab===t.id?700:500}}>{t.id}</span>
          {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:T.acc}}/>}
        </button>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
