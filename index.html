<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>
<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* Big TV readability */
    --h2: 34px;
    --h3: 19px;
    --big: 44px;      /* headline inside modules */
    --small: 17px;

    /* Right module typography */
    --cellTitle: 20px;
    --cellSmall: 22px;
    --kvKey: 20px;
    --kvVal: 22px;
    --listFont: 21px; /* rows in lists */
    --listLineH: 1.22;

    /* Bubbles bigger */
    --tagText: 16px;
    --bubblePadY: 12px;
    --bubblePadX: 18px;

    /* header pills */
    --pillText: 16px;

    /* ticker */
    --ticker: 28px;
    --tickerSpeed: 42s; /* slower */
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 96px 1fr 82px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    min-width:0;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 820px;
  }

  .status{
    display:flex;
    gap:12px;
    align-items:center;
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }

  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 11px 14px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: var(--pillText);
    display:flex;
    align-items:center;
    gap:10px;
    white-space:nowrap;
  }

  .dot{
    width:12px;height:12px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
    min-width:0;
  }

  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
    min-width:0;
  }

  /* APOD */
  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.90;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.72)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:16px;
    right:16px;
    bottom:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-width:0;
  }
  .heroTitle{
    font-size: 40px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
    text-shadow: 0 10px 24px rgba(0,0,0,.55);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: var(--small);
    align-items:center;
    min-width:0;
  }

  /* Bubbles */
  .tag{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    font-size: var(--tagText);
    font-weight: 950;
    letter-spacing: .9px;
    text-transform: uppercase;
    color: var(--text);
    white-space:nowrap;
  }
  .tag.good{border-color: rgba(37,224,183,.40); background: rgba(37,224,183,.12); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.40); background: rgba(255,211,122,.12); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.40); background: rgba(255,107,134,.12); color:#ffd4dd}

  /* Right column shows ONLY 2 modules (bigger cards so everything fits) */
  .stack{
    display:grid;
    grid-template-rows: 1fr 1fr;
    gap:12px;
    min-height:0;
    min-width:0;
  }

  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;
    min-width:0;
    overflow:hidden; /* NO scrollbars ever */
  }

  .miniTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    min-width:0;
  }

  .miniTop .k{
    color: rgba(255,255,255,.72);
    font-size: var(--cellTitle);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 1000;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .miniTop .s{
    font-size: var(--tagText);
    font-weight: 1000;
    letter-spacing: .9px;
    text-transform: uppercase;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--text);
    white-space:nowrap;
    flex-shrink:0;
  }

  .bigLine{
    font-size: var(--big);
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.08;
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .smallLine{
    color: var(--muted);
    font-size: var(--cellSmall);
    line-height: 1.22;
    font-variant-numeric: tabular-nums;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .kv{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px 14px;
    align-items:center;
    font-variant-numeric: tabular-nums;
    min-width:0;
    line-height: 1.25;
  }
  .kv .k{
    color: rgba(255,255,255,.70);
    font-weight: 950;
    font-size: var(--kvKey);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    min-width:0;
  }
  .kv .v{
    font-weight: 1000;
    font-size: var(--kvVal);
    color: rgba(255,255,255,.88);
    white-space:nowrap;
    flex-shrink:0;
  }

  /* Lists: forced to FIT (no scroll). We clamp lines and limit item count in JS */
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow:hidden;
    min-width:0;
    font-variant-numeric: tabular-nums;
    line-height: var(--listLineH);
  }

  .li{
    display:flex;
    justify-content:space-between;
    gap:12px;
    font-size: var(--listFont);
    font-weight: 950;
    min-width:0;
    line-height: var(--listLineH);
  }
  .li span:first-child{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width: 78%;
  }
  .li span:last-child{
    color:rgba(255,255,255,.72);
    font-weight:1000;
    white-space:nowrap;
    flex-shrink:0;
  }

  /* Earthquake list rows: allow 2 lines max so nothing overlaps */
  .li.wrap2{
    display:block;
  }
  .li.wrap2 span:first-child{
    display:-webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    white-space:normal;
    max-width: 100%;
  }
  .li.wrap2 span:last-child{ display:none; }

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }

  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
    font-size: 19px;
  }

  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }

  .track{
    display:flex;
    gap:56px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll var(--tickerSpeed) linear infinite;
    font-weight: 1000;
    font-size: var(--ticker);
  }

  .track span b{color:rgba(255,255,255,.72)}

  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }

  .fade{
    animation: fadein .55s ease-out both;
  }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title">Ambient Command Center</div>
      <div class="subtitle">space • earth • aurora • aircraft • iss • earthquakes • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="hd">
        <div class="h">NASA — Astronomy Picture of the Day</div>
        <div class="tag" id="apodTag">loading</div>
      </div>
      <div class="bd">
        <div class="hero">
          <img id="apodImg" alt="" src="" referrerpolicy="no-referrer" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  home: { lat: 42.9098, lon: -85.7631, name: "Grandville" },
  aircraftRadiusNm: 120,
  refreshMs: {
    apod: 60 * 60 * 1000,
    aurora: 5 * 60 * 1000,
    aircraft: 30 * 1000,
    iss: 12 * 1000,
    quakes: 60 * 1000,
    geocode: 60 * 1000
  },
  tickerBase: [
    "Ambient mode • live feeds only • no news",
    "APOD • Aurora • Aircraft • ISS • Quakes"
  ],
  /* hard caps so NOTHING can overflow */
  listCaps: {
    aircraft: 6, // list rows shown
    quakes: 5    // quake rows shown (wrap2, 2-line clamp)
  }
};

/* ===== utils ===== */
const $ = (id)=>document.getElementById(id);

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function fmtTime(d){
  return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function fmtClock(d){
  return d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"}) + " • " + fmtTime(d);
}

function setClock(){ $("clock").textContent = fmtClock(new Date()); }
setInterval(setClock, 1000);
setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function haversineMi(lat1, lon1, lat2, lon2){
  const toRad = (x)=> x * Math.PI/180;
  const R = 3958.8;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function lastRow(arr){
  if(!Array.isArray(arr)) return null;
  for(let i=arr.length-1;i>=0;i--){
    const row = arr[i];
    if(Array.isArray(row)) return row;
  }
  return null;
}

function moduleHTML(title, statusHTML, bigHTML, smallHTML, listLines, kvPairs){
  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${statusHTML}</div>
    </div>
    ${bigHTML ? `<div class="bigLine">${bigHTML}</div>` : ``}
    ${smallHTML ? `<div class="smallLine">${smallHTML}</div>` : ``}
    ${Array.isArray(kvPairs) && kvPairs.length ? `
      <div class="kv">
        ${kvPairs.map(p => `<div class="k">${esc(p.k)}</div><div class="v">${esc(p.v)}</div>`).join("")}
      </div>
    ` : ``}
    ${listLines && listLines.length ? `
      <div class="list">
        ${listLines.map(x => `<div class="li ${x.wrap2 ? "wrap2" : ""}"><span>${esc(x.left)}</span><span>${esc(x.right ?? "")}</span></div>`).join("")}
      </div>
    ` : ``}
  `;
}

/* ===== data state ===== */
let aurora = null;   // { kp, ts, bz, speed, kpForecastMax }
let aircraft = null; // { count, closest, list, topAirlines, highestPlane }
let iss = null;      // { lat, lon, over, ts }
let quakes = null;   // { count, maxMag, maxMagPlace, closestMi, closestPlace, closestMag, list, ts }
let apod = null;

/* ===== NASA APOD ===== */
function setApodFallback(msgTop, msgSub){
  $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
    <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
      <defs><linearGradient id='g' x1='0' x2='1'>
        <stop stop-color='#0b1020' offset='0'/><stop stop-color='#081018' offset='1'/>
      </linearGradient></defs>
      <rect width='100%' height='100%' fill='url(#g)'/>
      <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>${msgTop}</text>
      <text x='70' y='240' fill='#a7b0c2' font-size='34' font-family='Arial'>${msgSub}</text>
    </svg>
  `);
}

async function refreshApod(){
  try{
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=8hIeIebshtbWaaufqV1oSvuQlNUgN0LUjqqw8XU9");
    apod = d;
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    const img = $("apodImg");
    img.onerror = () => setApodFallback("NASA APOD image blocked", "Using a local fallback background");

    if(d.media_type === "image" && (d.hdurl || d.url)){
      img.src = d.hdurl || d.url;
    } else {
      setApodFallback("NASA APOD is a video today", "Showing placeholder background");
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const explRaw = (d.explanation || "");
    const expl = explRaw.slice(0, 140).trim() + (explRaw.length > 140 ? "…" : "");

    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span style="margin-left:auto; color: var(--muted); font-weight:950;">${esc(expl)}</span>
    `;
    setUpdated();
  } catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
    setApodFallback("NASA APOD offline", "Retrying automatically");
  }
}

/* ===== Aurora ===== */
async function refreshAurora(){
  try{
    const kpUrl = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";
    const magUrl = "https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json";
    const plasmaUrl = "https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json";
    const kpFcUrl = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json";

    const [kp, mag, plasma, kpFc] = await Promise.all([
      getJson(kpUrl), getJson(magUrl), getJson(plasmaUrl), getJson(kpFcUrl)
    ]);

    let kpVal = null;
    let kpTs = null;

    if(Array.isArray(kp)){
      for(let i=kp.length-1; i>=0; i--){
        const row = kp[i];
        if(Array.isArray(row) && row.length >= 2){
          const cand = Number(row[1]);
          if(Number.isFinite(cand)){
            kpVal = cand;
            kpTs = row[0] ? new Date(row[0]) : null;
            break;
          }
        }
      }
    }

    let bz = null;
    const magR = lastRow(mag);
    if(magR && magR.length >= 4){
      const cand = Number(magR[3]);
      if(Number.isFinite(cand)) bz = cand;
    }

    let speed = null;
    const plR = lastRow(plasma);
    if(plR && plR.length >= 3){
      const cand = Number(plR[2]);
      if(Number.isFinite(cand)) speed = cand;
    }

    let kpForecastMax = null;
    if(Array.isArray(kpFc)){
      let m = null;
      for(const row of kpFc){
        if(Array.isArray(row) && row.length >= 2){
          const v = Number(row[1]);
          if(Number.isFinite(v)) m = (m==null) ? v : Math.max(m, v);
        }
      }
      kpForecastMax = m;
    }

    aurora = { kp: kpVal, ts: kpTs || new Date(), bz, speed, kpForecastMax };
  } catch(e){
    aurora = null;
  }
}

/* ===== Aircraft ===== */
const TYPE_MAP = {
  B738: "Boeing 737-800", B737: "Boeing 737", B739: "Boeing 737-900", B38M: "Boeing 737 MAX 8",
  B752: "Boeing 757-200", B763: "Boeing 767-300", B77W: "Boeing 777-300ER",
  B788: "Boeing 787-8", B789: "Boeing 787-9",
  A319: "Airbus A319", A320: "Airbus A320", A321: "Airbus A321", A20N: "Airbus A320neo", A21N: "Airbus A321neo",
  A332: "Airbus A330-200", A333: "Airbus A330-300", A359: "Airbus A350-900",
  BCS1: "Airbus A220-100", BCS3: "Airbus A220-300",
  E170: "Embraer E170", E175: "Embraer E175", E75L: "Embraer E175", E190: "Embraer E190", E195: "Embraer E195",
  CRJ9: "CRJ-900", CRJ7: "CRJ-700",
  P28R: "Piper Arrow", PA32: "Piper Saratoga", PA34: "Piper Seneca",
  C172: "Cessna 172", C56X: "Cessna Citation Excel/XLS", SR22: "Cirrus SR22"
};

function friendlyType(code){
  if(!code) return "Unknown type";
  const c = String(code).toUpperCase().trim();
  return TYPE_MAP[c] || c;
}

const AIRLINE_PREFIX = {
  DAL: "Delta", UAL: "United", AAL: "American", SWA: "Southwest", JBU: "JetBlue",
  NKS: "Spirit", FFT: "Frontier", ASA: "Alaska", SKW: "SkyWest", RPA: "Republic",
  ENY: "Envoy", JIA: "PSA", AWI: "Air Wisconsin", UPS: "UPS", FDX: "FedEx"
};

function cleanCallsign(raw){
  const s = String(raw || "").trim();
  return s || "UNKNOWN";
}
function flightPretty(cs){
  return String(cs).toUpperCase().replace(/\s+/g,"").replace(/[^A-Z0-9]/g,"");
}
function callsignPrefix(cs){
  const t = String(cs).toUpperCase().replace(/[^A-Z0-9]/g,"");
  const m = t.match(/^([A-Z]{3})/);
  return m ? m[1] : "";
}
function providerLabel(cs){
  const prefix = callsignPrefix(cs);
  if(!prefix) return "General Aviation";
  if(AIRLINE_PREFIX[prefix]) return AIRLINE_PREFIX[prefix];
  if(/^N[0-9A-Z]+$/i.test(cs)) return "General Aviation";
  return "Other";
}

async function refreshAircraft(){
  try{
    const {lat, lon} = CONFIG.home;
    const r = CONFIG.aircraftRadiusNm;
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`;
    const d = await getJson(url);

    const raw = Array.isArray(d) ? d : (Array.isArray(d?.ac) ? d.ac : (Array.isArray(d?.aircraft) ? d.aircraft : []));
    const cleaned = raw
      .map(a => {
        const alat = Number(a.lat ?? a.latitude);
        const alon = Number(a.lon ?? a.longitude);
        const dist = (Number.isFinite(alat) && Number.isFinite(alon)) ? haversineMi(lat, lon, alat, alon) : null;

        const csRaw = a.flight ?? a.callsign ?? a.cs ?? a.r ?? a.reg ?? "";
        const callsign = cleanCallsign(csRaw);
        const flight = flightPretty(callsign);

        const typeCode = (a.t ?? a.type ?? a.icao_type ?? a.icaoType ?? "").toString().trim().toUpperCase();
        const typeName = friendlyType(typeCode);

        const alt = Number(a.alt_baro ?? a.altitude ?? a.alt);
        const altOk = Number.isFinite(alt) ? alt : null;

        const provider = providerLabel(flight);
        return {provider, flight, typeName, alt: altOk, dist};
      })
      .filter(x => x.dist != null)
      .sort((x,y) => x.dist - y.dist);

    const closest = cleaned[0] || null;

    let highestPlane = null;
    for(const x of cleaned){
      if(x.alt == null) continue;
      if(!highestPlane || x.alt > highestPlane.alt) highestPlane = x;
    }

    const counts = {};
    for(const x of cleaned){
      if(!x.provider) continue;
      if(x.provider === "General Aviation") continue;
      if(x.provider === "Other") continue;
      counts[x.provider] = (counts[x.provider] || 0) + 1;
    }

    const topAirlines = Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([name,cnt]) => ({name, cnt}));

    const topList = cleaned.slice(0, CONFIG.listCaps.aircraft).map(x => ({
      left: `${x.provider} • ${x.typeName}`,
      right: `${x.flight} • ${x.dist.toFixed(1)}mi`
    }));

    aircraft = { count: cleaned.length, closest, list: topList, topAirlines, highestPlane };
  } catch(e){
    aircraft = null;
  }
}

/* ===== ISS + reverse geocode ===== */
async function refreshISS(){
  try{
    const d = await getJson("https://api.wheretheiss.at/v1/satellites/25544");
    iss = { lat: Number(d.latitude), lon: Number(d.longitude), ts: new Date(), over: iss?.over ?? "Locating…" };
  } catch(e){
    iss = null;
  }
}

async function refreshISSOver(){
  if(!iss || !Number.isFinite(iss.lat) || !Number.isFinite(iss.lon)) return;
  try{
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${iss.lat}&longitude=${iss.lon}&localityLanguage=en`;
    const g = await getJson(url);

    const locality = g.locality || g.city || "";
    const region = g.principalSubdivision || "";
    const country = g.countryName || "";
    const ocean = g.localityInfo?.informative?.find(x => (x.description||"").toLowerCase().includes("ocean"))?.name;

    let over = "";
    if(ocean) over = ocean;
    else if(locality && country) over = `${locality}${region && region !== locality ? ", " + region : ""}, ${country}`;
    else if(region && country) over = `${region}, ${country}`;
    else if(country) over = country;
    else over = "Open ocean / remote";

    iss.over = over;
  } catch(e){
    iss.over = "Unknown";
  }
}

/* ===== Earthquakes ===== */
async function refreshQuakes(){
  try{
    const d = await getJson("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
    const feats = Array.isArray(d?.features) ? d.features : [];
    const {lat, lon} = CONFIG.home;

    let maxMag = null;
    let maxMagPlace = null;
    let closestMi = null;
    let closestPlace = null;
    let closestMag = null;

    const items = [];

    for(const f of feats){
      const mag = Number(f?.properties?.mag);
      const place = String(f?.properties?.place || "").trim() || "Unknown location";
      const timeMs = Number(f?.properties?.time);
      const when = Number.isFinite(timeMs) ? new Date(timeMs) : null;

      if(Number.isFinite(mag) && when){
        items.push({ when, mag, place });
      }

      if(Number.isFinite(mag) && (maxMag == null || mag > maxMag)){
        maxMag = mag;
        maxMagPlace = place;
      }

      const coords = f?.geometry?.coordinates;
      if(Array.isArray(coords) && coords.length >= 2){
        const qlon = Number(coords[0]);
        const qlat = Number(coords[1]);
        if(Number.isFinite(qlat) && Number.isFinite(qlon)){
          const dist = haversineMi(lat, lon, qlat, qlon);
          if(closestMi == null || dist < closestMi){
            closestMi = dist;
            closestPlace = place;
            closestMag = Number.isFinite(mag) ? mag : null;
          }
        }
      }
    }

    items.sort((a,b)=>b.when - a.when);

    const list = items.slice(0, CONFIG.listCaps.quakes).map(x => ({
      left: `${fmtTime(x.when)} • M${x.mag.toFixed(1)} • ${x.place}`,
      right: "",
      wrap2: true
    }));

    quakes = { count: feats.length, maxMag, maxMagPlace, closestMi, closestPlace, closestMag, list, ts: new Date() };
  } catch(e){
    quakes = null;
  }
}

/* ===== Render ===== */
let phase = 0;

function buildTicker(){
  const live = [];

  if(apod?.title) live.push(`APOD • <b>${esc(apod.title)}</b>`);

  if(aurora){
    const kp = (aurora.kp != null) ? `Kp <b>${esc(aurora.kp.toFixed(1))}</b>` : `Kp <b>—</b>`;
    const sw = (aurora.speed != null) ? `SW <b>${esc(Math.round(aurora.speed))}</b> km/s` : `SW <b>—</b>`;
    const bz = (aurora.bz != null) ? `Bz <b>${esc(aurora.bz.toFixed(1))}</b> nT` : `Bz <b>—</b>`;
    const fc = (aurora.kpForecastMax != null) ? `Kp fcst max <b>${esc(aurora.kpForecastMax.toFixed(1))}</b>` : `Kp fcst max <b>—</b>`;
    live.push(`Aurora • ${kp} • ${sw} • ${bz} • ${fc}`);
  } else live.push(`Aurora • <b>loading</b>`);

  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const topMix = (aircraft.topAirlines || []).map(x => `${x.name} ${x.cnt}`).join(" • ");
    const highest = aircraft.highestPlane
      ? `${aircraft.highestPlane.provider} • ${aircraft.highestPlane.typeName} • ${aircraft.highestPlane.flight} • ${Math.round(aircraft.highestPlane.alt).toLocaleString()} ft`
      : "—";
    const cTxt = c
      ? `Closest: ${esc(c.provider)} • ${esc(c.typeName)} • ${esc(c.flight)} • ${c.dist.toFixed(1)}mi`
      : `Closest: —`;

    live.push(`Aircraft • <b>${esc(n)}</b> in range • <b>${cTxt}</b>${topMix ? " • Top: <b>"+esc(topMix)+"</b>" : ""}`);
    live.push(`Sky scan • highest plane <b>${esc(highest)}</b>`);
  } else live.push(`Aircraft • <b>loading</b>`);

  if(iss) live.push(`ISS • <b>${esc(iss.over || "Locating…")}</b>`);
  else live.push(`ISS • <b>loading</b>`);

  if(quakes){
    const count = quakes.count ?? 0;
    const largest = (quakes.maxMag != null) ? `M${quakes.maxMag.toFixed(1)} • ${quakes.maxMagPlace || "—"}` : "—";
    const closest = (quakes.closestMi != null)
      ? `${quakes.closestMi.toFixed(0)}mi • ${quakes.closestMag != null ? "M"+quakes.closestMag.toFixed(1) : "M—"} • ${quakes.closestPlace || "—"}`
      : "—";
    live.push(`Quakes • <b>${esc(count)}</b> last hour • largest <b>${esc(largest)}</b> • closest <b>${esc(closest)}</b>`);
  } else live.push(`Quakes • <b>loading</b>`);

  const lines = [...CONFIG.tickerBase, ...live].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

function renderRight(){
  const blocks = [];

  // Aurora
  if(aurora){
    const kpTag = aurora.kp != null ? `KP ${aurora.kp.toFixed(1)}` : "KP —";
    const stamp = aurora.ts ? `Updated ${fmtTime(aurora.ts)}` : "Updated recently";
    const kv = [
      {k:"Kp now", v: aurora.kp != null ? aurora.kp.toFixed(1) : "—"},
      {k:"Solar wind", v: aurora.speed != null ? `${Math.round(aurora.speed)} km/s` : "—"},
      {k:"Bz", v: aurora.bz != null ? `${aurora.bz.toFixed(1)} nT` : "—"},
      {k:"Kp forecast max", v: aurora.kpForecastMax != null ? aurora.kpForecastMax.toFixed(1) : "—"}
    ];
    blocks.push({
      html: moduleHTML("Aurora Forecast", `<span class="tag good">${esc(kpTag)}</span>`, "", stamp, [], kv)
    });
  } else {
    blocks.push({
      html: moduleHTML("Aurora Forecast", `<span class="tag warn">NOAA</span>`, "", "Waiting on data…", [], [])
    });
  }

  // Aircraft
  if(aircraft){
    const n = aircraft.count ?? 0;
    blocks.push({
      html: moduleHTML(
        "Aircraft Overhead",
        `<span class="tag good">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`,
        `${esc(n)} aircraft`,
        "",
        aircraft.list || [],
        []
      )
    });
  } else {
    blocks.push({
      html: moduleHTML(
        "Aircraft Overhead",
        `<span class="tag warn">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`,
        "Loading…",
        "",
        [],
        []
      )
    });
  }

  // ISS
  if(iss){
    const big = iss.over ? `Over: ${iss.over}` : "Locating…";
    const small = `Updated ${fmtTime(iss.ts)} • lat ${Number.isFinite(iss.lat) ? iss.lat.toFixed(2) : "—"} • lon ${Number.isFinite(iss.lon) ? iss.lon.toFixed(2) : "—"}`;
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag good">LIVE</span>`, esc(big), esc(small), [], [])
    });
  } else {
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag warn">LIVE</span>`, "Loading…", "Waiting on data…", [], [])
    });
  }

  // Earthquakes (list inside module, wrap2, capped count)
  if(quakes){
    const count = quakes.count ?? 0;
    blocks.push({
      html: moduleHTML(
        "Earthquakes",
        `<span class="tag good">USGS 1 HR</span>`,
        `${esc(count)} quakes`,
        `Updated ${fmtTime(quakes.ts)}`,
        quakes.list || [],
        []
      )
    });
  } else {
    blocks.push({
      html: moduleHTML("Earthquakes", `<span class="tag warn">USGS 1 HR</span>`, "Loading…", "Waiting on data…", [], [])
    });
  }

  // Show 2 at a time, rotate
  const a = blocks[phase % blocks.length];
  const b = blocks[(phase + 1) % blocks.length];

  $("mod1").className = "mini fade";
  $("mod1").innerHTML = a.html;

  $("mod2").className = "mini fade";
  $("mod2").innerHTML = b.html;

  $("rightHd").textContent = ["Live Modules", "Sky + Orbit", "Earth Systems"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
  buildTicker();
  setUpdated();
}

/* ===== Start loops ===== */
refreshApod();
refreshAurora();
refreshAircraft();
refreshISS();
refreshQuakes();
renderRight();

setInterval(refreshISSOver, CONFIG.refreshMs.geocode);
setInterval(refreshApod, CONFIG.refreshMs.apod);
setInterval(refreshAurora, CONFIG.refreshMs.aurora);
setInterval(refreshAircraft, CONFIG.refreshMs.aircraft);
setInterval(refreshISS, CONFIG.refreshMs.iss);
setInterval(refreshQuakes, CONFIG.refreshMs.quakes);
setInterval(renderRight, 22 * 1000);
setTimeout(refreshISSOver, 2500);
</script>
