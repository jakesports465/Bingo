<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>

<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* ===== BIGGER FOR 32" @ 10ft ===== */
    --h2: 36px;
    --h3: 20px;

    /* big number line */
    --big: 52px;

    /* base text */
    --base: 24px;
    --small: 18px;

    /* ticker */
    --ticker: 30px;

    /* module header + key small text */
    --cellTitle: 20px;
    --cellSmall: 26px;

    /* lists */
    --listFont: 22px;
    --listRight: 22px;

    /* bubbles/pills */
    --pillText: 17px;
    --tagText: 16px;
    --bubblePadY: 12px;
    --bubblePadX: 18px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 96px 1fr 82px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 780px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 12px 16px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: var(--pillText);
    display:flex; align-items:center; gap:10px;
  }
  .dot{
    width:12px;height:12px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.90;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.72)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:16px; right:16px; bottom:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .heroTitle{
    font-size: 42px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
    text-shadow: 0 10px 24px rgba(0,0,0,.55);
  }
  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: var(--small);
    align-items:center;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    font-size: var(--tagText);
    font-weight: 950;
    letter-spacing: .9px;
    text-transform: uppercase;
    color: var(--text);
    white-space:nowrap;
  }
  .tag.good{border-color: rgba(37,224,183,.40); background: rgba(37,224,183,.12); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.40); background: rgba(255,211,122,.12); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.40); background: rgba(255,107,134,.12); color:#ffd4dd}

  .stack{display:flex; flex-direction:column; gap:12px; min-height:0;}
  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height: 0;
  }

  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .miniTop .k{
    color: rgba(255,255,255,.72);
    font-size: var(--cellTitle);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 1000;
  }
  .miniTop .s{
    font-size: var(--tagText);
    font-weight: 1000;
    letter-spacing: .9px;
    text-transform: uppercase;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--text);
    white-space:nowrap;
  }

  .bigLine{
    font-size: var(--big);
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .smallLine{
    color: var(--muted);
    font-size: var(--cellSmall);
    line-height: 1.25;
    font-variant-numeric: tabular-nums;
  }

  .kv{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px 14px;
    align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .kv .k{
    color: rgba(255,255,255,.70);
    font-weight: 950;
    font-size: 20px;
    letter-spacing:.2px;
  }
  .kv .v{
    font-weight: 1000;
    font-size: 22px;
    color: rgba(255,255,255,.88);
    white-space:nowrap;
  }

  .list{
    display:flex; flex-direction:column; gap:12px;
    font-variant-numeric: tabular-nums;
    overflow:hidden;
  }
  .li{
    display:flex; justify-content:space-between; gap:12px;
    font-size: var(--listFont);
    font-weight: 950;
  }
  .li span:last-child{
    color:rgba(255,255,255,.72);
    font-weight:1000;
    font-size: var(--listRight);
    white-space:nowrap;
  }
  .li span:first-child{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 72%;
  }

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
    font-size: 19px;
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }
  .track{
    display:flex;
    gap:56px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll 30s linear infinite;
    font-weight: 1000;
    font-size: var(--ticker);
  }
  .track span b{color:rgba(255,255,255,.72)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }
  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title">Ambient Command Center</div>
      <div class="subtitle">space • earth • aurora • aircraft • iss • earthquakes • spacex • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="hd">
        <div class="h">NASA — Astronomy Picture of the Day</div>
        <div class="tag" id="apodTag">loading</div>
      </div>
      <div class="bd">
        <div class="hero">
          <img id="apodImg" alt="" src="" referrerpolicy="no-referrer" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
          <div class="mini" id="mod3"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  home: { lat: 42.9098, lon: -85.7631, name: "Grandville" },
  aircraftRadiusNm: 120,

  refreshMs: {
    apod:     60 * 60 * 1000,
    aurora:   5  * 60 * 1000,
    aircraft: 30 * 1000,
    iss:      12 * 1000,
    quakes:   60 * 1000,
    spacex:   5  * 60 * 1000,
    geocode:  60 * 1000
  },

  tickerBase: [
    "Ambient mode • live feeds only • no news",
    "APOD • Aurora • Aircraft • ISS • Quakes • SpaceX"
  ]
};

/* ===== utils ===== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function haversineMi(lat1, lon1, lat2, lon2){
  const toRad = (x)=> x * Math.PI/180;
  const R = 3958.8;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function countdown(toDate){
  if(!toDate) return "—";
  const ms = toDate - new Date();
  if(ms <= 0) return "now";
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h ${m}m`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function moduleHTML(title, statusHTML, bigHTML, smallHTML, listLines, kvPairs){
  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${statusHTML}</div>
    </div>
    ${bigHTML ? `<div class="bigLine">${bigHTML}</div>` : ``}
    ${smallHTML ? `<div class="smallLine">${smallHTML}</div>` : ``}
    ${Array.isArray(kvPairs) && kvPairs.length ? `
      <div class="kv">
        ${kvPairs.map(p => `<div class="k">${esc(p.k)}</div><div class="v">${esc(p.v)}</div>`).join("")}
      </div>
    ` : ``}
    ${listLines && listLines.length ? `
      <div class="list">
        ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
      </div>
    ` : ``}
  `;
}

/* ===== Aircraft helpers ===== */
const TYPE_MAP = {
  B738: "Boeing 737-800", B737: "Boeing 737", B739: "Boeing 737-900", B38M: "Boeing 737 MAX 8",
  B752: "Boeing 757-200", B763: "Boeing 767-300", B77W: "Boeing 777-300ER", B788: "Boeing 787-8", B789: "Boeing 787-9",
  A319: "Airbus A319", A320: "Airbus A320", A321: "Airbus A321", A20N: "Airbus A320neo", A21N: "Airbus A321neo",
  A332: "Airbus A330-200", A333: "Airbus A330-300", A359: "Airbus A350-900",
  BCS1: "Airbus A220-100", BCS3: "Airbus A220-300",
  E170: "Embraer E170", E175: "Embraer E175", E75L: "Embraer E175", E190: "Embraer E190", E195: "Embraer E195",
  CRJ9: "CRJ-900", CRJ7: "CRJ-700",
  P28R: "Piper Arrow", PA32: "Piper Saratoga", PA34: "Piper Seneca",
  C172: "Cessna 172", C56X: "Cessna Citation Excel/XLS", SR22: "Cirrus SR22"
};
function friendlyType(code){
  if(!code) return "Unknown type";
  const c = String(code).toUpperCase().trim();
  return TYPE_MAP[c] || c;
}

/* airline mapping (best effort) */
const AIRLINE_PREFIX = {
  DAL: "Delta", UAL: "United", AAL: "American", SWA: "Southwest",
  JBU: "JetBlue", NKS: "Spirit", FFT: "Frontier", ASA: "Alaska",
  SKW: "SkyWest", RPA: "Republic", ENY: "Envoy", JIA: "PSA", AWI: "Air Wisconsin",
  UPS: "UPS", FDX: "FedEx"
};
const PROVIDER_HINT = {
  SKW: "United/Delta/American Express",
  RPA: "United/Delta/American Express",
  ENY: "American Eagle",
  JIA: "American Eagle",
  AWI: "United Express"
};

function cleanCallsign(raw){
  const s = String(raw || "").trim();
  return s || "UNKNOWN";
}
function flightPretty(cs){
  return String(cs).toUpperCase().replace(/\s+/g,"").replace(/[^A-Z0-9]/g,"");
}
function callsignPrefix(cs){
  const t = String(cs).toUpperCase().replace(/[^A-Z0-9]/g,"");
  const m = t.match(/^([A-Z]{3})/);
  return m ? m[1] : "";
}
function providerLabel(cs){
  const prefix = callsignPrefix(cs);
  if(!prefix) return "General Aviation";
  if(AIRLINE_PREFIX[prefix]){
    const base = AIRLINE_PREFIX[prefix];
    const hint = PROVIDER_HINT[prefix];
    return hint ? `${base}` : base;
  }
  if(/^N[0-9A-Z]+$/i.test(cs)) return "General Aviation";
  return "Other";
}

/* ===== Aurora helpers ===== */
function normLon(lon){
  let x = Number(lon);
  if(!Number.isFinite(x)) return null;
  if(x > 180) x = x - 360;
  return x;
}
function lastRow(arr){
  if(!Array.isArray(arr)) return null;
  for(let i=arr.length-1;i>=0;i--){
    const row = arr[i];
    if(Array.isArray(row)) return row;
  }
  return null;
}

/* ===== data state ===== */
let aurora = null;        // { kp, ts, bz, speed, kpForecastMax }
let aircraft = null;      // { count, closest, list, topProviders, highestAltFt }
let iss = null;           // { lat, lon, over, ts }
let quakes = null;        // { count, maxMag, closestMi, closestPlace, ts }
let spacex = null;        // { name, date, statusTag, displayTime, precision, windowNote }
let apod = null;

/* ===== NASA APOD ===== */
function setApodFallback(msgTop, msgSub){
  $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
    <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
      <defs><linearGradient id='g' x1='0' x2='1'>
        <stop stop-color='#0b1020' offset='0'/><stop stop-color='#081018' offset='1'/>
      </linearGradient></defs>
      <rect width='100%' height='100%' fill='url(#g)'/>
      <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>${msgTop}</text>
      <text x='70' y='240' fill='#a7b0c2' font-size='34' font-family='Arial'>${msgSub}</text>
    </svg>
  `);
}

async function refreshApod(){
  try{
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
    apod = d;
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    const img = $("apodImg");
    img.onerror = () => setApodFallback("NASA APOD image blocked", "Using a local fallback background");
    if(d.media_type === "image" && (d.hdurl || d.url)){
      img.src = d.hdurl || d.url;
    } else {
      setApodFallback("NASA APOD is a video today", "Showing placeholder background");
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const explRaw = (d.explanation || "");
    const expl = explRaw.slice(0, 140).trim() + (explRaw.length > 140 ? "…" : "");
    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span style="margin-left:auto; color: var(--muted); font-weight:950;">${esc(expl)}</span>
    `;
    setUpdated();
  } catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
    setApodFallback("NASA APOD offline", "Retrying automatically");
  }
}

/* ===== Aurora (remove local/global; keep only “meaningful” values) ===== */
async function refreshAurora(){
  try{
    const kpUrl      = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";
    const magUrl     = "https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json";
    const plasmaUrl  = "https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json";
    const kpFcUrl    = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json";

    const [kp, mag, plasma, kpFc] = await Promise.all([
      getJson(kpUrl),
      getJson(magUrl),
      getJson(plasmaUrl),
      getJson(kpFcUrl)
    ]);

    let kpVal = null;
    let kpTs = null;
    if(Array.isArray(kp)){
      for(let i=kp.length-1; i>=0; i--){
        const row = kp[i];
        if(Array.isArray(row) && row.length >= 2){
          const cand = Number(row[1]);
          if(Number.isFinite(cand)){
            kpVal = cand;
            kpTs = row[0] ? new Date(row[0]) : null;
            break;
          }
        }
      }
    }

    let bz = null;
    {
      const r = lastRow(mag);
      if(r && r.length >= 4){
        const cand = Number(r[3]);
        if(Number.isFinite(cand)) bz = cand;
      }
    }
    let speed = null;
    {
      const r = lastRow(plasma);
      if(r && r.length >= 3){
        const cand = Number(r[2]);
        if(Number.isFinite(cand)) speed = cand;
      }
    }

    let kpForecastMax = null;
    if(Array.isArray(kpFc)){
      let m = null;
      for(const row of kpFc){
        if(Array.isArray(row) && row.length >= 2){
          const v = Number(row[1]);
          if(Number.isFinite(v)) m = (m==null) ? v : Math.max(m, v);
        }
      }
      kpForecastMax = m;
    }

    aurora = {
      kp: kpVal,
      ts: kpTs || new Date(),
      bz,
      speed,
      kpForecastMax
    };
  } catch(e){
    aurora = null;
  }
}

/* ===== Aircraft (cell shows only list; summary goes to ticker) ===== */
async function refreshAircraft(){
  try{
    const {lat, lon} = CONFIG.home;
    const r = CONFIG.aircraftRadiusNm;
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`;
    const d = await getJson(url);

    const raw = Array.isArray(d) ? d : (Array.isArray(d?.ac) ? d.ac : (Array.isArray(d?.aircraft) ? d.aircraft : []));
    const cleaned = raw
      .map(a => {
        const alat = Number(a.lat ?? a.latitude);
        const alon = Number(a.lon ?? a.longitude);
        const dist = (Number.isFinite(alat) && Number.isFinite(alon)) ? haversineMi(lat, lon, alat, alon) : null;

        const csRaw = a.flight ?? a.callsign ?? a.cs ?? a.r ?? a.reg ?? "";
        const callsign = cleanCallsign(csRaw);
        const flight = flightPretty(callsign);

        const typeCode = (a.t ?? a.type ?? a.icao_type ?? a.icaoType ?? "").toString().trim().toUpperCase();
        const typeName = friendlyType(typeCode);

        const alt = a.alt_baro ?? a.altitude ?? a.alt ?? null;
        const provider = providerLabel(flight);

        return {provider, flight, typeName, alt, dist};
      })
      .filter(x => x.dist != null)
      .sort((x,y) => x.dist - y.dist);

    const closest = cleaned[0] || null;

    let highestAltFt = null;
    for(const x of cleaned){
      const a = Number(x.alt);
      if(Number.isFinite(a)){
        highestAltFt = (highestAltFt==null) ? a : Math.max(highestAltFt, a);
      }
    }

    const counts = {};
    for(const x of cleaned){
      const k = x.provider || "Other";
      counts[k] = (counts[k] || 0) + 1;
    }
    const topProviders = Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([name,cnt]) => ({name, cnt}));

    // Cell list: provider + aircraft model on left; flight + miles on right
    const topList = cleaned.slice(0,5).map(x => ({
      left: `${x.provider} • ${x.typeName}`,
      right: `${x.flight} • ${x.dist.toFixed(1)}mi`
    }));

    aircraft = {
      count: cleaned.length,
      closest,
      list: topList,
      topProviders,
      highestAltFt
    };
  } catch(e){
    aircraft = null;
  }
}

/* ===== ISS + reverse geocode ===== */
async function refreshISS(){
  try{
    const d = await getJson("https://api.wheretheiss.at/v1/satellites/25544");
    iss = {
      lat: Number(d.latitude),
      lon: Number(d.longitude),
      ts: new Date(),
      over: iss?.over ?? "Locating…"
    };
  } catch(e){
    iss = null;
  }
}
async function refreshISSOver(){
  if(!iss || !Number.isFinite(iss.lat) || !Number.isFinite(iss.lon)) return;
  try{
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${iss.lat}&longitude=${iss.lon}&localityLanguage=en`;
    const g = await getJson(url);

    const locality = g.locality || g.city || "";
    const region   = g.principalSubdivision || "";
    const country  = g.countryName || "";
    const ocean = g.localityInfo?.informative?.find(x => (x.description||"").toLowerCase().includes("ocean"))?.name;

    let over = "";
    if(ocean) over = ocean;
    else if(locality && country) over = `${locality}${region && region !== locality ? ", " + region : ""}, ${country}`;
    else if(region && country) over = `${region}, ${country}`;
    else if(country) over = country;
    else over = "Open ocean / remote";

    iss.over = over;
  } catch(e){
    iss.over = "Unknown";
  }
}

/* ===== Earthquakes (USGS last 1 hour) ===== */
async function refreshQuakes(){
  try{
    const d = await getJson("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
    const feats = Array.isArray(d?.features) ? d.features : [];
    const {lat, lon} = CONFIG.home;

    let maxMag = null;
    let closestMi = null;
    let closestPlace = null;

    for(const f of feats){
      const mag = Number(f?.properties?.mag);
      const place = String(f?.properties?.place || "").trim();
      const coords = f?.geometry?.coordinates;
      if(Array.isArray(coords) && coords.length >= 2){
        const qlon = Number(coords[0]);
        const qlat = Number(coords[1]);
        if(Number.isFinite(qlat) && Number.isFinite(qlon)){
          const dist = haversineMi(lat, lon, qlat, qlon);
          if(closestMi == null || dist < closestMi){
            closestMi = dist;
            closestPlace = place || "Unknown location";
          }
        }
      }
      if(Number.isFinite(mag)){
        maxMag = (maxMag == null) ? mag : Math.max(maxMag, mag);
      }
    }

    quakes = {
      count: feats.length,
      maxMag,
      closestMi,
      closestPlace,
      ts: new Date()
    };
  } catch(e){
    quakes = null;
  }
}

/* ===== SpaceX (fix: /next can go stale; use /upcoming + pick first FUTURE launch) ===== */
function formatLocal(date){
  if(!date) return "—";
  return date.toLocaleString([], {weekday:"short", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
}
async function refreshSpaceX(){
  try{
    // Pull upcoming list, pick nearest future by date_utc
    const list = await getJson("https://api.spacexdata.com/v5/launches/upcoming");
    const now = Date.now();
    const upcoming = Array.isArray(list) ? list
      .map(x => ({
        name: x?.name || "Upcoming launch",
        date: x?.date_utc ? new Date(x.date_utc) : null,
        precision: x?.date_precision || "",
        tbd: !!x?.tbd,
        net: !!x?.net
      }))
      .filter(x => x.date && Number.isFinite(x.date.getTime()))
      .filter(x => x.date.getTime() > now + 5*60*1000) // must be > 5 minutes in the future
      .sort((a,b)=>a.date-b.date)
      : [];

    const pick = upcoming[0] || null;

    if(!pick){
      // fallback: keep last known but mark TBD
      spacex = spacex ? {...spacex, statusTag:"TBD", displayTime:"Awaiting updated time"} : {
        name: "SpaceX",
        date: null,
        precision: "",
        statusTag: "TBD",
        displayTime: "Awaiting updated time",
        windowNote: ""
      };
      return;
    }

    // Determine if time is precise enough to countdown
    const precision = String(pick.precision || "").toLowerCase();
    const precise = (precision === "hour") || (precision === "day"); // hour is ideal; day we'll show date (no countdown)
    let statusTag = "NEXT";
    let displayTime = "";

    if(pick.tbd || precision === "month" || precision === "year"){
      statusTag = "TBD";
      displayTime = "Awaiting updated time";
    } else if(precision === "day"){
      statusTag = "NEXT";
      displayTime = `NET ${formatLocal(pick.date)}`;
    } else {
      // hour-ish: show countdown + local time
      statusTag = "NEXT";
      displayTime = `T-minus ${countdown(pick.date)} • ${formatLocal(pick.date)}`;
    }

    spacex = {
      name: pick.name,
      date: pick.date,
      precision: pick.precision,
      statusTag,
      displayTime,
      windowNote: pick.net ? "NET" : ""
    };
  } catch(e){
    spacex = null;
  }
}

/* ===== Render ===== */
let phase = 0;

function buildTicker(){
  const live = [];

  if(apod?.title) live.push(`APOD • <b>${esc(apod.title)}</b>`);

  if(aurora){
    const kp = (aurora.kp != null) ? `Kp <b>${esc(aurora.kp.toFixed(1))}</b>` : `Kp <b>—</b>`;
    const sw = (aurora.speed != null) ? `SW <b>${esc(Math.round(aurora.speed))}</b> km/s` : `SW <b>—</b>`;
    const bz = (aurora.bz != null) ? `Bz <b>${esc(aurora.bz.toFixed(1))}</b> nT` : `Bz <b>—</b>`;
    const fc = (aurora.kpForecastMax != null) ? `Kp fcst max <b>${esc(aurora.kpForecastMax.toFixed(1))}</b>` : `Kp fcst max <b>—</b>`;
    live.push(`Aurora • ${kp} • ${sw} • ${bz} • ${fc}`);
  } else {
    live.push(`Aurora • <b>loading</b>`);
  }

  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const highest = aircraft.highestAltFt != null ? `${Math.round(aircraft.highestAltFt).toLocaleString()} ft` : "—";
    const topMix = (aircraft.topProviders || []).map(x => `${x.name} ${x.cnt}`).join(" • ");

    const cTxt = c
      ? `Closest: ${esc(c.provider)} • ${esc(c.typeName)} • ${esc(c.flight)} • ${c.dist.toFixed(1)}mi`
      : `Closest: —`;

    live.push(`Aircraft • <b>${esc(n)}</b> in range • <b>${cTxt}</b> • Highest: <b>${esc(highest)}</b>${topMix ? " • Top: <b>"+esc(topMix)+"</b>" : ""}`);
  } else {
    live.push(`Aircraft • <b>loading</b>`);
  }

  if(iss){
    live.push(`ISS • <b>${esc(iss.over || "Locating…")}</b>`);
  } else {
    live.push(`ISS • <b>loading</b>`);
  }

  if(quakes){
    const mm = (quakes.maxMag != null) ? quakes.maxMag.toFixed(1) : "—";
    const cd = (quakes.closestMi != null) ? quakes.closestMi.toFixed(0) + "mi" : "—";
    live.push(`Quakes • <b>${esc(quakes.count)}</b> last hour • max M<b>${esc(mm)}</b> • closest <b>${esc(cd)}</b>`);
  } else {
    live.push(`Quakes • <b>loading</b>`);
  }

  if(spacex){
    live.push(`SpaceX • <b>${esc(spacex.name)}</b> • <b>${esc(spacex.displayTime || "—")}</b>`);
  } else {
    live.push(`SpaceX • <b>loading</b>`);
  }

  const lines = [...CONFIG.tickerBase, ...live].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

function renderRight(){
  const blocks = [];

  // AURORA (no local/global; clearer meaning)
  if(aurora){
    const kpTag = aurora.kp != null ? `KP ${aurora.kp.toFixed(1)}` : "KP —";
    const stamp = aurora.ts ? `Updated ${fmtTime(aurora.ts)}` : "Updated recently";

    const kv = [
      {k:"Kp now", v: aurora.kp != null ? aurora.kp.toFixed(1) : "—"},
      {k:"Solar wind", v: aurora.speed != null ? `${Math.round(aurora.speed)} km/s` : "—"},
      {k:"Bz", v: aurora.bz != null ? `${aurora.bz.toFixed(1)} nT` : "—"},
      {k:"Kp forecast max", v: aurora.kpForecastMax != null ? aurora.kpForecastMax.toFixed(1) : "—"}
    ];

    blocks.push({
      html: moduleHTML(
        "Aurora Forecast",
        `<span class="tag good">${esc(kpTag)}</span>`,
        "",
        stamp,
        [],
        kv
      )
    });
  } else {
    blocks.push({
      html: moduleHTML("Aurora Forecast", `<span class="tag warn">NOAA</span>`, "", "Waiting on data…", [], [])
    });
  }

  // AIRCRAFT (cell: list only)
  if(aircraft){
    const n = aircraft.count ?? 0;
    blocks.push({
      html: moduleHTML(
        "Aircraft Overhead",
        `<span class="tag good">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`,
        `${esc(n)} aircraft`,
        "",                 // no summary line in the cell
        aircraft.list || [],
        []
      )
    });
  } else {
    blocks.push({
      html: moduleHTML("Aircraft Overhead", `<span class="tag warn">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`, "Loading…", "", [], [])
    });
  }

  // ISS
  if(iss){
    const big = iss.over ? `Over: ${iss.over}` : "Locating…";
    const small = `Updated ${fmtTime(iss.ts)} • lat ${Number.isFinite(iss.lat) ? iss.lat.toFixed(2) : "—"} • lon ${Number.isFinite(iss.lon) ? iss.lon.toFixed(2) : "—"}`;
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag good">LIVE</span>`, esc(big), esc(small), [], [])
    });
  } else {
    blocks.push({
      html: moduleHTML("ISS Position", `<span class="tag warn">LIVE</span>`, "Loading…", "Waiting on data…", [], [])
    });
  }

  // Earthquakes
  if(quakes){
    const count = quakes.count ?? 0;
    const maxMag = (quakes.maxMag != null) ? quakes.maxMag.toFixed(1) : "—";
    const closest = (quakes.closestMi != null) ? `${quakes.closestMi.toFixed(0)}mi` : "—";
    const place = quakes.closestPlace ? quakes.closestPlace : "—";

    const kv = [
      {k:"Last hour", v:`${count} total`},
      {k:"Largest", v:`M${maxMag}`},
      {k:"Closest", v:`${closest}`},
      {k:"Closest area", v: place}
    ];

    blocks.push({
      html: moduleHTML(
        "Earthquakes",
        `<span class="tag good">USGS 1 HR</span>`,
        `${esc(count)} quakes`,
        `Updated ${fmtTime(quakes.ts)}`,
        [],
        kv
      )
    });
  } else {
    blocks.push({
      html: moduleHTML("Earthquakes", `<span class="tag warn">USGS 1 HR</span>`, "Loading…", "Waiting on data…", [], [])
    });
  }

  // SpaceX
  if(spacex){
    const tagClass = spacex.statusTag === "TBD" ? "warn" : "good";
    blocks.push({
      html: moduleHTML(
        "SpaceX",
        `<span class="tag ${tagClass}">${esc(spacex.statusTag)}</span>`,
        esc(spacex.name || "Upcoming launch"),
        esc(spacex.displayTime || "—"),
        [],
        []
      )
    });
  } else {
    blocks.push({
      html: moduleHTML("SpaceX", `<span class="tag warn">TBD</span>`, "Loading…", "Waiting on data…", [], [])
    });
  }

  // rotate 3 modules at a time
  const pick = (arr, start) => [arr[start%arr.length], arr[(start+1)%arr.length], arr[(start+2)%arr.length]];
  const chosen = pick(blocks, phase);

  $("mod1").className = "mini fade"; $("mod1").innerHTML = chosen[0].html;
  $("mod2").className = "mini fade"; $("mod2").innerHTML = chosen[1].html;
  $("mod3").className = "mini fade"; $("mod3").innerHTML = chosen[2].html;

  $("rightHd").textContent = ["Live Modules", "Sky + Orbit", "Earth Systems"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
  buildTicker();
  setUpdated();
}

/* ===== Start loops ===== */
refreshApod();
refreshAurora();
refreshAircraft();
refreshISS();
refreshQuakes();
refreshSpaceX();
renderRight();

setInterval(refreshISSOver, CONFIG.refreshMs.geocode);

setInterval(refreshApod,     CONFIG.refreshMs.apod);
setInterval(refreshAurora,   CONFIG.refreshMs.aurora);
setInterval(refreshAircraft, CONFIG.refreshMs.aircraft);
setInterval(refreshISS,      CONFIG.refreshMs.iss);
setInterval(refreshQuakes,   CONFIG.refreshMs.quakes);
setInterval(refreshSpaceX,   CONFIG.refreshMs.spacex);

setInterval(renderRight, 22 * 1000);
setTimeout(refreshISSOver, 2500);
</script>
