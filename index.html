<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>

<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* ===== readable on 32" @ 10ft ===== */
    --h2: 34px;
    --h3: 18px;

    /* module text */
    --big: 42px;
    --cellTitle: 19px;
    --cellSmall: 20px;

    /* list rows */
    --listFont: 19px;
    --listRight: 19px;

    /* key/value rows (aurora + quakes) */
    --kvKey: 18px;
    --kvVal: 20px;

    /* ticker */
    --ticker: 26px;
    --tickerSpeed: 42s; /* adjust here (higher = slower) */

    /* tag “bubbles” */
    --tagText: 15px;
    --bubblePadY: 11px;
    --bubblePadX: 18px;

    /* layout */
    --headerH: 92px;
    --footerH: 74px;
    --gap: 12px;
    --pad: 16px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  /* ===== Fire TV / Silk “smoosh” fix ===== */
  .tv-compact{
    --h2: 30px;
    --big: 38px;
    --cellTitle: 18px;
    --cellSmall: 18px;
    --listFont: 18px;
    --listRight: 18px;
    --kvKey: 17px;
    --kvVal: 18px;
    --ticker: 24px;

    --headerH: 84px;
    --footerH: 68px;
    --gap: 10px;
    --pad: 12px;

    --tickerSpeed: 46s;
    --bubblePadY: 10px;
    --bubblePadX: 16px;
  }

  .wrap{
    height:100%;
    padding: var(--pad);
    display:grid;
    grid-template-rows: var(--headerH) 1fr var(--footerH);
    gap: var(--gap);
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    min-height:0;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height:1.05;
  }
  .subtitle{
    color: var(--muted);
    font-size: 16px;
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 760px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 14px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 16px;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .dot{
    width:10px;height:10px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.35fr 1fr;
    gap: var(--gap);
  }
  .tv-compact main{ grid-template-columns: 1.22fr 1fr; }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }

  .hd{
    padding: 12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
    min-height:0;
    gap:10px;
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .bd{
    padding: 12px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  /* ===== APOD ===== */
  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.88;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.80)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:14px; right:14px; bottom:12px;
    display:flex; flex-direction:column; gap:10px;
    min-height:0;
  }
  .heroTitle{
    font-size: 40px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.08;
    text-shadow: 0 10px 30px rgba(0,0,0,.55);
    /* always fits */
    display:-webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow:hidden;
  }
  .tv-compact .heroTitle{ font-size: 34px; }

  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: 16px;
    align-items:center;
    min-height:0;
  }
  .heroMeta .metaTail{
    margin-left:auto;
    color: rgba(255,255,255,.72);
    font-weight:900;
    max-width: 52%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tv-compact .heroMeta .metaTail{ max-width: 46%; }

  /* ===== tags ===== */
  .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    font-size: var(--tagText);
    font-weight: 950;
    letter-spacing: .9px;
    text-transform: uppercase;
    color: var(--text);
    white-space:nowrap;
  }
  .tag.good{border-color: rgba(37,224,183,.40); background: rgba(37,224,183,.12); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.40); background: rgba(255,211,122,.12); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.40); background: rgba(255,107,134,.12); color:#ffd4dd}

  /* ===== Right modules ===== */
  .stack{
    display:grid;
    grid-template-rows: 1fr 1fr; /* ONLY TWO CELLS AT A TIME */
    gap: 10px;
    min-height:0;
  }

  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    min-height:0;
    overflow:hidden; /* hard stop: never spill outside */
  }

  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex:0 0 auto;
    min-height:0;
  }
  .miniTop .k{
    color: rgba(255,255,255,.78);
    font-size: var(--cellTitle);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 1000;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 72%;
  }
  .miniTop .s{
    font-size: var(--tagText);
    font-weight: 1000;
    letter-spacing: .9px;
    text-transform: uppercase;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--text);
    white-space:nowrap;
    flex-shrink:0;
  }

  .bigLine{
    font-size: var(--big);
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .smallLine{
    color: rgba(255,255,255,.74);
    font-size: var(--cellSmall);
    line-height: 1.22;
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* key/value list (no scrollbars, fits by clamping rows) */
  .kv{
    display:flex;
    flex-direction:column;
    gap: 8px;
    min-height:0;
    overflow:hidden;
    flex: 1 1 auto;
  }
  .kvRow{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:baseline;
    min-height:0;
  }
  .kvKey{
    font-size: var(--kvKey);
    font-weight: 950;
    color: rgba(255,255,255,.74);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 62%;
  }
  .kvVal{
    font-size: var(--kvVal);
    font-weight: 1000;
    color: rgba(255,255,255,.90);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 38%;
    text-align:right;
  }

  /* aircraft list */
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
    overflow:hidden; /* no scrollbars */
    flex: 1 1 auto;
  }
  .li{
    display:flex; justify-content:space-between; gap:12px;
    font-size: var(--listFont);
    font-weight: 950;
    align-items:baseline;
    min-height:0;
  }
  .li span:first-child{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 74%;
  }
  .li span:last-child{
    color:rgba(255,255,255,.75);
    font-weight:1000;
    font-size: var(--listRight);
    white-space:nowrap;
    max-width: 26%;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:right;
  }

  /* ===== ticker ===== */
  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
    min-height:0;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
    font-size: 18px;
    flex-shrink:0;
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
    min-width:0;
  }
  .track{
    display:flex;
    gap:54px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll var(--tickerSpeed) linear infinite;
    font-weight: 1000;
    font-size: var(--ticker);
    will-change: transform;
  }
  .track span b{color:rgba(255,255,255,.74)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }

  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title">Ambient Command Center</div>
      <div class="subtitle">space • earth • aurora • aircraft • iss • earthquakes • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="hd">
        <div class="h">NASA — Astronomy Picture of the Day</div>
        <div class="tag" id="apodTag">loading</div>
      </div>
      <div class="bd">
        <div class="hero">
          <img id="apodImg" alt="" src="" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== Fire TV / Silk compact mode detection ===== */
(function(){
  const ua = navigator.userAgent || "";
  const isFireTV = /AFT|AmazonWebAppPlatform|Silk/i.test(ua);
  if(isFireTV) document.documentElement.classList.add("tv-compact");
})();

/* ===== CONFIG ===== */
const CONFIG = {
  home: { lat: 42.9098, lon: -85.7631, name: "Grandville" },
  aircraftRadiusNm: 120,

  refreshMs: {
    apod:     60 * 60 * 1000,
    aurora:   5  * 60 * 1000,
    aircraft: 30 * 1000,
    iss:      12 * 1000,
    quakes:   60 * 1000,
    geocode:  60 * 1000
  },

  tickerBase: [
    "Ambient mode • live feeds only • no news",
    "APOD • Aurora • Aircraft • ISS • Quakes"
  ]
};

/* ===== utils ===== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function haversineMi(lat1, lon1, lat2, lon2){
  const toRad = (x)=> x * Math.PI/180;
  const R = 3958.8;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function clampRows(rows, max){
  return Array.isArray(rows) ? rows.slice(0, max) : [];
}

/* ===== module renderer ===== */
function moduleHTML({title, statusHTML, bigHTML, smallHTML, kvRows, listLines}){
  const kv = (kvRows && kvRows.length) ? `
    <div class="kv">
      ${kvRows.map(r => `
        <div class="kvRow">
          <div class="kvKey">${esc(r.left)}</div>
          <div class="kvVal">${esc(r.right)}</div>
        </div>
      `).join("")}
    </div>` : "";

  const list = (listLines && listLines.length) ? `
    <div class="list">
      ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
    </div>` : "";

  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${statusHTML}</div>
    </div>
    ${bigHTML ? `<div class="bigLine">${bigHTML}</div>` : ``}
    ${smallHTML ? `<div class="smallLine">${smallHTML}</div>` : ``}
    ${kv}
    ${list}
  `;
}

/* ===== Aircraft helpers ===== */
const TYPE_MAP = {
  B738: "Boeing 737-800", B737: "Boeing 737", B739: "Boeing 737-900", B38M: "Boeing 737 MAX 8",
  B752: "Boeing 757-200", B763: "Boeing 767-300", B77W: "Boeing 777-300ER", B788: "Boeing 787-8", B789: "Boeing 787-9",
  A319: "Airbus A319", A320: "Airbus A320", A321: "Airbus A321", A20N: "Airbus A320neo", A21N: "Airbus A321neo",
  A332: "Airbus A330-200", A333: "Airbus A330-300", A359: "Airbus A350-900",
  BCS1: "Airbus A220-100", BCS3: "Airbus A220-300",
  E170: "Embraer E170", E175: "Embraer E175", E75L: "Embraer E175", E190: "Embraer E190", E195: "Embraer E195",
  CRJ9: "CRJ-900", CRJ7: "CRJ-700",
  P28R: "Piper Arrow", PA32: "Piper Saratoga", PA34: "Piper Seneca",
  C172: "Cessna 172", C56X: "Cessna Citation Excel/XLS", SR22: "Cirrus SR22"
};
function friendlyType(code){
  if(!code) return "Unknown type";
  const c = String(code).toUpperCase().trim();
  return TYPE_MAP[c] || c;
}
const AIRLINE_PREFIX = {
  DAL:"Delta", UAL:"United", AAL:"American", SWA:"Southwest", JBU:"JetBlue", NKS:"Spirit", FFT:"Frontier",
  ASA:"Alaska", SKW:"SkyWest", RPA:"Republic", ENY:"Envoy", JIA:"PSA", AWI:"Air Wisconsin", UPS:"UPS", FDX:"FedEx"
};
function flightPretty(cs){ return String(cs||"").toUpperCase().replace(/\s+/g,"").trim() || "UNKNOWN"; }
function callsignPrefix(cs){
  const t = String(cs).toUpperCase().replace(/[^A-Z0-9]/g,"");
  const m = t.match(/^([A-Z]{3})/);
  return m ? m[1] : "";
}
function providerLabel(cs){
  const prefix = callsignPrefix(cs);
  if(!prefix) return "General Aviation";
  if(AIRLINE_PREFIX[prefix]) return AIRLINE_PREFIX[prefix];
  if(/^N[0-9A-Z]+$/i.test(cs)) return "General Aviation";
  return "Other";
}

/* ===== Aurora helpers ===== */
function normLon(lon){
  let x = Number(lon);
  if(!Number.isFinite(x)) return null;
  if(x > 180) x = x - 360;
  return x;
}
function lastRow(arr){
  if(!Array.isArray(arr)) return null;
  for(let i=arr.length-1;i>=0;i--){
    const row = arr[i];
    if(Array.isArray(row)) return row;
  }
  return null;
}

/* ===== state ===== */
let aurora=null;   // {kp,bz,speed,kpForecastMax,ts}
let aircraft=null; // {count,list,closest,highest:{provider,typeName,flight,altFt,distMi}, topAirlines:[{name,cnt}]}
let iss=null;      // {lat,lon,over,ts}
let quakes=null;   // {count,items:[{t,mag,place}], largest:{mag,place}, closest:{mi,place}, ts}
let apod=null;

/* ===== APOD ===== */
async function refreshApod(){
  try{
    // DEMO_KEY is rate-limited. If it hits limit, APOD will show offline (by design).
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
    apod = d;
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    if(d.media_type === "image" && d.url){
      $("apodImg").src = d.url;
    } else {
      $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
          <defs><linearGradient id='g' x1='0' x2='1'>
            <stop stop-color='#0b1020' offset='0'/><stop stop-color='#081018' offset='1'/>
          </linearGradient></defs>
          <rect width='100%' height='100%' fill='url(#g)'/>
          <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD is a video today</text>
          <text x='70' y='235' fill='#a7b0c2' font-size='34' font-family='Arial'>Showing placeholder background</text>
        </svg>
      `);
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const expl = (d.explanation || "").replace(/\s+/g," ").trim();
    const short = expl.length > 110 ? expl.slice(0,110) + "…" : expl;

    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span class="metaTail">${esc(short)}</span>
    `;

    setUpdated();
  }catch(e){
    apod = null;
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
    $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
      <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
        <rect width='100%' height='100%' fill='#070a12'/>
        <text x='70' y='150' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD offline</text>
        <text x='70' y='220' fill='#a7b0c2' font-size='34' font-family='Arial'>Retrying automatically…</text>
      </svg>
    `);
    $("apodMeta").innerHTML = `<span class="tag warn">DEMO KEY RATE LIMIT POSSIBLE</span><span class="tag">TRY LATER</span>`;
  }
}

/* ===== Aurora (NOAA SWPC) ===== */
async function refreshAurora(){
  try{
    const kpUrl   = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";
    const magUrl  = "https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json";
    const plUrl   = "https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json";
    const kpFcUrl = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json";

    const [kp, mag, plasma, kpFc] = await Promise.all([getJson(kpUrl), getJson(magUrl), getJson(plUrl), getJson(kpFcUrl)]);

    // current Kp
    let kpVal = null;
    if(Array.isArray(kp)){
      for(let i=kp.length-1;i>=0;i--){
        const row = kp[i];
        if(Array.isArray(row) && row.length>=2){
          const v = Number(row[1]);
          if(Number.isFinite(v)){ kpVal = v; break; }
        }
      }
    }

    // Bz
    let bz = null;
    const m = lastRow(mag);
    if(m && m.length>=4){
      const v = Number(m[3]);
      if(Number.isFinite(v)) bz = v;
    }

    // Speed
    let speed = null;
    const p = lastRow(plasma);
    if(p && p.length>=3){
      const v = Number(p[2]);
      if(Number.isFinite(v)) speed = v;
    }

    // forecast max
    let kpForecastMax = null;
    if(Array.isArray(kpFc)){
      let mx = null;
      for(const row of kpFc){
        if(Array.isArray(row) && row.length>=2){
          const v = Number(row[1]);
          if(Number.isFinite(v)) mx = (mx==null)? v : Math.max(mx, v);
        }
      }
      kpForecastMax = mx;
    }

    aurora = { kp: kpVal, bz, speed, kpForecastMax, ts: new Date() };
  }catch(e){
    aurora = null;
  }
}

/* ===== Aircraft (airplanes.live) ===== */
async function refreshAircraft(){
  try{
    const {lat, lon} = CONFIG.home;
    const r = CONFIG.aircraftRadiusNm;
    const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`;
    const d = await getJson(url);

    const raw = Array.isArray(d) ? d : (Array.isArray(d?.ac) ? d.ac : (Array.isArray(d?.aircraft) ? d.aircraft : []));
    const cleaned = raw.map(a => {
      const alat = Number(a.lat ?? a.latitude);
      const alon = Number(a.lon ?? a.longitude);
      const dist = (Number.isFinite(alat) && Number.isFinite(alon)) ? haversineMi(lat, lon, alat, alon) : null;

      const csRaw = a.flight ?? a.callsign ?? a.cs ?? a.r ?? a.reg ?? "";
      const flight = flightPretty(csRaw);

      const typeCode = (a.t ?? a.type ?? a.icao_type ?? a.icaoType ?? "").toString().trim().toUpperCase();
      const typeName = friendlyType(typeCode);

      const provider = providerLabel(flight);

      const alt = Number(a.alt_baro ?? a.altitude ?? a.alt);
      const altFt = Number.isFinite(alt) ? alt : null;

      return {provider, flight, typeName, altFt, dist};
    }).filter(x => x.dist != null).sort((a,b)=>a.dist-b.dist);

    // list for cell (top 6)
    const list = cleaned.slice(0,6).map(x => ({
      left: `${x.provider} • ${x.typeName}`,
      right: `${x.flight} • ${x.dist.toFixed(1)}mi`
    }));

    // highest aircraft (include which flight/type)
    let highest = null;
    for(const x of cleaned){
      if(x.altFt != null){
        if(!highest || x.altFt > highest.altFt) highest = x;
      }
    }
    if(highest){
      highest = {
        provider: highest.provider,
        typeName: highest.typeName,
        flight: highest.flight,
        altFt: highest.altFt,
        distMi: highest.dist
      };
    }

    // top airlines ONLY (exclude General Aviation + Other)
    const counts = {};
    for(const x of cleaned){
      if(x.provider && x.provider !== "General Aviation" && x.provider !== "Other"){
        counts[x.provider] = (counts[x.provider]||0)+1;
      }
    }
    const topAirlines = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([name,cnt])=>({name,cnt}));

    aircraft = {
      count: cleaned.length,
      list,
      closest: cleaned[0] || null,
      highest,
      topAirlines
    };
  }catch(e){
    aircraft = null;
  }
}

/* ===== ISS + reverse geocode ===== */
async function refreshISS(){
  try{
    const d = await getJson("https://api.wheretheiss.at/v1/satellites/25544");
    iss = {
      lat: Number(d.latitude),
      lon: Number(d.longitude),
      ts: new Date(),
      over: iss?.over ?? "Locating…"
    };
  }catch(e){
    iss = null;
  }
}
async function refreshISSOver(){
  if(!iss || !Number.isFinite(iss.lat) || !Number.isFinite(iss.lon)) return;
  try{
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${iss.lat}&longitude=${iss.lon}&localityLanguage=en`;
    const g = await getJson(url);

    const locality = g.locality || g.city || "";
    const region   = g.principalSubdivision || "";
    const country  = g.countryName || "";
    const ocean = g.localityInfo?.informative?.find(x => (x.description||"").toLowerCase().includes("ocean"))?.name;

    let over = "";
    if(ocean) over = ocean;
    else if(locality && country) over = `${locality}${region && region !== locality ? ", " + region : ""}, ${country}`;
    else if(region && country) over = `${region}, ${country}`;
    else if(country) over = country;
    else over = "Open ocean / remote";

    iss.over = over;
  }catch(e){
    iss.over = "Unknown";
  }
}

/* ===== Earthquakes (USGS last hour) ===== */
async function refreshQuakes(){
  try{
    const d = await getJson("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
    const feats = Array.isArray(d?.features) ? d.features : [];

    const {lat, lon} = CONFIG.home;

    let largest = null;
    let closest = null;

    const items = feats.map(f => {
      const mag = Number(f?.properties?.mag);
      const place = String(f?.properties?.place || "Unknown").trim();
      const t = Number(f?.properties?.time);
      const dt = Number.isFinite(t) ? new Date(t) : new Date();
      const coords = f?.geometry?.coordinates;

      let distMi = null;
      if(Array.isArray(coords) && coords.length >= 2){
        const qlon = Number(coords[0]);
        const qlat = Number(coords[1]);
        if(Number.isFinite(qlat) && Number.isFinite(qlon)){
          distMi = haversineMi(lat, lon, qlat, qlon);
        }
      }

      if(Number.isFinite(mag)){
        if(!largest || mag > largest.mag) largest = {mag, place};
      }
      if(distMi != null){
        if(!closest || distMi < closest.mi) closest = {mi: distMi, place};
      }

      return {
        when: dt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}),
        mag: Number.isFinite(mag) ? mag : null,
        place
      };
    }).sort((a,b) => (b.mag ?? -999) - (a.mag ?? -999));

    quakes = {
      count: feats.length,
      items,
      largest,
      closest,
      ts: new Date()
    };
  }catch(e){
    quakes = null;
  }
}

/* ===== Render ticker + modules (ONLY 2 at a time) ===== */
let phase = 0;

function buildTicker(){
  const live = [];

  if(apod?.title) live.push(`APOD • <b>${esc(apod.title)}</b>`);

  if(aurora){
    const kp = (aurora.kp != null) ? aurora.kp.toFixed(1) : "—";
    const bz = (aurora.bz != null) ? `${aurora.bz.toFixed(1)} nT` : "—";
    const sp = (aurora.speed != null) ? `${Math.round(aurora.speed)} km/s` : "—";
    const fc = (aurora.kpForecastMax != null) ? aurora.kpForecastMax.toFixed(1) : "—";
    live.push(`Aurora • Kp <b>${esc(kp)}</b> • Bz <b>${esc(bz)}</b> • Wind <b>${esc(sp)}</b> • Kp fcst max <b>${esc(fc)}</b>`);
  } else live.push(`Aurora • <b>loading</b>`);

  if(aircraft){
    const n = aircraft.count ?? 0;
    const c = aircraft.closest;
    const topAir = (aircraft.topAirlines||[]).map(x => `${x.name} ${x.cnt}`).join(" • ");
    const closestTxt = c ? `${c.provider} • ${c.typeName} • ${c.flight} • ${c.dist.toFixed(1)}mi` : "—";
    live.push(`Aircraft • <b>${esc(n)}</b> in range • closest <b>${esc(closestTxt)}</b>${topAir ? " • top: <b>"+esc(topAir)+"</b>" : ""}`);

    if(aircraft.highest){
      const h = aircraft.highest;
      live.push(`Highest plane • <b>${esc(h.provider)}</b> • <b>${esc(h.typeName)}</b> • <b>${esc(h.flight)}</b> • <b>${esc(Math.round(h.altFt).toLocaleString())}</b> ft`);
    }
  } else live.push(`Aircraft • <b>loading</b>`);

  if(iss){
    live.push(`ISS • <b>${esc(iss.over || "Locating…")}</b>`);
  } else live.push(`ISS • <b>loading</b>`);

  // Quakes: ticker shows largest + closest only (per your request)
  if(quakes){
    const lg = quakes.largest ? `largest M<b>${esc(quakes.largest.mag.toFixed(1))}</b> • ${esc(quakes.largest.place)}` : "largest <b>—</b>";
    const cl = quakes.closest ? `closest <b>${esc(quakes.closest.mi.toFixed(0))}</b> mi • ${esc(quakes.closest.place)}` : "closest <b>—</b>";
    live.push(`Quakes • <b>${esc(quakes.count)}</b> last hour • ${lg} • ${cl}`);
  } else live.push(`Quakes • <b>loading</b>`);

  const lines = [...CONFIG.tickerBase, ...live].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

function renderRight(){
  const blocks = [];

  // ISS
  if(iss){
    blocks.push({
      title: "ISS Position",
      statusHTML: `<span class="tag good">LIVE</span>`,
      bigHTML: esc(`Over: ${iss.over || "Locating…"}`),
      smallHTML: esc(`Updated ${fmtTime(iss.ts)} • lat ${Number.isFinite(iss.lat) ? iss.lat.toFixed(2) : "—"} • lon ${Number.isFinite(iss.lon) ? iss.lon.toFixed(2) : "—"}`),
      kvRows: []
    });
  } else {
    blocks.push({
      title: "ISS Position",
      statusHTML: `<span class="tag warn">LIVE</span>`,
      bigHTML: "Loading…",
      smallHTML: "Waiting on data…",
      kvRows: []
    });
  }

  // Earthquakes (cell shows list of when / mag / where)
  if(quakes){
    const rows = clampRows(quakes.items, 6).map(q => ({
      left: `${q.when} • M${q.mag != null ? q.mag.toFixed(1) : "—"}`,
      right: q.place
    }));
    blocks.push({
      title: "Earthquakes",
      statusHTML: `<span class="tag good">USGS 1 HR</span>`,
      bigHTML: esc(`${quakes.count ?? 0} quakes`),
      smallHTML: esc(`Updated ${fmtTime(quakes.ts)}`),
      listLines: rows
    });
  } else {
    blocks.push({
      title: "Earthquakes",
      statusHTML: `<span class="tag warn">USGS 1 HR</span>`,
      bigHTML: "Loading…",
      smallHTML: "Waiting on data…",
      listLines: []
    });
  }

  // Aurora (NO local/global chance, just the meaningful stuff)
  if(aurora){
    const kp = aurora.kp != null ? aurora.kp.toFixed(1) : "—";
    const fc = aurora.kpForecastMax != null ? aurora.kpForecastMax.toFixed(1) : "—";
    const sp = aurora.speed != null ? `${Math.round(aurora.speed)} km/s` : "—";
    const bz = aurora.bz != null ? `${aurora.bz.toFixed(1)} nT` : "—";

    const kvRows = [
      {left:"Kp now", right: kp},
      {left:"Kp forecast max", right: fc},
      {left:"Solar wind speed", right: sp},
      {left:"Bz (north/south)", right: bz}
    ];

    blocks.push({
      title: "Aurora Forecast",
      statusHTML: `<span class="tag good">KP ${esc(kp)}</span>`,
      bigHTML: esc("Space weather"),
      smallHTML: esc(`Updated ${fmtTime(aurora.ts)}`),
      kvRows: kvRows
    });
  } else {
    blocks.push({
      title: "Aurora Forecast",
      statusHTML: `<span class="tag warn">NOAA</span>`,
      bigHTML: "Loading…",
      smallHTML: "Waiting on data…",
      kvRows: []
    });
  }

  // Aircraft (cell = ONLY the list)
  if(aircraft){
    blocks.push({
      title: "Aircraft Overhead",
      statusHTML: `<span class="tag good">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`,
      bigHTML: esc(`${aircraft.count ?? 0} aircraft`),
      smallHTML: "",     // intentionally blank (your request)
      listLines: clampRows(aircraft.list || [], 6)
    });
  } else {
    blocks.push({
      title: "Aircraft Overhead",
      statusHTML: `<span class="tag warn">RANGE ${esc(CONFIG.aircraftRadiusNm)} NM</span>`,
      bigHTML: "Loading…",
      smallHTML: "Waiting on data…",
      listLines: []
    });
  }

  // show ONLY 2 at a time, rotate
  const a = blocks[phase % blocks.length];
  const b = blocks[(phase + 1) % blocks.length];

  $("mod1").className = "mini fade";
  $("mod1").innerHTML = moduleHTML(a);

  $("mod2").className = "mini fade";
  $("mod2").innerHTML = moduleHTML(b);

  $("rightHd").textContent = ["Live Modules", "Sky + Orbit", "Earth Systems"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
  buildTicker();
  setUpdated();
}

/* ===== loops ===== */
refreshApod();
refreshAurora();
refreshAircraft();
refreshISS();
refreshQuakes();
renderRight();

setInterval(refreshISSOver, CONFIG.refreshMs.geocode);

setInterval(refreshApod,     CONFIG.refreshMs.apod);
setInterval(refreshAurora,   CONFIG.refreshMs.aurora);
setInterval(refreshAircraft, CONFIG.refreshMs.aircraft);
setInterval(refreshISS,      CONFIG.refreshMs.iss);
setInterval(refreshQuakes,   CONFIG.refreshMs.quakes);

setInterval(renderRight, 18 * 1000); // rotate 2 cells
setTimeout(refreshISSOver, 2500);
</script>
