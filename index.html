<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>
<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(0,0,0,.22);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* 32" @ ~10ft readability */
    --h1: 54px;
    --h2: 28px;
    --h3: 16px;
    --big: 36px;
    --base: 18px;
    --small: 14px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 88px 1fr 60px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }

  .brand{
    display:flex; flex-direction:column; gap:6px; min-width:0;
  }
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 760px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 12px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 14px;
    display:flex; align-items:center; gap:8px;
  }
  .dot{
    width:9px;height:9px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.warn{background:var(--warn); box-shadow:0 0 14px rgba(255,211,122,.55)}
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  /* Left hero module */
  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: saturate(1.05) contrast(1.05);
    opacity:.88;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.70)),
      radial-gradient(900px 420px at 20% 20%, rgba(107,181,255,.18), transparent 55%);
  }
  .heroText{
    position:absolute;
    left:16px; right:16px; bottom:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .heroTitle{
    font-size: 34px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
  }
  .heroMeta{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: 14px;
  }
  .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 7px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    font-size: 12px;
    font-weight: 950;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text);
  }

  /* Right stack modules */
  .stack{display:flex; flex-direction:column; gap:12px; min-height:0;}
  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .miniTop .k{
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .9px;
    font-weight: 950;
  }
  .miniTop .s{
    font-size: 12px;
    font-weight: 950;
    letter-spacing: .7px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: var(--text);
  }
  .bigLine{
    font-size: 30px;
    font-weight: 1000;
    letter-spacing: .2px;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .smallLine{
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }
  .list{
    display:flex; flex-direction:column; gap:8px;
    font-variant-numeric: tabular-nums;
  }
  .li{
    display:flex; justify-content:space-between; gap:10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 900;
  }
  .li span:last-child{color:var(--muted); font-weight:950}

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }
  .track{
    display:flex;
    gap:40px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll 28s linear infinite;
    font-weight: 900;
    font-size: 18px;
  }
  .track span b{color:var(--muted)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }

  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title" id="hdrTitle">Ambient Command Center</div>
      <div class="subtitle" id="hdrSub">space • earth • weather • live systems • zero news</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <!-- LEFT: NASA APOD Hero -->
    <section class="card">
      <div class="hd"><div class="h">NASA — Astronomy Picture of the Day</div><div class="tag" id="apodTag">loading</div></div>
      <div class="bd">
        <div class="hero" id="hero">
          <img id="apodImg" alt="" src="" />
          <div class="heroOverlay"></div>
          <div class="heroText">
            <div class="heroTitle" id="apodTitle">Loading…</div>
            <div class="heroMeta" id="apodMeta"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT: rotating live modules -->
    <section class="card">
      <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
      <div class="bd">
        <div class="stack">
          <div class="mini" id="mod1"></div>
          <div class="mini" id="mod2"></div>
          <div class="mini" id="mod3"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Live</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  // Weather location (Grandville-ish). Change anytime.
  weather: { lat: 42.9098, lon: -85.7631, name: "Grandville" },

  // Refresh intervals
  refreshMs: {
    apod: 60 * 60 * 1000,       // hourly
    quakes: 2 * 60 * 1000,      // 2 min
    iss: 20 * 1000,             // 20 sec
    spacex: 5 * 60 * 1000,      // 5 min
    weather: 10 * 60 * 1000     // 10 min
  },

  // bottom ticker (no news, just live facts + status)
  tickerBase: [
    "Ambient mode • Space + Earth live feeds",
    "APIs: NASA APOD • USGS • ISS • SpaceX • Open-Meteo",
    "If something fails, it falls back cleanly (no ugly errors)"
  ]
};

/* ===== small utils ===== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function setUpdated(){
  $("upd").textContent = fmtTime(new Date());
}

async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

/* ===== NASA APOD (uses DEMO_KEY) ===== */
async function refreshApod(){
  try{
    const url = "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY";
    const apod = await getJson(url);

    $("apodTitle").textContent = apod.title || "NASA APOD";
    $("apodTag").textContent = apod.date || "today";

    // If APOD is a video, use the thumbnail-ish behavior or just show placeholder
    if(apod.media_type === "image" && apod.url){
      $("apodImg").src = apod.url;
    } else {
      // fallback: simple gradient image
      $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
          <defs>
            <linearGradient id='g' x1='0' x2='1'>
              <stop stop-color='#0b1020' offset='0'/>
              <stop stop-color='#081018' offset='1'/>
            </linearGradient>
          </defs>
          <rect width='100%' height='100%' fill='url(#g)'/>
          <text x='70' y='170' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD is a video today</text>
          <text x='70' y='235' fill='#a7b0c2' font-size='34' font-family='Arial'>Showing placeholder background</text>
        </svg>
      `);
    }

    const credit = apod.copyright ? `© ${apod.copyright}` : "NASA";
    const expl = (apod.explanation || "").slice(0, 160).trim() + (apod.explanation && apod.explanation.length > 160 ? "…" : "");
    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span style="margin-left:auto; color: var(--muted); font-weight:900;">${esc(expl)}</span>
    `;

    setUpdated();
  } catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
  }
}

/* ===== USGS Earthquakes (past hour) ===== */
let lastQuakes = [];
async function refreshQuakes(){
  try{
    const q = await getJson("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
    const feats = (q.features || []).slice(0, 6).map(f => ({
      mag: f.properties?.mag,
      place: f.properties?.place || "—",
      time: f.properties?.time ? new Date(f.properties.time) : null
    }));
    lastQuakes = feats;
  } catch(e){}
}

/* ===== ISS position ===== */
let issPos = null;
async function refreshIss(){
  try{
    const d = await getJson("http://api.open-notify.org/iss-now.json");
    // open-notify is http; some players block mixed content if your page is https.
    // If that happens, this module will just show "unavailable" cleanly.
    issPos = {
      lat: d.iss_position?.latitude,
      lon: d.iss_position?.longitude,
      ts: d.timestamp ? new Date(d.timestamp * 1000) : new Date()
    };
  } catch(e){
    issPos = null;
  }
}

/* ===== SpaceX next launch ===== */
let nextLaunch = null;
async function refreshSpaceX(){
  try{
    const d = await getJson("https://api.spacexdata.com/v5/launches/next");
    nextLaunch = {
      name: d.name || "Next launch",
      date: d.date_utc ? new Date(d.date_utc) : null,
      details: d.details || ""
    };
  } catch(e){
    nextLaunch = null;
  }
}

/* ===== Weather (Open-Meteo, no key) ===== */
let wx = null;
async function refreshWeather(){
  try{
    const {lat, lon} = CONFIG.weather;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m&hourly=temperature_2m&forecast_days=1&timezone=auto`;
    const d = await getJson(url);
    const t = d.current?.temperature_2m;
    const w = d.current?.wind_speed_10m;
    const unitT = d.current_units?.temperature_2m || "°";
    const unitW = d.current_units?.wind_speed_10m || "";
    // simple "next 6 hours" trend
    const hrs = d.hourly?.temperature_2m?.slice(0, 6) || [];
    wx = { t, w, unitT, unitW, trend: hrs };
  } catch(e){
    wx = null;
  }
}

/* ===== Render right-side modules ===== */
function moduleHTML(title, status, big, small, listLines){
  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${esc(status)}</div>
    </div>
    <div class="bigLine">${esc(big)}</div>
    <div class="smallLine">${esc(small)}</div>
    ${listLines && listLines.length ? `
      <div class="list">
        ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
      </div>
    ` : ``}
  `;
}

function countdown(toDate){
  if(!toDate) return "—";
  const ms = toDate - new Date();
  if(ms <= 0) return "now";
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h ${m}m`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function buildTicker(){
  const extras = [];

  // add a couple live facts
  if(nextLaunch?.date){
    extras.push(`Next SpaceX launch in <b>${esc(countdown(nextLaunch.date))}</b>`);
  }
  if(wx?.t != null){
    extras.push(`${esc(CONFIG.weather.name)} <b>${esc(Math.round(wx.t))}${esc(wx.unitT)}</b> wind <b>${esc(Math.round(wx.w||0))}${esc(wx.unitW)}</b>`);
  }
  if(lastQuakes?.length){
    const top = lastQuakes[0];
    if(top?.mag != null) extras.push(`Latest quake <b>M${esc(top.mag)}</b> • ${esc((top.place||"").slice(0,42))}`);
  }

  const lines = [...CONFIG.tickerBase, ...extras].filter(Boolean);
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

/* ===== Rotate content blocks so you don’t have to pick one thing ===== */
let phase = 0;
function renderRight(){
  // We always show 3 minis, but cycle which data goes where for variety.
  const blocks = [];

  // 1) Weather
  if(wx){
    const t = `${Math.round(wx.t)}${wx.unitT}`;
    const wind = `${Math.round(wx.w||0)}${wx.unitW}`;
    const trend = (wx.trend||[]).slice(0,6).map((v,i)=>({left:`+${i}h`, right:`${Math.round(v)}${wx.unitT}`}));
    blocks.push({ html: moduleHTML("Weather", CONFIG.weather.name, t, `Wind ${wind} • next hours`, trend) });
  } else {
    blocks.push({ html: moduleHTML("Weather", CONFIG.weather.name, "—", "Waiting on data…", []) });
  }

  // 2) Quakes
  if(lastQuakes?.length){
    const top = lastQuakes[0];
    const big = top.mag != null ? `M${top.mag}` : "—";
    const small = top.place || "—";
    const list = lastQuakes.slice(1,5).map(q=>({
      left: q.mag != null ? `M${q.mag}` : "—",
      right: (q.place||"").slice(0,26)
    }));
    blocks.push({ html: moduleHTML("Earthquakes", "USGS • 1 hour", big, small, list) });
  } else {
    blocks.push({ html: moduleHTML("Earthquakes", "USGS • 1 hour", "—", "No recent data", []) });
  }

  // 3) ISS
  if(issPos){
    blocks.push({ html: moduleHTML("ISS Position", "Live", `${Number(issPos.lat).toFixed(2)}°, ${Number(issPos.lon).toFixed(2)}°`,
      `Updated ${fmtTime(issPos.ts)}`, [
        {left:"Latitude", right:String(issPos.lat)},
        {left:"Longitude", right:String(issPos.lon)}
      ]) });
  } else {
    blocks.push({ html: moduleHTML("ISS Position", "Live", "—", "Unavailable (some players block http).", []) });
  }

  // 4) SpaceX
  if(nextLaunch){
    const big = nextLaunch.name || "Next Launch";
    const small = nextLaunch.date ? `T-minus ${countdown(nextLaunch.date)}` : "—";
    const detail = (nextLaunch.details||"").slice(0,72).trim();
    blocks.push({ html: moduleHTML("SpaceX", "Next", big, detail ? `${small} • ${detail}…` : small, []) });
  } else {
    blocks.push({ html: moduleHTML("SpaceX", "Next", "—", "Waiting on data…", []) });
  }

  // pick 3 each phase
  const pick = (arr, start) => [arr[start%arr.length], arr[(start+1)%arr.length], arr[(start+2)%arr.length]];
  const chosen = pick(blocks, phase);

  $("mod1").className = "mini fade"; $("mod1").innerHTML = chosen[0].html;
  $("mod2").className = "mini fade"; $("mod2").innerHTML = chosen[1].html;
  $("mod3").className = "mini fade"; $("mod3").innerHTML = chosen[2].html;

  $("rightHd").textContent = ["Live Modules", "Live Systems", "Earth + Space"][phase % 3];
  $("rightTag").textContent = "auto";
  phase++;

  buildTicker();
  setUpdated();
}

/* ===== Start loops ===== */
refreshApod(); refreshQuakes(); refreshIss(); refreshSpaceX(); refreshWeather();
renderRight();

// refresh timers
setInterval(refreshApod,   CONFIG.refreshMs.apod);
setInterval(refreshQuakes, CONFIG.refreshMs.quakes);
setInterval(refreshIss,    CONFIG.refreshMs.iss);
setInterval(refreshSpaceX, CONFIG.refreshMs.spacex);
setInterval(refreshWeather,CONFIG.refreshMs.weather);

// rotate right panel view
setInterval(renderRight, 22 * 1000);
</script>
</body>
</html>
