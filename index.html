<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA Hockey Goal</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #0a1f44, #ffffff, #b22234);
    font-family: Arial, Helvetica, sans-serif;
  }

  button {
    font-size: 5rem;
    padding: 40px 80px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background-color: #b22234;
    color: white;
    font-weight: bold;
    letter-spacing: 5px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: transform 0.1s ease, background-color 0.2s ease;
  }

  button:hover {
    background-color: #e63946;
    transform: scale(1.05);
  }

  button:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<button onclick="playGoal()">GOAL!</button>

<audio id="goalSound" src="freedom.mp3"></audio>

<script>
  function playGoal() {
    const audio = document.getElementById("goalSound");
    audio.currentTime = 0; // restart if clicked multiple times
    audio.play();
  }
</script>

</body>
</html>
