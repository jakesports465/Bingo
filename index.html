<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jake OS — War Room</title>
<style>
  :root{
    --bg:#05060a;
    --text:#edf2ff;
    --muted:#a9b3c6;
    --line: rgba(255,255,255,.10);
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(0,0,0,.20);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* 32" @ 10ft readability */
    --h1: 54px;
    --h2: 30px;
    --h3: 18px;
    --big: 40px;
    --base: 18px;
    --small: 14px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    color:var(--text);
    overflow:hidden;
  }

  .wrap{
    height:100%;
    padding:18px;
    display:grid;
    grid-template-rows: 88px 1fr 60px;
    gap:14px;
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:0;
  }
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle{
    color: var(--muted);
    font-size: var(--small);
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 720px;
  }

  .status{
    display:flex;
    gap:12px;
    align-items:center;
    font-variant-numeric: tabular-nums;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 12px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{
    width:9px;height:9px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.warn{background:var(--warn); box-shadow:0 0 14px rgba(255,211,122,.55)}
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.3fr 1fr;
    gap:14px;
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .hd{
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bd{
    padding: 16px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .bigClock{
    font-size: var(--h1);
    font-weight: 1000;
    letter-spacing: 1px;
    line-height: 1;
  }
  .bigLine{
    font-size: var(--big);
    font-weight: 1000;
    letter-spacing: .4px;
    line-height: 1.15;
  }
  .smallLine{
    font-size: var(--base);
    color: var(--muted);
    line-height: 1.35;
  }

  .grid2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  .mini{
    border-radius: 18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 12px 12px;
  }
  .mini .k{
    color: var(--muted);
    font-size: var(--small);
    text-transform: uppercase;
    letter-spacing: .8px;
    font-weight: 900;
  }
  .mini .v{
    margin-top:8px;
    font-variant-numeric: tabular-nums;
    font-size: 28px;
    font-weight: 1000;
  }

  .bar{
    height: 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);
    overflow:hidden;
  }
  .bar > i{
    display:block;
    height:100%;
    width:50%;
    background: linear-gradient(90deg, rgba(107,181,255,.95), rgba(37,224,183,.95));
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .label{
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .9px;
    font-size: var(--small);
    font-weight: 900;
  }
  .value{
    font-variant-numeric: tabular-nums;
    font-size: 20px;
    font-weight: 950;
  }

  .cards{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .scenario{
    border-radius: 18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 12px 12px;
  }
  .scenario .t{
    font-weight: 950;
    letter-spacing: .5px;
    font-size: 18px;
  }
  .scenario .d{
    margin-top:6px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }
  .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 6px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    font-size: 12px;
    font-weight: 950;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text);
  }
  .tag.good{border-color: rgba(37,224,183,.35); background: rgba(37,224,183,.10); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.35); background: rgba(255,211,122,.10); color:#fff1d1}
  .tag.bad{border-color: rgba(255,107,134,.35); background: rgba(255,107,134,.10); color:#ffd4dd}

  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
  }
  .track{
    display:flex;
    gap:40px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll 28s linear infinite;
    font-weight: 900;
    font-size: 18px;
  }
  .track span b{color:var(--muted)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }

  .fade{
    animation: fadein .55s ease-out both;
  }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }

  /* hide selection cursor on signage */
  ::selection{background:transparent}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title" id="hdrTitle">Jake OS — War Room</div>
      <div class="subtitle" id="hdrSub">Clarity beats chaos • compounding wins • numbers stay honest</div>
    </div>
    <div class="status">
      <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
      <div class="pill">Updated <span id="upd">—</span></div>
      <div class="pill"><span id="clock">—</span></div>
    </div>
  </header>

  <main>
    <section class="card" id="leftCard">
      <div class="hd"><div class="h" id="leftHd">Now</div><div class="label" id="leftTag">Focus</div></div>
      <div class="bd" id="leftBd"></div>
    </section>

    <section class="card" id="rightCard">
      <div class="hd"><div class="h" id="rightHd">Numbers</div><div class="label" id="rightTag">Calm</div></div>
      <div class="bd" id="rightBd"></div>
    </section>
  </main>

  <footer>
    <div class="footerLeft">Signal</div>
    <div class="marquee"><div class="track" id="track"></div></div>
  </footer>
</div>

<script>
/**
 * ====== CONFIG: edit THIS only ======
 */
const CONFIG = {
  headerTitle: "Jake OS — War Room",
  headerSub: "Clarity beats chaos • compounding wins • numbers stay honest",

  // One next action. Keep it real. Keep it small.
  nextAction: "Ship one measurable thing today (even small).",

  // “Visible wins” list (rotate)
  wins: [
    "Did the thing even if it was small.",
    "Kept it structured when it got loud.",
    "Improved a system instead of chasing a vibe.",
    "Protected integrity and momentum."
  ],

  // Progress bars (0–100)
  progress: [
    { name: "Financial Independence Build", value: 22, note: "compounding phase" },
    { name: "Skill Stack Growth", value: 41, note: "tools + reps" },
    { name: "Public Authority", value: 18, note: "ship, publish, repeat" }
  ],

  // Streaks / counters
  counters: [
    { name: "Days of momentum", value: 6 },
    { name: "Systems shipped", value: 3 },
    { name: "Distractions ignored", value: 14 }
  ],

  // Probability/risk cards (make these fun)
  scenarios: [
    { tag: "good", title: "If I ship 1 thing per week", desc: "Confidence compounds. Authority becomes inevitable." },
    { tag: "warn", title: "If I chase 5 ideas at once", desc: "Output drops. Stress rises. Nothing gets finished." },
    { tag: "good", title: "If I track progress visibly", desc: "Brain stays calm. Momentum stays real." }
  ],

  // Bottom “signal” ticker lines (no news, just your rules)
  signal: [
    "Make it measurable. <b>Then</b> make it repeatable.",
    "One clear next action beats 20 vague plans.",
    "You don’t need motivation. You need a system.",
    "Integrity is the only cheat code that lasts.",
    "Visible wins keep the mind calm."
  ],

  // Auto-rotate screens
  rotateSeconds: 20
};

// ====== Utilities ======
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function nowClock(){
  const d = new Date();
  const time = d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const day  = d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"});
  document.getElementById("clock").textContent = `${day} • ${time}`;
}
setInterval(nowClock, 1000); nowClock();

function setOnline(){
  const online = navigator.onLine;
  document.getElementById("net").textContent = online ? "Online" : "Offline";
  document.getElementById("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();

function updateHeader(){
  document.getElementById("hdrTitle").textContent = CONFIG.headerTitle;
  document.getElementById("hdrSub").textContent = CONFIG.headerSub;
}
updateHeader();

function setUpdated(){
  const d = new Date();
  document.getElementById("upd").textContent = d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}
setUpdated();

// ====== Build ticker ======
function buildTicker(){
  const t = document.getElementById("track");
  const chunks = CONFIG.signal.map(x => `<span>${x} <b>•</b></span>`).join("");
  t.innerHTML = chunks + chunks;
}
buildTicker();

// ====== Panels ======
let winIdx = 0;
function panelNow(){
  document.getElementById("leftHd").textContent = "Now";
  document.getElementById("leftTag").textContent = "Focus";
  document.getElementById("rightHd").textContent = "Today";
  document.getElementById("rightTag").textContent = "Win";

  const left = document.getElementById("leftBd");
  left.className = "bd fade";
  left.innerHTML = `
    <div class="bigClock" id="bigClock">${esc(new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}))}</div>
    <div class="smallLine">Next action</div>
    <div class="bigLine">${esc(CONFIG.nextAction)}</div>
    <div class="smallLine">Rule: if it’s not measurable, it’s not real.</div>
  `;

  const right = document.getElementById("rightBd");
  right.className = "bd fade";
  const win = CONFIG.wins[winIdx++ % CONFIG.wins.length];
  right.innerHTML = `
    <div class="mini">
      <div class="k">Win to log</div>
      <div class="v">${esc(win)}</div>
    </div>
    <div class="grid2">
      ${CONFIG.counters.slice(0,2).map(c => `
        <div class="mini">
          <div class="k">${esc(c.name)}</div>
          <div class="v">${esc(c.value)}</div>
        </div>
      `).join("")}
    </div>
    <div class="mini">
      <div class="k">${esc(CONFIG.counters[2]?.name || "Counter")}</div>
      <div class="v">${esc(CONFIG.counters[2]?.value ?? "—")}</div>
    </div>
  `;
}

function panelCompounding(){
  document.getElementById("leftHd").textContent = "Compounding";
  document.getElementById("leftTag").textContent = "Progress";
  document.getElementById("rightHd").textContent = "Stability";
  document.getElementById("rightTag").textContent = "Numbers";

  const left = document.getElementById("leftBd");
  left.className = "bd fade";

  left.innerHTML = CONFIG.progress.map(p => `
    <div class="mini">
      <div class="row">
        <div class="label">${esc(p.name)}</div>
        <div class="value">${esc(p.value)}%</div>
      </div>
      <div class="bar" style="margin-top:10px;"><i style="width:${Math.max(0,Math.min(100,p.value))}%"></i></div>
      <div class="smallLine" style="margin-top:10px;">${esc(p.note || "")}</div>
    </div>
  `).join("");

  const right = document.getElementById("rightBd");
  right.className = "bd fade";
  right.innerHTML = `
    <div class="mini">
      <div class="k">Compounding Rule</div>
      <div class="v">Small wins + consistency = unfair advantage.</div>
    </div>
    <div class="mini">
      <div class="k">Today’s target</div>
      <div class="v">1 measurable output.</div>
    </div>
    <div class="mini">
      <div class="k">What matters</div>
      <div class="v">Structure, integrity, momentum.</div>
    </div>
  `;
}

function panelProbability(){
  document.getElementById("leftHd").textContent = "Probability";
  document.getElementById("leftTag").textContent = "Scenarios";
  document.getElementById("rightHd").textContent = "Risk";
  document.getElementById("rightTag").textContent = "Control";

  const left = document.getElementById("leftBd");
  left.className = "bd fade";
  left.innerHTML = `
    <div class="cards">
      ${CONFIG.scenarios.map(s => `
        <div class="scenario">
          <div class="row" style="align-items:flex-start;">
            <div>
              <div class="t">${esc(s.title)}</div>
              <div class="d">${esc(s.desc)}</div>
            </div>
            <div class="tag ${esc(s.tag)}">${esc(s.tag)}</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  // Simple risk meter based on how many "warn/bad" scenarios exist
  const flags = CONFIG.scenarios.reduce((acc,s)=>{
    if(s.tag==="bad") acc.bad++;
    else if(s.tag==="warn") acc.warn++;
    else acc.good++;
    return acc;
  },{good:0,warn:0,bad:0});

  const risk = Math.min(100, Math.round((flags.bad*35 + flags.warn*18)));
  const confidence = Math.max(0, Math.min(100, 100 - risk));

  const right = document.getElementById("rightBd");
  right.className = "bd fade";
  right.innerHTML = `
    <div class="mini">
      <div class="row"><div class="label">Confidence</div><div class="value">${confidence}%</div></div>
      <div class="bar" style="margin-top:10px;"><i style="width:${confidence}%; background: linear-gradient(90deg, rgba(37,224,183,.95), rgba(107,181,255,.95));"></i></div>
      <div class="smallLine" style="margin-top:10px;">Confidence rises when the plan is simple and repeatable.</div>
    </div>
    <div class="mini">
      <div class="row"><div class="label">Risk</div><div class="value">${risk}%</div></div>
      <div class="bar" style="margin-top:10px;"><i style="width:${risk}%; background: linear-gradient(90deg, rgba(255,211,122,.95), rgba(255,107,134,.95));"></i></div>
      <div class="smallLine" style="margin-top:10px;">Risk rises when you add complexity, not when you add work.</div>
    </div>
    <div class="mini">
      <div class="k">Control lever</div>
      <div class="v">Reduce scope. Increase repeatability.</div>
    </div>
  `;
}

// ====== Rotation ======
const PANELS = [panelNow, panelCompounding, panelProbability];
let idx = 0;
function render(){
  PANELS[idx % PANELS.length]();
  idx++;
  setUpdated();
}
render();
setInterval(render, CONFIG.rotateSeconds * 1000);

// keep big clock fresh on the Now panel
setInterval(()=>{
  const el = document.getElementById("bigClock");
  if(el){
    el.textContent = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
}, 1000);
</script>
</body>
</html>
