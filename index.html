// ══ WORKOUT ENGINE ══
function E(n,s,r,w,rest,note,muscle,subs){return{n,s:String(s),r,w:String(w),rest:rest||60,note:note||"",muscle:muscle||"",subs:subs||""}}
// Plate breakdown for display
function plateSplit(lbs){const v=parseInt(lbs);if(isNaN(v)||v<45)return"";if(v===45)return"empty bar";
  const ps=(v-45)/2;let r=ps,out=[];[45,35,25,15,10,10].forEach(p=>{if(r>=p){out.push(p);r-=p}});
  return out.length?out.map(p=>p+"lb").join("+")+" ea":""}
// Food macro targets
function macroTargets(wt,phase){
  const bmr=Math.round(88.362+(13.397*wt/2.205)+(4.799*178)-(5.677*30));
  const tdee=Math.round(bmr*1.55);
  const targets={1:{cal:tdee,pro:Math.round(wt*.9),note:"Maintenance — fuel endurance"},
    2:{cal:tdee-300,pro:Math.round(wt*1),note:"Deficit — prioritize protein"},
    3:{cal:tdee+100,pro:Math.round(wt*1),note:"Slight surplus — fuel muscle growth"},
    4:{cal:tdee,pro:Math.round(wt*.9),note:"Maintenance — sustain"}};
  const t=targets[phase]||targets[4];t.carb=Math.round((t.cal*.4)/4);t.fat=Math.round((t.cal*.3)/9);return t}

// ══ CALCS ══
const calc1RM=(w,r)=>r<=1?w:Math.round(w*(36/(37-r)));
const calcBMR=wt=>Math.round(88.362+(13.397*wt/2.205)+(4.799*178)-(5.677*30));
function calcReadiness(d,now){let s=100;
  for(let i=1;i<=3;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){s-=8;if((d.sessions[k].rating||0)>=4)s-=5;if((d.sessions[k].rating||0)>=5)s-=5}}
  let stk=0;for(let i=1;i<=7;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);if(d.sessions?.[dS(dt)]?.done)stk++}
  if(stk>=3&&stk<=5)s+=5;if(stk>=6)s-=10;
  // Sleep factor
  const lastSleep=d.sleep?.[dS(now)];
  if(lastSleep){if(lastSleep.hrs>=7&&lastSleep.q>=4)s+=10;else if(lastSleep.hrs>=6&&lastSleep.q>=3)s+=0;
    else if(lastSleep.hrs<6)s-=15;else if(lastSleep.q<=2)s-=10}
  return Math.max(20,Math.min(100,s))}
function getMR(d,now){const r={};MUSCLES.forEach(m=>r[m]={h:999,s:"fresh"});
  for(let i=0;i<4;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const k=dS(dt);
    if(d.sessions?.[k]?.done){const wo=getWorkout(k);(wo.muscles||[]).forEach(m=>{const h=i*24;
      if(r[m]&&h<r[m].h){r[m].h=h;r[m].s=h<24?"fatigued":h<48?"recovering":"fresh"}})}}return r}

// ══ SVG CHARTS ══
function SvgLine({data,dk,color,height=80}){
  if(!data||data.length<2)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Need more data</div>;
  const vals=data.map(d=>d[dk]||0),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const w=300,h=height,len=Math.max(vals.length,2);
  const pts=vals.map((v,i)=>[i/(len-1)*w,h-6-((v-mn)/rng)*(h-12)]);
  return <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
    <polygon points={`0,${h} ${pts.map(p=>p.join(",")).join(" ")} ${w},${h}`} fill={color} opacity="0.12"/>
    <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
    {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="2.5" fill={color}/>)}
  </svg>;
}
function SvgBar({data,dk,color,height=80}){
  if(!data||data.length<1)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.dim,fontSize:11}}>Log sessions first</div>;
  const vals=data.map(d=>d[dk]||0),mx=Math.max(...vals)||1,w=300;
  const bw=Math.min(18,w/data.length-3);
  return <svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height}}>
    {vals.map((v,i)=>{const bh=Math.max(2,(v/mx)*(height-8));const x=i/data.length*w+(w/data.length-bw)/2;
      return <rect key={i} x={x} y={height-bh} width={bw} height={bh} rx="3" fill={color} opacity="0.65"/>})}
  </svg>;
}

                    <span style={{color:T.dim,fontSize:10}}>×</span>
                    <input placeholder={`${pR||""}`} value={setInputs[ik+"r"]||""} onChange={ev=>setSetInputs(p=>({...p,[ik+"r"]:ev.target.value}))}

                    <button onClick={()=>{logSet(e.n,si,setInputs[ik+"w"]||pW,setInputs[ik+"r"]||pR);setSetInputs(p=>{const n={...p};delete n[ik+"w"];delete n[ik+"r"];return n})}}
                      style={{padding:"5px 8px",borderRadius:6,background:T.acc,border:"none",cursor:"pointer",color:"#000",fontSize:9,fontWeight:700}}>LOG</button></>}
                </div>})}
              <div style={{fontSize:8,color:T.dim,marginTop:2}}>Rest: {e.rest}s</div>
            </div>}
          </div>})}
        {w.type!=="rest"&&<div style={{padding:12,borderTop:`1px solid ${T.s3}`,background:T.s2}}>
          {w.type==="bike"&&<div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:8,color:T.dim,marginBottom:2}}>Actual Calories</div>
              <input value={session?.calOverride||""} onChange={e=>overrideBike("calOverride",e.target.value)} placeholder={`est ~${w.cal}`} type="number"

        </div>}

        {notes&&notes!==(session?.notes||"")&&<button onClick={saveNotes} style={{marginTop:4,padding:"4px 12px",borderRadius:6,background:T.acc+"22",border:"none",cursor:"pointer",color:T.acc,fontSize:10}}>Save</button>}
      </Card>
    </>})()}

    {/* ═══ CALENDAR ═══ */}
    {tab==="calendar"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={()=>{if(calM===0){setCalM(11);setCalY(calY-1)}else setCalM(calM-1)}} style={{background:T.s2,border:"none",borderRadius:20,width:34,height:34,cursor:"pointer",color:T.sub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>‹</button>

            </button>})})()}</div>
      {/* Legend */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
        {[["Strength",T.acc],["Bike",T.blue],["Circuit",T.yel],["Rest",T.dim]].map(([l,c])=>
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>

              <span style={{fontSize:9,color:T.dim}}>{dP(p.st).toLocaleDateString("en-US",{month:"short",day:"numeric"})} — {dP(p.en).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>

            <div style={{height:4,background:T.s3,borderRadius:2,marginTop:4,overflow:"hidden"}}>
              <div style={{height:"100%",background:p.c,borderRadius:2,width:`${prog}%`,transition:"width .5s"}}/></div>

        {[["May 25","Memorial Day Weekend","⛰"],["Jul 4","July 4th","★"],["Aug 21","185 lb Target","🎯"],["Dec 25","Christmas","🎄"],["Apr 5, 2027","1 Year Complete","👑"]].map(([d,l,ic],i)=>{
          const days=Math.max(0,dB(todayStr,d.includes("2027")?"2027-04-05":d==="May 25"?"2026-05-25":d==="Jul 4"?"2026-07-04":d==="Aug 21"?"2026-08-21":"2026-12-25"));

        {["overview","prs","tools"].map(t=><button key={t} onClick={()=>setStatsTab(t)}

              <span style={{fontSize:10,color:T.sub}}>{dP(day).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:600,color:s.hrs>=7?T.grn:s.hrs>=6?T.yel:T.red}}>{s.hrs}h</span>
                <span style={{fontSize:10,color:T.yel}}>{"★".repeat(s.q)}</span>
              </div></div>)}
        </Card>

        {/* Sleep chart — hours bars + quality dots */}
        {Object.keys(data.sleep||{}).length>=3&&<Card><Lbl>Sleep Trend</Lbl>
          {(()=>{const entries=Object.entries(data.sleep).sort(([a],[b])=>a.localeCompare(b)).slice(-14);
            const maxH=Math.max(...entries.map(([,s])=>s.hrs),9);
            return <div style={{display:"flex",alignItems:"flex-end",gap:2,height:90}}>
              {entries.map(([d,s],i)=>{const hPct=s.hrs/maxH*100;const qColor=[T.red,T.red,T.yel,T.yel,T.grn,T.grn][s.q]||T.dim;
                return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end"}}>
                  <div style={{width:5,height:5,borderRadius:5,background:qColor,marginBottom:2}} title={`Q:${s.q}`}/>
                  <div style={{width:"80%",height:`${hPct}%`,background:s.hrs>=7?T.grn+"66":s.hrs>=6?T.yel+"66":T.red+"66",borderRadius:"3px 3px 0 0",minHeight:4}}/>
                  <div style={{fontSize:6,color:T.dim,marginTop:2}}>{s.hrs}</div>
                </div>})}
            </div>})()}
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:6}}>
            {[["Bar = hours",T.grn],["Dot = quality",T.yel]].map(([l,c])=>
              <div key={l} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,borderRadius:3,background:c}}/><span style={{fontSize:7,color:T.dim}}>{l}</span></div>)}
          </div>
        </Card>}
      </>}

      {/* GEAR */}
      {profileTab==="gear"&&<Card><Lbl>🏋️ Equipment</Lbl>
        {[["Power Rack + Cable Pulley (D1002)","1200 lb capacity. Squats, bench, pull-ups, lat pulldown, cable rows, face pulls, pushdowns, cable curls, cable kickbacks, cable woodchops"],
          ["Fitvids Olympic Barbell (7ft, 45 lb)","700 lb capacity. Back squat, bench, OHP, rows, RDL, hip thrust"],
          ["Fitvids Bumper Plates (280 lbs)","2×45, 2×35, 2×25, 2×15, 4×10 · Max bar load: 325 lbs · 24 loadable weights"],
          ["Moveta Adjustable DBs (5-52.5 lb)","15-in-1 dial adjust. Presses, rows, curls, carries, lunges, lateral raises"],
          ["NicePeople Adjustable Bench","660 lb capacity · 8 positions. Flat, incline 15-75°, decline. Foldable."],
          ["YPOO Magnetic Stationary Bike","Bluetooth app · 330 lb capacity. Intervals, tempo, Z2 rides, HIIT"],
          ["Jamestry Resistance Bands (5-125 lb)","5 levels. Pull-up assist, band pull-aparts, banded walks, mobility, warm-ups"],
          ["Landmine Attachment","Rack-mounted. Rotations, presses, Meadows rows, anti-rotation holds, squat-to-press"],
          ["Eocnrhe Weight Plate Tree","300 lb capacity. Organizes all plates + barbell storage post"],
          ["Vinsguir Ab Roller Wheel","Ab rollouts — one of the best core exercises. Kneeling and standing progressions"],
          ["DMoose Ankle Straps","Cable kickbacks, cable leg extensions, cable hip abductions, cable hamstring curls"],
          ["Bodyprox Knee Wraps (2-pack)","Joint support for heavy squats, leg press, lunges. Wrap tighter as weight increases"],
          ["Beast Rage Lifting Wrist Straps","Grip support for heavy RDLs, rows, farmer carries, shrugs. Use when grip fails before target muscle"],
          ["Power Guidance Squat Pad","Bar pad for hip thrusts, front squats, lunges. Protects neck/hips on heavy barbell work"],
          ["Etekcity Smart Scale","Bluetooth · Body weight, BMI, body fat %, muscle mass. Syncs to phone app"],
          ["ProsourceFit Floor Mats (24 sq ft)","½ inch EVA foam · 6 tiles. Impact protection under rack + floor work area"]
        ].map(([n,d],i)=><div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${T.s3}`}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:3,background:T.grn}}/><span style={{fontSize:11,fontWeight:600}}>{n}</span></div>
          <div style={{fontSize:9,color:T.dim,marginLeft:10,marginTop:1}}>{d}</div></div>)}</Card>}

      {/* BACKUP / RESTORE */}
      {profileTab==="backup"&&<>
        <Card><Lbl>💾 Backup Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Download a full JSON backup of all your data — sessions, sets, PRs, weight, measurements, food, sleep, everything.</div>
          <Btn onClick={backupData}>DOWNLOAD JSON BACKUP</Btn>
          <button onClick={()=>{let t=`HENDERSON.SYS EXPORT — ${new Date().toLocaleString()}\n\n`;
            t+=`WEIGHT (${data.weight.length} entries):\n`;data.weight.forEach(e=>t+=`${e.d}: ${e.w}\n`);
            t+=`\nSESSIONS (${Object.keys(data.sessions||{}).filter(k=>data.sessions[k]?.done).length} completed):\n`;
            Object.entries(data.sessions||{}).sort().forEach(([d,s])=>{if(s.done){t+=`${d}: ${getWorkout(d).label}${s.rating?` (${s.rating}/5)`:""}${s.notes?` — ${s.notes}`:""}\n`;
              if(s.sets)Object.entries(s.sets).forEach(([ex,sets])=>t+=`  ${ex}: ${sets.filter(Boolean).map(([w,r])=>`${w}×${r}`).join(", ")}\n`)}});
            t+=`\nPRs:\n`;Object.entries(data.prs||{}).sort(([,a],[,b])=>b.e1rm-a.e1rm).forEach(([n,p])=>t+=`${n}: ${p.w}×${p.r} (1RM: ${p.e1rm}) on ${p.d}\n`);
            navigator.clipboard.writeText(t).then(()=>alert("Copied to clipboard!")).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copied!")})}}
            style={{width:"100%",padding:10,marginTop:6,border:`1px dashed ${T.bdr}`,borderRadius:8,background:"transparent",cursor:"pointer",color:T.sub,fontSize:11,fontWeight:600}}>
            📋 COPY AS TEXT TO CLIPBOARD</button>
        </Card>
        <Card><Lbl>📂 Restore Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Upload a previously downloaded backup file to restore all data. This will overwrite current data.</div>
          <label style={{display:"block",width:"100%",padding:13,borderRadius:8,background:T.s2,border:`1px dashed ${T.bdr}`,
            textAlign:"center",cursor:"pointer",fontSize:12,fontWeight:600,color:T.sub}}>
            TAP TO SELECT BACKUP FILE
            <input type="file" accept=".json" onChange={restoreData} style={{display:"none"}}/>
          </label>
        </Card>
        <Card><Lbl style={{color:T.red}}>⚠️ Reset All Data</Lbl>
          <div style={{fontSize:11,color:T.sub,marginBottom:8}}>Permanently delete all tracked data. This cannot be undone. Download a backup first.</div>
          <Btn onClick={resetData} style={{background:T.red}}>RESET EVERYTHING</Btn>
        </Card>
        <Card><Lbl>📦 Storage Usage</Lbl>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,color:T.sub}}>localStorage used</div>
            <div style={{fontSize:13,fontWeight:700,color:parseFloat(lsUsage)>4?T.red:parseFloat(lsUsage)>2?T.yel:T.grn}}>{lsUsage} MB / ~5 MB</div>
          </div>
          <div style={{height:6,background:T.s3,borderRadius:3,marginTop:6,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,background:parseFloat(lsUsage)>4?T.red:parseFloat(lsUsage)>2?T.yel:T.grn,
              width:`${Math.min(100,parseFloat(lsUsage)/5*100)}%`}}/></div>
          {parseFloat(lsUsage)>3&&<div style={{fontSize:9,color:T.yel,marginTop:4}}>⚠ Storage getting full. Download a backup and consider clearing old food data.</div>}
        </Card>
      </>}
    </>}

    </div>

    {/* NAV */}
    <div style={{position:"fixed",bottom:10,left:14,right:14,background:T.s1,borderRadius:20,padding:"6px 0",
      display:"flex",justifyContent:"space-around",boxShadow:"0 -4px 30px rgba(0,0,0,.5)",border:`1px solid ${T.s3}`,zIndex:20}}>
      {[{id:"home",i:"🏠"},{id:"train",i:"💪"},{id:"calendar",i:"📅"},{id:"stats",i:"📊"},{id:"profile",i:"👤"}].map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",
          alignItems:"center",gap:1,color:tab===t.id?T.acc:T.dim,padding:"6px 14px",fontSize:18}}>
          <span>{t.i}</span><span style={{fontSize:8,fontWeight:tab===t.id?700:500}}>{t.id}</span>
          {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:T.acc}}/>}
        </button>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
