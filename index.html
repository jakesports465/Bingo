<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ambient Command Center</title>

<style>
  :root{
    --bg:#05060a;
    --text:#eef2ff;
    --muted:#a7b0c2;
    --line: rgba(255,255,255,.10);
    --shadow: 0 18px 46px rgba(0,0,0,.60);
    --r: 24px;

    --accent:#6bb5ff;
    --good:#25e0b7;
    --warn:#ffd37a;
    --bad:#ff6b86;

    /* design canvas */
    --designW: 1920;
    --designH: 1080;

    /* overscan safety */
    --safe: 16px;

    /* computed */
    --uiScale: 1;
    --uiX: 0px;
    --uiY: 0px;

    /* sizing at DESIGN scale */
    --h2: 34px;
    --h3: 18px;

    --big: 40px;
    --cellTitle: 19px;
    --cellSmall: 19px;

    --listFont: 18px;
    --listRight: 18px;

    --kvKey: 17px;
    --kvVal: 18px;

    --ticker: 26px;
    --tickerSpeed: 34s; /* tweak here (bigger = slower) */

    --tagText: 15px;
    --bubblePadY: 12px;
    --bubblePadX: 20px;

    --headerH: 92px;
    --footerH: 74px;
    --gap: 12px;
    --pad: 16px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(1100px 650px at 18% 12%, rgba(107,181,255,.18), transparent 55%),
      radial-gradient(900px 600px at 92% 25%, rgba(37,224,183,.12), transparent 52%),
      radial-gradient(1000px 520px at 50% 110%, rgba(255,211,122,.10), transparent 58%),
      var(--bg);
    overflow:hidden;
  }

  /* ===== TV FIT WRAPPER (fixed) ===== */
  .stage{
    position:fixed;
    inset:0;
    padding: var(--safe);
    overflow:hidden;
  }
  .app{
    width: calc(var(--designW) * 1px);
    height: calc(var(--designH) * 1px);
    transform: translate(var(--uiX), var(--uiY)) scale(var(--uiScale));
    transform-origin: top left;
  }

  .wrap{
    width:100%;
    height:100%;
    padding: var(--pad);
    display:grid;
    grid-template-rows: var(--headerH) 1fr var(--footerH);
    gap: var(--gap);
  }

  header{
    border-radius: var(--r);
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    min-height:0;
  }

  .brand{display:flex;flex-direction:column;gap:6px;min-width:0}
  .title{
    font-size: var(--h2);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height:1.05;
  }
  .subtitle{
    color: var(--muted);
    font-size: 16px;
    letter-spacing: .6px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 900px;
  }

  .status{
    display:flex; gap:12px; align-items:center;
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }
  .pill{
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    padding: 10px 14px;
    font-weight: 900;
    letter-spacing: .3px;
    font-size: 16px;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .dot{
    width:10px;height:10px;border-radius:99px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(37,224,183,.55);
  }
  .dot.bad{background:var(--bad); box-shadow:0 0 14px rgba(255,107,134,.55)}

  main{
    min-height:0;
    display:grid;
    grid-template-columns: 1.35fr 1fr;
    gap: var(--gap);
  }

  .card{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    box-shadow: var(--shadow);
    overflow:hidden;
    min-height:0;
    display:flex;
    flex-direction:column;
  }

  .hd{
    padding: 12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,.22);
    border-bottom: 1px solid rgba(255,255,255,.08);
    min-height:0;
    gap:10px;
  }
  .hd .h{
    font-size: var(--h3);
    font-weight: 950;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .bd{
    padding: 12px;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  /* APOD */
  .hero{
    position:relative;
    flex:1;
    min-height:0;
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.25);
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.90;
    transform: scale(1.02);
  }
  .heroOverlay{
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.82));
  }
  .heroText{
    position:absolute;
    left:14px; right:14px; bottom:12px;
    display:flex; flex-direction:column; gap:10px;
    min-height:0;
  }
  .heroTitle{
    font-size: 38px;
    font-weight: 1000;
    line-height: 1.08;
    display:-webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow:hidden;
  }
  .heroMeta{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    color: var(--muted);
    font-size: 16px;
    align-items:center;
    min-height:0;
  }
  .heroMeta .metaTail{
    margin-left:auto;
    color: rgba(255,255,255,.72);
    font-weight:900;
    max-width: 55%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Tags (bigger bubbles) */
  .tag{
    display:inline-flex;
    align-items:center;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    font-size: var(--tagText);
    font-weight: 950;
    letter-spacing: .9px;
    text-transform: uppercase;
    color: var(--text);
    white-space:nowrap;
  }
  .tag.good{border-color: rgba(37,224,183,.40); background: rgba(37,224,183,.12); color:#cafff0}
  .tag.warn{border-color: rgba(255,211,122,.40); background: rgba(255,211,122,.12); color:#fff1d1}

  /* Right modules: two at a time */
  .stack{
    display:grid;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    min-height:0;
  }
  .mini{
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    min-height:0;
    overflow:hidden;
  }
  .miniTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex:0 0 auto;
    min-height:0;
  }
  .miniTop .k{
    color: rgba(255,255,255,.78);
    font-size: var(--cellTitle);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 1000;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 70%;
  }
  .miniTop .s{
    font-size: var(--tagText);
    font-weight: 1000;
    letter-spacing: .9px;
    text-transform: uppercase;
    padding: var(--bubblePadY) var(--bubblePadX);
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    white-space:nowrap;
    flex-shrink:0;
  }
  .bigLine{
    font-size: var(--big);
    font-weight: 1000;
    line-height: 1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .kv{
    display:flex;
    flex-direction:column;
    gap: 8px;
    min-height:0;
    overflow:hidden;
    flex: 1 1 auto;
  }
  .kvRow{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:baseline;
  }
  .kvKey{
    font-size: var(--kvKey);
    font-weight: 950;
    color: rgba(255,255,255,.74);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 58%;
  }
  .kvVal{
    font-size: var(--kvVal);
    font-weight: 1000;
    color: rgba(255,255,255,.90);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 42%;
    text-align:right;
  }

  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
    overflow:hidden;
    flex: 1 1 auto;
  }
  .li{
    display:flex; justify-content:space-between; gap:12px;
    font-size: var(--listFont);
    font-weight: 950;
    align-items:baseline;
  }
  .li span:first-child{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 42%;
  }
  .li span:last-child{
    color:rgba(255,255,255,.78);
    font-weight:1000;
    font-size: var(--listRight);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 58%;
    text-align:right;
  }

  /* ticker */
  footer{
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    box-shadow: var(--shadow);
    overflow:hidden;
    display:flex;
    align-items:center;
  }
  .footerLeft{
    padding: 0 14px;
    height:100%;
    display:flex;
    align-items:center;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-right: 1px solid rgba(255,255,255,.08);
    background: rgba(107,181,255,.08);
    font-size: 18px;
    flex-shrink:0;
  }
  .marquee{
    flex:1;
    overflow:hidden;
    height:100%;
    display:flex;
    align-items:center;
    min-width:0;
  }
  .track{
    display:flex;
    gap:54px;
    white-space:nowrap;
    padding-left: 18px;
    animation: scroll var(--tickerSpeed) linear infinite;
    font-weight: 1000;
    font-size: var(--ticker);
  }
  .track span b{color:rgba(255,255,255,.74)}
  @keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
  }

  .fade{ animation: fadein .55s ease-out both; }
  @keyframes fadein{
    from{opacity:.0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }
</style>
</head>

<body>
<div class="stage">
  <div class="app" id="app">
    <div class="wrap">
      <header>
        <div class="brand">
          <div class="title">Ambient Command Center</div>
          <div class="subtitle">space • earth • aurora • aircraft • iss • earthquakes • zero news</div>
        </div>
        <div class="status">
          <div class="pill"><span class="dot" id="dot"></span><span id="net">Online</span></div>
          <div class="pill">Updated <span id="upd">—</span></div>
          <div class="pill"><span id="clock">—</span></div>
        </div>
      </header>

      <main>
        <section class="card">
          <div class="hd">
            <div class="h">NASA — Astronomy Picture of the Day</div>
            <div class="tag" id="apodTag">loading</div>
          </div>
          <div class="bd">
            <div class="hero">
              <img id="apodImg" alt="" src="" />
              <div class="heroOverlay"></div>
              <div class="heroText">
                <div class="heroTitle" id="apodTitle">Loading…</div>
                <div class="heroMeta" id="apodMeta"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="hd"><div class="h" id="rightHd">Live Modules</div><div class="tag" id="rightTag">auto</div></div>
          <div class="bd">
            <div class="stack">
              <div class="mini" id="mod1"></div>
              <div class="mini" id="mod2"></div>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <div class="footerLeft">Live</div>
        <div class="marquee"><div class="track" id="track"></div></div>
      </footer>
    </div>
  </div>
</div>

<script>
/* ===== CLOCK/STATUS ===== */
const $ = (id)=>document.getElementById(id);
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
function setClock(){
  const d = new Date();
  $("clock").textContent = `${d.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"})} • ${fmtTime(d)}`;
}
setInterval(setClock, 1000); setClock();

function setOnline(){
  const online = navigator.onLine;
  $("net").textContent = online ? "Online" : "Offline";
  $("dot").className = "dot" + (online ? "" : " bad");
}
addEventListener("online", setOnline);
addEventListener("offline", setOnline);
setOnline();
function setUpdated(){ $("upd").textContent = fmtTime(new Date()); }

/* ===== FIXED TV SCALE (visualViewport + centering) ===== */
function getViewport(){
  const vv = window.visualViewport;
  return vv ? { w: vv.width, h: vv.height } : { w: window.innerWidth, h: window.innerHeight };
}
function setUIScale(){
  const root = document.documentElement;
  const safe = parseFloat(getComputedStyle(root).getPropertyValue("--safe")) || 0;

  const vp = getViewport();
  const vw = Math.max(320, vp.w - safe*2);
  const vh = Math.max(240, vp.h - safe*2);

  const designW = parseFloat(getComputedStyle(root).getPropertyValue("--designW")) || 1920;
  const designH = parseFloat(getComputedStyle(root).getPropertyValue("--designH")) || 1080;

  let scale = Math.min(vw / designW, vh / designH);

  // Don’t upscale above 1; keep crisp; also don’t go too tiny
  scale = Math.max(0.60, Math.min(1, scale));

  const usedW = designW * scale;
  const usedH = designH * scale;

  // Center inside available viewport
  const x = Math.max(0, (vw - usedW) / 2);
  const y = Math.max(0, (vh - usedH) / 2);

  root.style.setProperty("--uiScale", scale.toFixed(4));
  root.style.setProperty("--uiX", x.toFixed(1) + "px");
  root.style.setProperty("--uiY", y.toFixed(1) + "px");
}
addEventListener("resize", setUIScale);
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", setUIScale);
  window.visualViewport.addEventListener("scroll", setUIScale);
}
setUIScale();

/* ===== DATA + RENDER (same idea, minimal stub so ticker always shows) =====
   This keeps your page alive even if APIs fail. */
async function getJson(url){
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}

function moduleHTML({title, statusHTML, bigHTML, kvRows, listLines}){
  const kv = (kvRows && kvRows.length) ? `
    <div class="kv">
      ${kvRows.map(r => `
        <div class="kvRow">
          <div class="kvKey">${esc(r.left)}</div>
          <div class="kvVal">${esc(r.right)}</div>
        </div>
      `).join("")}
    </div>` : "";

  const list = (listLines && listLines.length) ? `
    <div class="list">
      ${listLines.map(x => `<div class="li"><span>${esc(x.left)}</span><span>${esc(x.right)}</span></div>`).join("")}
    </div>` : "";

  return `
    <div class="miniTop">
      <div class="k">${esc(title)}</div>
      <div class="s">${statusHTML}</div>
    </div>
    ${bigHTML ? `<div class="bigLine">${esc(bigHTML)}</div>` : ``}
    ${kv}
    ${list}
  `;
}

/* ===== APOD ===== */
async function refreshApod(){
  try{
    const d = await getJson("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
    $("apodTitle").textContent = d.title || "NASA APOD";
    $("apodTag").textContent = d.date || "today";

    if(d.media_type === "image" && d.url){
      $("apodImg").src = d.url;
    } else {
      $("apodImg").src = "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='1920' height='1080'>
          <rect width='100%' height='100%' fill='#070a12'/>
          <text x='70' y='150' fill='white' font-size='64' font-family='Arial' font-weight='800'>NASA APOD is a video today</text>
        </svg>
      `);
    }

    const credit = d.copyright ? `© ${d.copyright}` : "NASA";
    const expl = (d.explanation || "").replace(/\s+/g," ").trim();
    const short = expl.length > 110 ? expl.slice(0,110) + "…" : expl;

    $("apodMeta").innerHTML = `
      <span class="tag">SPACE</span>
      <span class="tag">${esc(credit)}</span>
      <span class="tag">${esc(new Date().getFullYear())}</span>
      <span class="metaTail">${esc(short)}</span>
    `;
  }catch(e){
    $("apodTitle").textContent = "NASA APOD (offline)";
    $("apodTag").textContent = "retrying";
  }
}

let phase=0;
function renderRight(){
  const blocks = [
    {
      title:"ISS Position",
      statusHTML:`<span class="tag good">LIVE</span>`,
      bigHTML:"Over: Locating…",
      kvRows:[{left:"Updated", right: fmtTime(new Date())}]
    },
    {
      title:"Earthquakes",
      statusHTML:`<span class="tag good">USGS 1 HR</span>`,
      bigHTML:"Loading…",
      listLines:[
        {left:"—", right:"Waiting on feed"},
        {left:"—", right:"No scrollbars"}
      ]
    },
    {
      title:"Aurora Forecast",
      statusHTML:`<span class="tag good">KP —</span>`,
      bigHTML:"Space weather",
      kvRows:[
        {left:"Kp now", right:"—"},
        {left:"Wind", right:"—"},
        {left:"Bz", right:"—"},
        {left:"Kp fcst max", right:"—"},
      ]
    },
    {
      title:"Aircraft Overhead",
      statusHTML:`<span class="tag good">RANGE 120 NM</span>`,
      bigHTML:"Loading…",
      listLines:[
        {left:"—", right:"Waiting on feed"},
        {left:"—", right:""}
      ]
    }
  ];

  const a = blocks[phase % blocks.length];
  const b = blocks[(phase+1) % blocks.length];

  $("mod1").className="mini fade"; $("mod1").innerHTML = moduleHTML(a);
  $("mod2").className="mini fade"; $("mod2").innerHTML = moduleHTML(b);

  $("rightHd").textContent = ["Live Modules","Sky + Orbit","Earth Systems"][phase % 3];
  $("rightTag").textContent = "auto";

  phase++;
}

function buildTicker(){
  const lines = [
    "Ambient mode • live feeds only • no news",
    "APOD • Aurora • Aircraft • ISS • Quakes"
  ];
  const html = lines.map(x => `<span>${x} <b>•</b></span>`).join("");
  $("track").innerHTML = html + html;
}

refreshApod();
renderRight();
buildTicker();
setUpdated();

setInterval(refreshApod, 60*60*1000);
setInterval(renderRight, 18*1000);
setInterval(()=>{ buildTicker(); setUpdated(); }, 20*1000);
</script>
</body>
</html>
